<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="T-GRAPH — 노드 44 + 엣지 274 정적 그래프 fallback"
     class="zoomable">
  <title>T-GRAPH — 자산 인용 그래프 정적 fallback (노드 44 · 엣지 274)</title>
  <desc>3 트랙(블루·퍼플·틸) + 6 패키지(앰버) + 11 운영 가이드(인디고) + 5 모듈(크림슨) 노드 44 개와 인용 엣지 274 개를 정적 좌표로 배치한 D3 인터랙티브 그래프의 백업 일러스트.</desc>

  <defs>
    <linearGradient id="tg-hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="50%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <filter id="tg-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.20"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 500; }
      .en { font-family: 'Inter',sans-serif; font-weight: 600; letter-spacing: 0.10em; }
    </style>
  </defs>

  <rect width="800" height="70" fill="url(#tg-hd)"/>
  <text x="32" y="28" class="en" fill="rgba(255,255,255,0.78)" font-size="11">T-GRAPH · STATIC FALLBACK · 44 NODES · 274 EDGES</text>
  <text x="32" y="54" class="ko" fill="white" font-size="22">자산 인용 그래프 — 정적 fallback</text>

  <!-- 그래프 영역 (노드 + 엣지 단순화) -->
  <g transform="translate(0, 80)">
    <!-- 엣지 (대표적인 인용 흐름만 표시) -->
    <g stroke="rgba(120,144,156,0.30)" stroke-width="1" fill="none">
      <line x1="160" y1="80" x2="400" y2="100"/>
      <line x1="160" y1="80" x2="640" y2="100"/>
      <line x1="160" y1="80" x2="220" y2="180"/>
      <line x1="160" y1="80" x2="380" y2="180"/>
      <line x1="160" y1="80" x2="540" y2="180"/>
      <line x1="400" y1="100" x2="220" y2="180"/>
      <line x1="400" y1="100" x2="380" y2="180"/>
      <line x1="400" y1="100" x2="540" y2="180"/>
      <line x1="400" y1="100" x2="700" y2="180"/>
      <line x1="640" y1="100" x2="380" y2="180"/>
      <line x1="640" y1="100" x2="540" y2="180"/>
      <line x1="640" y1="100" x2="700" y2="180"/>
      <line x1="220" y1="180" x2="120" y2="240"/>
      <line x1="380" y1="180" x2="280" y2="240"/>
      <line x1="540" y1="180" x2="440" y2="240"/>
      <line x1="540" y1="180" x2="600" y2="240"/>
      <line x1="700" y1="180" x2="600" y2="240"/>
      <line x1="700" y1="180" x2="720" y2="240"/>
      <line x1="160" y1="80" x2="120" y2="240"/>
      <line x1="160" y1="80" x2="280" y2="240"/>
      <line x1="400" y1="100" x2="280" y2="240"/>
      <line x1="400" y1="100" x2="440" y2="240"/>
      <line x1="640" y1="100" x2="600" y2="240"/>
      <line x1="640" y1="100" x2="720" y2="240"/>
    </g>

    <!-- 트랙 노드 (3 개, 큰 원) -->
    <g filter="url(#tg-shadow)">
      <circle cx="160" cy="80" r="28" fill="#1565C0"/>
      <text x="160" y="84" text-anchor="middle" class="ko" fill="white" font-size="11">Track 1</text>
      <circle cx="400" cy="100" r="28" fill="#7B1FA2"/>
      <text x="400" y="104" text-anchor="middle" class="ko" fill="white" font-size="11">Track 2</text>
      <circle cx="640" cy="100" r="28" fill="#00897B"/>
      <text x="640" y="104" text-anchor="middle" class="ko" fill="white" font-size="11">Track 3</text>
    </g>

    <!-- 패키지 노드 (6 개, 앰버) -->
    <g filter="url(#tg-shadow)" font-size="9" class="ko" fill="#1A237E">
      <circle cx="100" cy="180" r="16" fill="#FFB300"/>
      <text x="100" y="184" text-anchor="middle">P1</text>
      <circle cx="220" cy="180" r="16" fill="#FFB300"/>
      <text x="220" y="184" text-anchor="middle">P2</text>
      <circle cx="380" cy="180" r="16" fill="#FFB300"/>
      <text x="380" y="184" text-anchor="middle">P3</text>
      <circle cx="540" cy="180" r="16" fill="#FFB300"/>
      <text x="540" y="184" text-anchor="middle">P4</text>
      <circle cx="700" cy="180" r="16" fill="#FFB300"/>
      <text x="700" y="184" text-anchor="middle">P5</text>
      <circle cx="460" cy="50" r="16" fill="#FFB300"/>
      <text x="460" y="54" text-anchor="middle">P6</text>
    </g>

    <!-- 운영 가이드 노드 (11 개, 인디고 작은 원) -->
    <g fill="#3949AB">
      <circle cx="40" cy="240" r="9"/>
      <circle cx="80" cy="240" r="9"/>
      <circle cx="120" cy="240" r="9"/>
      <circle cx="200" cy="240" r="9"/>
      <circle cx="240" cy="240" r="9"/>
      <circle cx="280" cy="240" r="9"/>
      <circle cx="360" cy="240" r="9"/>
      <circle cx="400" cy="240" r="9"/>
      <circle cx="440" cy="240" r="9"/>
      <circle cx="520" cy="240" r="9"/>
      <circle cx="600" cy="240" r="9"/>
    </g>

    <!-- 모듈 노드 (5 개, 크림슨) -->
    <g fill="#C62828">
      <circle cx="660" cy="240" r="10"/>
      <circle cx="700" cy="240" r="10"/>
      <circle cx="740" cy="240" r="10"/>
      <circle cx="60" cy="40" r="10"/>
      <circle cx="740" cy="40" r="10"/>
    </g>
  </g>

  <!-- 범례 + 통계 -->
  <rect x="0" y="335" width="800" height="65" fill="#F5F7FA"/>
  <g transform="translate(32, 358)" class="ko" font-size="11">
    <circle cx="6" cy="-3" r="6" fill="#1565C0"/>
    <text x="20" y="0" fill="#1A237E">3 트랙</text>
    <circle cx="106" cy="-3" r="6" fill="#FFB300"/>
    <text x="120" y="0" fill="#1A237E">6 패키지</text>
    <circle cx="220" cy="-3" r="6" fill="#3949AB"/>
    <text x="234" y="0" fill="#1A237E">11 운영 가이드</text>
    <circle cx="370" cy="-3" r="6" fill="#C62828"/>
    <text x="384" y="0" fill="#1A237E">5 모듈</text>
    <text x="470" y="0" fill="#1A237E" font-weight="700">노드 44 · 엣지 274</text>
    <text x="650" y="0" fill="#37474F" font-size="10">D3 graph fallback</text>
  </g>
  <text x="32" y="386" class="ko-r" font-size="10" fill="#546E7A">사이트의 인터랙티브 그래프 미동작 환경 대응 — 정적 SVG</text>
</svg>
