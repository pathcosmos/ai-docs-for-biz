<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="Track 1 Top5 — BLK-T1-3.1·3.2·4.4·4.5·4.6 5 블록 카드"
     class="zoomable">
  <title>Track 1 — 재사용 Top 5 블록 (3.1 / 3.2 / 4.4 / 4.5 / 4.6)</title>
  <desc>인적 의존성, 데이터 단절, 피쳐 엔지니어링, 모델 선정, 데이터→현장 파이프라인의 5 핵심 블록을 카드 그리드로 시각화한 Track 1 Top5.</desc>

  <defs>
    <linearGradient id="t1t-hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <filter id="t1t-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 500; }
      .en { font-family: 'Inter',sans-serif; font-weight: 600; letter-spacing: 0.10em; }
    </style>
  </defs>

  <!-- 헤더 -->
  <rect width="800" height="70" fill="url(#t1t-hd)"/>
  <text x="32" y="28" class="en" fill="rgba(255,255,255,0.78)" font-size="11">TRACK 1 · TOP 5 REUSABLE BLOCKS</text>
  <text x="32" y="54" class="ko" fill="white" font-size="22">Track 1 — 재사용 Top 5 블록 (실문 초안)</text>

  <!-- 5 블록 카드 (2 + 3 그리드) -->
  <g transform="translate(32, 100)" class="ko" font-size="12">
    <!-- 3.1 -->
    <g filter="url(#t1t-shadow)">
      <rect width="240" height="100" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
      <rect width="240" height="32" rx="10" fill="#1565C0"/>
      <rect y="20" width="240" height="12" fill="#1565C0"/>
      <text x="14" y="22" fill="white" font-size="13">BLK-T1-3.1</text>
      <text x="14" y="56" fill="#1A237E" font-size="13">인적 의존성·암묵지 리스크</text>
      <text x="14" y="76" class="ko-r" fill="#37474F" font-size="10">베테랑 의존, 노하우 사장 위험</text>
      <text x="14" y="92" class="ko-r" fill="#78909C" font-size="9">2~3 문단 + Mermaid</text>
    </g>
    <!-- 3.2 -->
    <g transform="translate(252, 0)" filter="url(#t1t-shadow)">
      <rect width="240" height="100" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5"/>
      <rect width="240" height="32" rx="10" fill="#1976D2"/>
      <rect y="20" width="240" height="12" fill="#1976D2"/>
      <text x="14" y="22" fill="white" font-size="13">BLK-T1-3.2</text>
      <text x="14" y="56" fill="#1A237E" font-size="13">데이터 단절·비정형 한계</text>
      <text x="14" y="76" class="ko-r" fill="#37474F" font-size="10">MES/SCADA/PLC 사일로</text>
      <text x="14" y="92" class="ko-r" fill="#78909C" font-size="9">2~3 문단 + Mermaid</text>
    </g>
    <!-- 4.4 -->
    <g transform="translate(504, 0)" filter="url(#t1t-shadow)">
      <rect width="240" height="100" rx="10" fill="white" stroke="#1E88E5" stroke-width="1.5"/>
      <rect width="240" height="32" rx="10" fill="#1E88E5"/>
      <rect y="20" width="240" height="12" fill="#1E88E5"/>
      <text x="14" y="22" fill="white" font-size="13">BLK-T1-4.4</text>
      <text x="14" y="56" fill="#1A237E" font-size="13">피쳐 엔지니어링 접근</text>
      <text x="14" y="76" class="ko-r" fill="#37474F" font-size="10">시계열 윈도·통계·도메인 피쳐</text>
      <text x="14" y="92" class="ko-r" fill="#78909C" font-size="9">2~3 문단 + Mermaid</text>
    </g>
  </g>
  <g transform="translate(158, 220)" class="ko" font-size="12">
    <!-- 4.5 -->
    <g filter="url(#t1t-shadow)">
      <rect width="240" height="100" rx="10" fill="white" stroke="#2196F3" stroke-width="1.5"/>
      <rect width="240" height="32" rx="10" fill="#2196F3"/>
      <rect y="20" width="240" height="12" fill="#2196F3"/>
      <text x="14" y="22" fill="white" font-size="13">BLK-T1-4.5</text>
      <text x="14" y="56" fill="#1A237E" font-size="13">모델·앙상블 선정 기준</text>
      <text x="14" y="76" class="ko-r" fill="#37474F" font-size="10">LSTM·Transformer·XGB·이상탐지</text>
      <text x="14" y="92" class="ko-r" fill="#78909C" font-size="9">2~3 문단 + Mermaid</text>
    </g>
    <!-- 4.6 -->
    <g transform="translate(252, 0)" filter="url(#t1t-shadow)">
      <rect width="240" height="100" rx="10" fill="white" stroke="#42A5F5" stroke-width="1.5"/>
      <rect width="240" height="32" rx="10" fill="#42A5F5"/>
      <rect y="20" width="240" height="12" fill="#42A5F5"/>
      <text x="14" y="22" fill="white" font-size="13">BLK-T1-4.6</text>
      <text x="14" y="56" fill="#1A237E" font-size="13">데이터→현장 적용 파이프라인</text>
      <text x="14" y="76" class="ko-r" fill="#37474F" font-size="10">수집·피쳐·모델·운영 일관 흐름</text>
      <text x="14" y="92" class="ko-r" fill="#78909C" font-size="9">2~3 문단 + Mermaid</text>
    </g>
  </g>

  <!-- 하단 통계 -->
  <rect x="0" y="340" width="800" height="60" fill="#F5F7FA"/>
  <g transform="translate(32, 366)" class="ko" font-size="12" fill="#1A237E">
    <text y="0" font-weight="700">5 블록</text>
    <text x="100" y="0" font-weight="700">600~1,200 자/블록</text>
    <text x="280" y="0" font-weight="700">5 Mermaid</text>
    <text x="400" y="0" font-weight="700">플레이스홀더 6 종</text>
    <text x="580" y="0" font-weight="700">사업계획서 직접 투입</text>
  </g>
</svg>
