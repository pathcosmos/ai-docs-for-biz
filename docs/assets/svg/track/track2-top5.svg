    <text x="14" y="76" class="ko-r" font-size="10" fill="#475569">데이터 · 학습 · 배포 · 모니터링 · 거버넌스 · 보안 · UX</text>
    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §4.2 직접 paste</text>
  </g>

  <!-- BLK-T2-4.4 -->
  <g transform="translate(40, 368)" filter="url(#t2t-shadow)">
    <rect width="520" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="32" rx="8" fill="url(#t2t-card)"/>
    <rect y="20" width="520" height="12" fill="url(#t2t-card)"/>
    <text x="14" y="22" class="ko" font-size="13" fill="white">BLK-T2-4.4</text>
    <text x="450" y="22" text-anchor="end" class="en" font-size="10" fill="rgba(255,255,255,0.9)">§4.4 · 600~1,200 자</text>
    <text x="14" y="56" class="ko" font-size="14" fill="#6D28D9">3 단 참조 아키텍처 (Data · ML · Ops)</text>
    <text x="14" y="76" class="ko-r" font-size="10" fill="#475569">레이어별 책임 분리 · 부산경남 IDC · 국내 CSP 정합</text>
    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §4.4 직접 paste</text>
  </g>

  <!-- BLK-T2-5.5 -->
  <g transform="translate(40, 492)" filter="url(#t2t-shadow)">
    <rect width="520" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="32" rx="8" fill="url(#t2t-card)"/>
    <rect y="20" width="520" height="12" fill="url(#t2t-card)"/>
    <text x="14" y="22" class="ko" font-size="13" fill="white">BLK-T2-5.5</text>
    <text x="450" y="22" text-anchor="end" class="en" font-size="10" fill="rgba(255,255,255,0.9)">§5.5 · 600~1,200 자</text>
    <text x="14" y="56" class="ko" font-size="14" fill="#6D28D9">3 층 모니터링 · 재학습 트리거</text>
    <text x="14" y="76" class="ko-r" font-size="10" fill="#475569">데이터 · 모델 · 비즈 KPI · PSI · KS · CUSUM 임계</text>
    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §5.5 직접 paste</text>
  </g>

  <!-- BLK-T2-6.1 -->
  <g transform="translate(40, 616)" filter="url(#t2t-shadow)">
    <rect width="520" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="32" rx="8" fill="url(#t2t-card)"/>
    <rect y="20" width="520" height="12" fill="url(#t2t-card)"/>
    <text x="14" y="22" class="ko" font-size="13" fill="white">BLK-T2-6.1</text>
    <text x="450" y="22" text-anchor="end" class="en" font-size="10" fill="rgba(255,255,255,0.9)">§6.1 · 600~1,200 자</text>
    <text x="14" y="56" class="ko" font-size="14" fill="#6D28D9">개선 노하우 · 거버넌스 · 외부 검증</text>
