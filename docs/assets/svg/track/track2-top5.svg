    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §6.1 직접 paste</text>
  </g>

  <!-- 하단 cross-ref -->
  <g transform="translate(30, 740)" filter="url(#t2t-shadow)">
    <rect width="540" height="50" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#6D28D9">paste 위치 · 사업계획서 §6·7·8 (지속개선·MLOps·거버넌스)</text>
    <text x="14" y="38" class="ko-r" font-size="9" fill="#475569">5 블록 × 약 900 자 = 약 4,500 자 · Mermaid 5 · 철강·고무 공통 · 외부 검증 양식 정합</text>
  </g>
