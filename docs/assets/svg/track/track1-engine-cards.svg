<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="Track 1 5.2 AI 엔진 6 종 카드 — 시계열·비전·이상탐지·자동보정·LLM·앙상블"
     class="zoomable">
  <title>Track 1 — 5.2 AI 엔진 카드 6 종</title>
  <desc>5.2-a 시계열, 5.2-b 비전, 5.2-c 이상탐지·예지보전, 5.2-d 자동 보정 폐쇄 루프, 5.2-e LLM·RAG 결합, 5.2-f 다모델 앙상블의 6 엔진 카드 그리드.</desc>

  <defs>
    <linearGradient id="t1e-hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <filter id="t1e-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 500; }
      .en { font-family: 'Inter',sans-serif; font-weight: 600; letter-spacing: 0.10em; }
    </style>
  </defs>

  <!-- 헤더 -->
  <rect width="800" height="70" fill="url(#t1e-hd)"/>
  <text x="32" y="28" class="en" fill="rgba(255,255,255,0.78)" font-size="11">TRACK 1 · §5.2 · AI ENGINE CARDS</text>
  <text x="32" y="54" class="ko" fill="white" font-size="22">Track 1 — 5.2 AI 엔진 6 종 카드</text>

  <!-- 6 엔진 카드 (3 × 2) -->
  <g transform="translate(28, 95)" class="ko" font-size="11">
    <!-- a 시계열 -->
    <g filter="url(#t1e-shadow)">
      <rect width="240" height="100" rx="10" fill="white"/>
      <rect width="6" height="100" fill="#1565C0"/>
      <text x="20" y="26" fill="#1565C0" font-size="12">5.2-a</text>
      <text x="20" y="50" fill="#1A237E" font-size="13">시계열</text>
      <text x="20" y="72" class="ko-r" fill="#37474F" font-size="10">압연 두께·온도 예측</text>
      <text x="20" y="88" class="ko-r" fill="#78909C" font-size="9">LSTM · Transformer</text>
    </g>
    <!-- b 비전 -->
    <g transform="translate(252, 0)" filter="url(#t1e-shadow)">
      <rect width="240" height="100" rx="10" fill="white"/>
      <rect width="6" height="100" fill="#7B1FA2"/>
      <text x="20" y="26" fill="#7B1FA2" font-size="12">5.2-b</text>
      <text x="20" y="50" fill="#1A237E" font-size="13">비전 (표면 결함)</text>
      <text x="20" y="72" class="ko-r" fill="#37474F" font-size="10">스크래치·핀홀·이물 탐지</text>
      <text x="20" y="88" class="ko-r" fill="#78909C" font-size="9">CNN · Segmentation</text>
    </g>
    <!-- c 이상탐지 -->
    <g transform="translate(504, 0)" filter="url(#t1e-shadow)">
      <rect width="240" height="100" rx="10" fill="white"/>
      <rect width="6" height="100" fill="#00897B"/>
      <text x="20" y="26" fill="#00897B" font-size="12">5.2-c</text>
      <text x="20" y="50" fill="#1A237E" font-size="13">이상탐지·예지보전</text>
      <text x="20" y="72" class="ko-r" fill="#37474F" font-size="10">RUL · 베어링 진동 분석</text>
      <text x="20" y="88" class="ko-r" fill="#78909C" font-size="9">Isolation Forest · AE</text>
    </g>
  </g>
  <g transform="translate(28, 210)" class="ko" font-size="11">
    <!-- d 자동보정 -->
    <g filter="url(#t1e-shadow)">
      <rect width="240" height="100" rx="10" fill="white"/>
      <rect width="6" height="100" fill="#F57F17"/>
      <text x="20" y="26" fill="#F57F17" font-size="12">5.2-d</text>
      <text x="20" y="50" fill="#1A237E" font-size="13">자동 보정 폐쇄 루프</text>
      <text x="20" y="72" class="ko-r" fill="#37474F" font-size="10">MPC · 파라미터 자동 보정</text>
      <text x="20" y="88" class="ko-r" fill="#78909C" font-size="9">RL · Bayesian Opt</text>
    </g>
    <!-- e LLM·RAG -->
    <g transform="translate(252, 0)" filter="url(#t1e-shadow)">
      <rect width="240" height="100" rx="10" fill="white"/>
      <rect width="6" height="100" fill="#C62828"/>
      <text x="20" y="26" fill="#C62828" font-size="12">5.2-e</text>
      <text x="20" y="50" fill="#1A237E" font-size="13">LLM · RAG 결합</text>
      <text x="20" y="72" class="ko-r" fill="#37474F" font-size="10">작업지시·장애 대응 검색</text>
      <text x="20" y="88" class="ko-r" fill="#78909C" font-size="9">한국 sLM · Citation</text>
    </g>
    <!-- f 앙상블 -->
    <g transform="translate(504, 0)" filter="url(#t1e-shadow)">
      <rect width="240" height="100" rx="10" fill="white"/>
      <rect width="6" height="100" fill="#37474F"/>
      <text x="20" y="26" fill="#37474F" font-size="12">5.2-f</text>
      <text x="20" y="50" fill="#1A237E" font-size="13">다모델 앙상블</text>
      <text x="20" y="72" class="ko-r" fill="#37474F" font-size="10">XGB + LSTM + 룰 결합</text>
      <text x="20" y="88" class="ko-r" fill="#78909C" font-size="9">Stacking · Voting</text>
    </g>
  </g>

  <!-- 하단 통계 -->
  <rect x="0" y="335" width="800" height="65" fill="#F5F7FA"/>
  <g transform="translate(32, 360)" class="ko" font-size="12" fill="#1A237E">
    <text y="0" font-weight="700">6 엔진 카드</text>
    <text x="140" y="0" font-weight="700">5 색상 코드</text>
    <text x="270" y="0" font-weight="700">~720 줄</text>
    <text x="380" y="0" font-weight="700">시나리오 인용 풍부</text>
    <text x="580" y="0" font-weight="700">사업계획서 §5.2 직접 투입</text>
  </g>
  <text x="32" y="386" class="ko-r" font-size="10" fill="#546E7A">각 카드 = 적용 시나리오 + 알고리즘 + 입력 데이터 + KPI 의 4 단</text>
</svg>
