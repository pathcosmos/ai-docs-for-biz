<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="Track 1 제조 AI 본문 목차 — 7 대분류 가로 파이프라인"
     class="zoomable">
  <title>Track 1 — 제조 AI 본문 공통 목차 (7 대분류)</title>
  <desc>1. 사업 개요 → 2. 기업·공정 현황 → 3. AS-IS → 4. TO-BE → 5. 구축 상세 → 6. 기대효과 → 7. 추진 체계의 7 대분류로 이루어진 Track 1 공통 본문 목차 파이프라인.</desc>

  <defs>
    <linearGradient id="t1i-hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="t1i-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="t1i-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.20"/>
    </filter>
    <marker id="t1i-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565C0"/>
    </marker>
    <style>
      .ko { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; font-weight: 500; }
      .en { font-family: 'Inter',sans-serif; font-weight: 600; letter-spacing: 0.10em; }
    </style>
  </defs>

  <!-- 헤더 -->
  <rect width="800" height="70" fill="url(#t1i-hd)"/>
  <text x="32" y="28" class="en" fill="rgba(255,255,255,0.78)" font-size="11">TRACK 1 · MANUFACTURING AI · INDEX</text>
  <text x="32" y="54" class="ko" fill="white" font-size="22">Track 1 — 제조 AI 본문 공통 목차 7 대분류</text>

  <!-- 7 단계 가로 파이프라인 -->
  <g transform="translate(20, 110)" class="ko" font-size="11">
    <!-- 1 -->
    <g filter="url(#t1i-shadow)">
      <rect width="100" height="90" rx="10" fill="url(#t1i-card)"/>
      <circle cx="20" cy="20" r="13" fill="#FFB300"/>
      <text x="20" y="25" text-anchor="middle" fill="#1A237E" font-size="13">1</text>
      <text x="50" y="50" text-anchor="middle" fill="white" font-size="11">사업 개요</text>
      <text x="50" y="68" text-anchor="middle" class="ko-r" fill="white" font-size="9">·추진 배경</text>
      <text x="50" y="82" text-anchor="middle" class="ko-r" fill="white" font-size="9">4 절</text>
    </g>
    <!-- 2 -->
    <g transform="translate(110, 0)" filter="url(#t1i-shadow)">
      <rect width="100" height="90" rx="10" fill="url(#t1i-card)"/>
      <circle cx="20" cy="20" r="13" fill="#FFB300"/>
      <text x="20" y="25" text-anchor="middle" fill="#1A237E" font-size="13">2</text>
      <text x="50" y="50" text-anchor="middle" fill="white" font-size="11">기업·공정</text>
      <text x="50" y="68" text-anchor="middle" class="ko-r" fill="white" font-size="9">·데이터 현황</text>
      <text x="50" y="82" text-anchor="middle" class="ko-r" fill="white" font-size="9">4 절</text>
    </g>
    <!-- 3 -->
    <g transform="translate(220, 0)" filter="url(#t1i-shadow)">
      <rect width="100" height="90" rx="10" fill="url(#t1i-card)"/>
      <circle cx="20" cy="20" r="13" fill="#FFB300"/>
      <text x="20" y="25" text-anchor="middle" fill="#1A237E" font-size="13">3</text>
      <text x="50" y="50" text-anchor="middle" fill="white" font-size="11">AS-IS</text>
      <text x="50" y="68" text-anchor="middle" class="ko-r" fill="white" font-size="9">·문제점</text>
      <text x="50" y="82" text-anchor="middle" class="ko-r" fill="white" font-size="9">5 절</text>
    </g>
    <!-- 4 -->
    <g transform="translate(330, 0)" filter="url(#t1i-shadow)">
      <rect width="100" height="90" rx="10" fill="url(#t1i-card)"/>
      <circle cx="20" cy="20" r="13" fill="#FFB300"/>
      <text x="20" y="25" text-anchor="middle" fill="#1A237E" font-size="13">4</text>
      <text x="50" y="50" text-anchor="middle" fill="white" font-size="11">TO-BE</text>
      <text x="50" y="68" text-anchor="middle" class="ko-r" fill="white" font-size="9">·도입 전략</text>
      <text x="50" y="82" text-anchor="middle" class="ko-r" fill="white" font-size="9">6 절</text>
    </g>
    <!-- 5 -->
    <g transform="translate(440, 0)" filter="url(#t1i-shadow)">
      <rect width="100" height="90" rx="10" fill="url(#t1i-card)"/>
      <circle cx="20" cy="20" r="13" fill="#FFB300"/>
      <text x="20" y="25" text-anchor="middle" fill="#1A237E" font-size="13">5</text>
      <text x="50" y="50" text-anchor="middle" fill="white" font-size="11">구축 상세</text>
      <text x="50" y="68" text-anchor="middle" class="ko-r" fill="white" font-size="9">·5.2 엔진</text>
      <text x="50" y="82" text-anchor="middle" class="ko-r" fill="white" font-size="9">5 절</text>
    </g>
    <!-- 6 -->
    <g transform="translate(550, 0)" filter="url(#t1i-shadow)">
      <rect width="100" height="90" rx="10" fill="url(#t1i-card)"/>
      <circle cx="20" cy="20" r="13" fill="#FFB300"/>
      <text x="20" y="25" text-anchor="middle" fill="#1A237E" font-size="13">6</text>
      <text x="50" y="50" text-anchor="middle" fill="white" font-size="11">기대효과</text>
      <text x="50" y="68" text-anchor="middle" class="ko-r" fill="white" font-size="9">·KPI</text>
      <text x="50" y="82" text-anchor="middle" class="ko-r" fill="white" font-size="9">4 절</text>
    </g>
    <!-- 7 -->
    <g transform="translate(660, 0)" filter="url(#t1i-shadow)">
      <rect width="100" height="90" rx="10" fill="url(#t1i-card)"/>
      <circle cx="20" cy="20" r="13" fill="#FFB300"/>
      <text x="20" y="25" text-anchor="middle" fill="#1A237E" font-size="13">7</text>
      <text x="50" y="50" text-anchor="middle" fill="white" font-size="11">추진 체계</text>
      <text x="50" y="68" text-anchor="middle" class="ko-r" fill="white" font-size="9">·일정</text>
      <text x="50" y="82" text-anchor="middle" class="ko-r" fill="white" font-size="9">3 절</text>
    </g>
    <!-- 화살표 -->
    <line x1="100" y1="45" x2="110" y2="45" stroke="#1565C0" stroke-width="2" marker-end="url(#t1i-arrow)"/>
    <line x1="210" y1="45" x2="220" y2="45" stroke="#1565C0" stroke-width="2" marker-end="url(#t1i-arrow)"/>
    <line x1="320" y1="45" x2="330" y2="45" stroke="#1565C0" stroke-width="2" marker-end="url(#t1i-arrow)"/>
    <line x1="430" y1="45" x2="440" y2="45" stroke="#1565C0" stroke-width="2" marker-end="url(#t1i-arrow)"/>
    <line x1="540" y1="45" x2="550" y2="45" stroke="#1565C0" stroke-width="2" marker-end="url(#t1i-arrow)"/>
    <line x1="650" y1="45" x2="660" y2="45" stroke="#1565C0" stroke-width="2" marker-end="url(#t1i-arrow)"/>
  </g>

  <!-- 핵심 블록 표시 -->
  <g transform="translate(32, 230)" class="ko" font-size="11" fill="#1A237E">
    <text y="0">Top 5 블록 (3.1·3.2·4.4·4.5·4.6) — 사업계획서 직접 투입 가능</text>
  </g>
  <g transform="translate(32, 248)" class="ko-r" font-size="10" fill="#37474F">
    <text y="0">3.1 인적 의존성 · 3.2 데이터 단절 · 4.4 피쳐 엔지니어링 · 4.5 모델 선정 · 4.6 파이프라인</text>
  </g>

  <!-- 하단 통계 -->
  <rect x="0" y="320" width="800" height="80" fill="#F5F7FA"/>
  <g transform="translate(32, 348)" class="ko" font-size="12" fill="#1A237E">
    <text y="0" font-weight="700">7 대분류</text>
    <text x="120" y="0" font-weight="700">29 절</text>
    <text x="220" y="0" font-weight="700">5 Top 블록</text>
    <text x="360" y="0" font-weight="700">~1,400 줄</text>
    <text x="500" y="0" font-weight="700">철강·금속가공 기본</text>
    <text x="700" y="0" font-weight="700">7 산업</text>
  </g>
  <text x="32" y="384" class="ko-r" font-size="10" fill="#546E7A">고정 공통 / 업종별 교체 / 규모별 생략 — 모듈형 재사용 표기</text>
</svg>
