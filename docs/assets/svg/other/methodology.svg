<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="방법론 총론 — 47 방법론 4 군 분류 세로형"
     class="zoomable">
  <title>방법론 총론 (세로형) — 47 방법론 4 군 분류</title>
  <desc>방법론 총론 47 종을 4 군 (A 사업계획·B 기술·C 운영·D 메타) 으로 분류하고 핵심 5 ★ 방법론을 강조한 세로형 카테고리 트리. 군별 방법론 수와 대표 항목 인덱스 표시.</desc>

  <defs>
    <linearGradient id="meth-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="meth-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="meth-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="meth-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#FBCFE8"/>
    </linearGradient>
    <linearGradient id="meth-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="meth-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 -->
  <rect width="600" height="100" fill="url(#meth-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">방법론 총론</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">47 METHODS · 4 GROUPS · TOP 5</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#FCE7F3">사업계획서·콘텐츠 작성 + 기술 + 운영 + 메타 — 재사용 가능 방법론</text>

  <!-- A 사업계획·콘텐츠 -->
  <g filter="url(#meth-shadow)">
    <g transform="translate(40, 120)">
      <rect width="520" height="118" rx="10" fill="url(#meth-a)" stroke="#6366F1" stroke-width="2"/>
      <rect width="80" height="118" rx="10" fill="#6366F1"/><rect x="70" width="10" height="118" fill="#6366F1"/>
      <text x="40" y="50" text-anchor="middle" class="en" font-size="11" fill="white">GROUP A</text>
      <text x="40" y="80" text-anchor="middle" class="ko" font-size="22" fill="white" font-weight="900">14</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">A. 사업계획·콘텐츠 작성 (14 종)</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">자산 명명·플레이스홀더·8 장 포맷·인용 출처·시너지 ROI 산식</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#FBBF24">★ 4.8 플레이스홀더 — 고객사 일괄 치환 (재활용 핵심)</text>
      <text x="100" y="70" class="ko-r" font-size="9" fill="#FBBF24">★ 4.26 자산 군 포맷 통일 (운영 가이드 11 자산)</text>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#6366F1">▸ 4.1·4.4·4.7·4.8·4.10·4.13·4.15·4.18·4.21·4.24·4.26·4.29·4.32·4.36</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#475569">활용: 모든 패키지 1~6 + 6 통합 파일럿 + 11 운영 가이드</text>
      <text x="100" y="114" class="ko-r" font-size="9" fill="#3730A3">▸ 출처: 방법론_총론.md §3.A</text>
    </g>

    <!-- B 기술 -->
    <g transform="translate(40, 248)">
      <rect width="520" height="118" rx="10" fill="url(#meth-b)" stroke="#8B5CF6" stroke-width="2"/>
      <rect width="80" height="118" rx="10" fill="#8B5CF6"/><rect x="70" width="10" height="118" fill="#8B5CF6"/>
      <text x="40" y="50" text-anchor="middle" class="en" font-size="11" fill="white">GROUP B</text>
      <text x="40" y="80" text-anchor="middle" class="ko" font-size="22" fill="white" font-weight="900">12</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#5B21B6">B. 기술·모델·MLOps·RAG (12 종)</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">트랙 1·2·3 통합 패턴 · 시나리오 카탈로그 · TRL 5→9 단계</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#FBBF24">★ 4.5 트랙 1·2·3 통합 매핑 (모델·MLOps·RAG)</text>
      <text x="100" y="70" class="ko-r" font-size="9" fill="#475569">데이터 표준화·앙상블 선정·RAG 청킹·sLM 압축·연합학습</text>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#8B5CF6">▸ 4.2·4.3·4.5·4.9·4.11·4.14·4.17·4.20·4.23·4.28·4.31·4.34</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#475569">활용: track1·2·3_*.md + 모듈_연합학습·SaaS + 가이드_RAG·sLM·압축</text>
      <text x="100" y="114" class="ko-r" font-size="9" fill="#5B21B6">▸ 출처: 방법론_총론.md §3.B</text>
    </g>

    <!-- C 운영 -->
    <g transform="translate(40, 376)">
      <rect width="520" height="118" rx="10" fill="url(#meth-c)" stroke="#EC4899" stroke-width="2"/>
      <rect width="80" height="118" rx="10" fill="#EC4899"/><rect x="70" width="10" height="118" fill="#EC4899"/>
      <text x="40" y="50" text-anchor="middle" class="en" font-size="11" fill="white">GROUP C</text>
      <text x="40" y="80" text-anchor="middle" class="ko" font-size="22" fill="white" font-weight="900">13</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#9F1239">C. 운영·거버넌스·재무 (13 종)</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">RACI·KPI·재무·외부 검증·중대재해·CBAM·OEM·컨설팅</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#FBBF24">★ 4.6 KPI·재무 ROI 시너지 가산 (β/α 모델)</text>
      <text x="100" y="70" class="ko-r" font-size="9" fill="#475569">권한 차등 H-G-A · 위험 매트릭스 · 양식 검증 7 단계</text>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#EC4899">▸ 4.6·4.12·4.16·4.19·4.22·4.25·4.27·4.30·4.33·4.35·4.37·4.39·4.41</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#475569">활용: 가이드_KPI·재무·외부검증·위험·컨설팅 + 책임_분담 + 모듈_OEM·CBAM</text>
      <text x="100" y="114" class="ko-r" font-size="9" fill="#9F1239">▸ 출처: 방법론_총론.md §3.C</text>
    </g>

    <!-- D 메타 -->
    <g transform="translate(40, 504)">
      <rect width="520" height="118" rx="10" fill="url(#meth-d)" stroke="#F59E0B" stroke-width="2"/>
      <rect width="80" height="118" rx="10" fill="#F59E0B"/><rect x="70" width="10" height="118" fill="#F59E0B"/>
      <text x="40" y="50" text-anchor="middle" class="en" font-size="11" fill="white">GROUP D</text>
      <text x="40" y="80" text-anchor="middle" class="ko" font-size="22" fill="white" font-weight="900">8</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#92400E">D. 메타·작업 흐름·세션 (8 종)</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">작업로그 8 필드 · Phase 운영 · 갭 발견 · 병렬 실행 · 인계</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#FBBF24">★ 4.29 방법론 추출·동시 인덱스 갱신 (이식성 핵심)</text>
      <text x="100" y="70" class="ko-r" font-size="9" fill="#475569">사용자 발언 직접 인용 · 단계별 커밋 · 양 원격 동시 push</text>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#F59E0B">▸ 4.29·4.38·4.40·4.42·4.43·4.44·4.45·4.46</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#475569">활용: 작업로그.md + CLAUDE.md + 운영_모드_Quickstart</text>
      <text x="100" y="114" class="ko-r" font-size="9" fill="#92400E">▸ 출처: 방법론_총론.md §3.D</text>
    </g>
  </g>

  <!-- 핵심 5 ★ -->
  <g transform="translate(40, 632)" filter="url(#meth-shadow)">
    <rect width="520" height="68" rx="8" fill="#FBBF24"/>
    <text x="20" y="22" class="ko" font-size="13" fill="#0F172A">핵심 5 ★ 방법론 (재이식 우선)</text>
    <text x="20" y="40" class="ko-r" font-size="10" fill="#0F172A">★ 4.5 트랙 1·2·3 통합  ★ 4.6 시너지 ROI (β/α)  ★ 4.8 플레이스홀더</text>
    <text x="20" y="56" class="ko-r" font-size="10" fill="#0F172A">★ 4.26 자산 군 포맷 통일  ★ 4.29 방법론 추출·인덱스 동기화</text>
  </g>

  <!-- 하단 -->
  <g transform="translate(40, 710)">
    <rect width="520" height="70" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="20" y="22" class="ko" font-size="12" fill="#5B21B6">총합 47 = A 14 + B 12 + C 13 + D 8 — 재사용 가능 모듈형 방법론</text>
    <text x="20" y="40" class="ko-r" font-size="10" fill="#475569">▸ 다른 프로젝트로 이식 시 D 군 (작업로그 8 필드) 먼저 적용</text>
    <text x="20" y="56" class="ko-r" font-size="9" fill="#8B5CF6">▸ 출처: 방법론_총론.md §3 + 작업로그.md §4 (47 인덱스)</text>
  </g>
</svg>
