      <rect width="180" height="28" rx="10" fill="#3949AB"/>
      <rect y="18" width="180" height="10" fill="#3949AB"/>
      <text x="12" y="20" fill="white" font-size="12">클라우드 지원사업</text>
      <text x="12" y="48" fill="#1A237E" font-size="11">통합형 클라우드</text>
      <text x="12" y="66" class="ko-r" fill="#37474F" font-size="10">2~3 년</text>
      <text x="12" y="84" class="ko-r" fill="#78909C" font-size="9">CSP 연계 · ESG</text>
    </g>
    <g transform="translate(190, 0)" filter="url(#sp-shadow)">
      <rect width="180" height="100" rx="10" fill="white"/>
      <rect width="180" height="28" rx="10" fill="#5C6BC0"/>
      <rect y="18" width="180" height="10" fill="#5C6BC0"/>
      <text x="12" y="20" fill="white" font-size="12">AI 바우처</text>
      <text x="12" y="48" fill="#1A237E" font-size="11">단기 · 솔루션 도입</text>
      <text x="12" y="66" class="ko-r" fill="#37474F" font-size="10">~1 년</text>
      <text x="12" y="84" class="ko-r" fill="#78909C" font-size="9">중소 · 단발</text>
    </g>
    <g transform="translate(380, 0)" filter="url(#sp-shadow)">
      <rect width="180" height="100" rx="10" fill="white"/>
      <rect width="180" height="28" rx="10" fill="#26A69A"/>
      <rect y="18" width="180" height="10" fill="#26A69A"/>
      <text x="12" y="20" fill="white" font-size="12">K-디지털 트레이닝</text>
      <text x="12" y="48" fill="#004D40" font-size="11">AI 인력 양성</text>
      <text x="12" y="66" class="ko-r" fill="#37474F" font-size="10">1 년</text>
      <text x="12" y="84" class="ko-r" fill="#78909C" font-size="9">교육 + R&amp;D 결합</text>
    </g>
    <g transform="translate(570, 0)" filter="url(#sp-shadow)">
      <rect width="180" height="100" rx="10" fill="white"/>
      <rect width="180" height="28" rx="10" fill="#FFB300"/>
      <rect y="18" width="180" height="10" fill="#FFB300"/>
      <text x="12" y="20" fill="white" font-size="12">AI 데이터 댐</text>
      <text x="12" y="48" fill="#E65100" font-size="11">데이터 구축·개방</text>
      <text x="12" y="66" class="ko-r" fill="#37474F" font-size="10">2~3 년</text>
      <text x="12" y="84" class="ko-r" fill="#78909C" font-size="9">제조 데이터셋</text>
    </g>
