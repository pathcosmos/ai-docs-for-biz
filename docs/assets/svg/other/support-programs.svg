  <rect x="0" y="335" width="800" height="65" fill="#F5F7FA"/>
  <g transform="translate(32, 360)" class="ko" font-size="12" fill="#1A237E">
    <text y="0" font-weight="700">8 지원사업</text>
    <text x="130" y="0" font-weight="700">정부 6 + 대기업 2</text>
    <text x="290" y="0" font-weight="700">~1 년 / 1~3 년 / 3~5 년</text>
    <text x="490" y="0" font-weight="700">철강·금속·고무 적합</text>
    <text x="680" y="0" font-weight="700">패키지 매핑</text>
  </g>
  <text x="32" y="386" class="ko-r" font-size="10" fill="#546E7A">고객사 규모·기간·테마에 따른 지원사업 선택 가이드</text>
</svg>
