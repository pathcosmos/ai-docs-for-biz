<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="패키지 4 — 고무 양산 OEM 12 개월 (RUB-01·02·05 + LLM-03 EXAONE + MLO-01 드리프트)"
     class="zoomable">
  <title>패키지 4 — 고무 양산 OEM (Rubber Compound &amp; Vision QC, 12 개월)</title>
  <desc>자동차 부품 고무·폴리머 양산 12 개월 통합 파일럿 — 밴버리 배합 품질, 압출·언더큐어 비전, 금형 변경 PPAP, RAG 작업표준의 4 시나리오를 LG EXAONE sLM 과 MLO-01 드리프트 인프라 위에서 운영. 5.2-b·c·f AI 카드와 OEM·연합학습 모듈 cross-reference 포함.</desc>

  <defs>
    <linearGradient id="pkg4-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <linearGradient id="pkg4-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="pkg4-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#FFA726"/>
    </linearGradient>
    <filter id="pkg4-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#5D4037" flood-opacity="0.22"/>
    </filter>
    <filter id="pkg4-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="800" fill="#FFFDF7"/>

  <!-- 상단 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#pkg4-header)"/>
  <text x="32" y="32" class="en" fill="rgba(255,255,255,0.92)" font-size="11">PACKAGE 04 · RUBBER COMPOUND &amp; VISION QC · 12 MONTHS</text>
  <text x="32" y="62" class="ko" fill="white" font-size="22">패키지 4 — 고무 양산 OEM</text>
  <text x="32" y="84" class="ko-r" fill="rgba(255,255,255,0.92)" font-size="13">자동차 부품 1 차 협력사 · LG EXAONE sLM 결합</text>
  <g transform="translate(528, 28)" filter="url(#pkg4-glow)">
    <circle cx="22" cy="22" r="22" fill="#1A237E"/>
    <text x="22" y="29" text-anchor="middle" class="ko" fill="#FFB300" font-size="22">4</text>
  </g>

  <!-- 중간 영역 (y=100~680, 580px) — 4 시나리오 카드 세로 배치 -->

  <!-- 섹션 라벨 -->
  <text x="32" y="128" class="ko" fill="#BF360C" font-size="13">5 시나리오 · 위→아래 양산 흐름</text>
  <text x="32" y="146" class="ko-r" fill="#8D6E63" font-size="10">배합 → 압출·외관 → 금형 변경 → 작업표준 RAG</text>

  <!-- 카드 1 — RUB-01 밴버리 배합 -->
  <g transform="translate(32, 162)" filter="url(#pkg4-shadow)">
    <rect width="536" height="100" rx="10" fill="url(#pkg4-card)" stroke="#FFCC80" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#F57F17"/>
    <circle cx="44" cy="50" r="22" fill="#F57F17"/>
    <text x="44" y="46" text-anchor="middle" class="ko" fill="white" font-size="11">RUB</text>
    <text x="44" y="60" text-anchor="middle" class="ko" fill="white" font-size="11">-01</text>
    <text x="84" y="34" class="ko" fill="#BF360C" font-size="14">밴버리·믹서 배합 품질 예측</text>
    <text x="84" y="54" class="ko-r" fill="#5D4037" font-size="11">토크 곡선·전력·온도 → 분산도·점도 (5.2-b 시계열)</text>
    <text x="84" y="74" class="ko-r" fill="#8D6E63" font-size="10">RUB-01 · 확장 시나리오 · 1 차 라인 한정</text>
    <text x="84" y="90" class="ko-r" fill="#8D6E63" font-size="10">목표 — 분산 불량 [%] 감소 · 후속 라벨 외주 분리</text>
  </g>

  <!-- 카드 2 — RUB-02 압출 + RUB-05 외관 비전 (주력) -->
  <g transform="translate(32, 274)" filter="url(#pkg4-shadow)">
    <rect width="536" height="118" rx="10" fill="#FFE0B2" stroke="#FF8A65" stroke-width="2"/>
    <rect width="6" height="118" rx="3" fill="#E65100"/>
    <circle cx="44" cy="58" r="26" fill="#E65100"/>
    <text x="44" y="55" text-anchor="middle" class="ko" fill="white" font-size="10">RUB</text>
    <text x="44" y="68" text-anchor="middle" class="ko" fill="white" font-size="10">-02·05</text>
    <text x="84" y="32" class="ko" fill="#BF360C" font-size="14">압출 치수 · 언더큐어 외관 비전 (주력)</text>
    <text x="84" y="52" class="ko-r" fill="#5D4037" font-size="11">레이저 치수계 + 라인스캔 → 실시간 보정·결함 분류</text>
    <text x="84" y="70" class="ko-r" fill="#5D4037" font-size="11">5.2-b 시계열 + 5.2-c 비전 결합 패턴</text>
    <text x="84" y="92" class="ko-r" fill="#8D6E63" font-size="10">RUB-02 (주력) + RUB-05 (확장) · 외경 ±[수치] mm 자동 보정</text>
    <text x="84" y="108" class="ko-r" fill="#BF360C" font-size="10" font-weight="700">▼ 본 사업의 차별 가치</text>
  </g>

  <!-- 카드 3 — LLM-03 8D 보고서 EXAONE -->
  <g transform="translate(32, 404)" filter="url(#pkg4-shadow)">
    <rect width="536" height="100" rx="10" fill="url(#pkg4-card)" stroke="#FFCC80" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#6A1B9A"/>
    <circle cx="44" cy="50" r="22" fill="#6A1B9A"/>
    <text x="44" y="46" text-anchor="middle" class="ko" fill="white" font-size="11">LLM</text>
    <text x="44" y="60" text-anchor="middle" class="ko" fill="white" font-size="11">-03</text>
    <text x="84" y="34" class="ko" fill="#4A148C" font-size="14">8D 불량 보고서 자동 작성 (EXAONE)</text>
    <text x="84" y="54" class="ko-r" fill="#5D4037" font-size="11">과거 8D·5Why·MSDS RAG → 한국어 sLM 초안 (5.2-f)</text>
    <text x="84" y="74" class="ko-r" fill="#8D6E63" font-size="10">LLM-03 · LG EXAONE 1 차 적용 · 민감도 라우팅</text>
    <text x="84" y="90" class="ko-r" fill="#8D6E63" font-size="10">목표 — OEM 클레임 응대 [%] 단축</text>
  </g>

  <!-- 카드 4 — MLO-01 드리프트 인프라 -->
  <g transform="translate(32, 516)" filter="url(#pkg4-shadow)">
    <rect width="536" height="100" rx="10" fill="url(#pkg4-card)" stroke="#FFCC80" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#283593"/>
    <circle cx="44" cy="50" r="22" fill="#283593"/>
    <text x="44" y="46" text-anchor="middle" class="ko" fill="white" font-size="11">MLO</text>
    <text x="44" y="60" text-anchor="middle" class="ko" fill="white" font-size="11">-01</text>
    <text x="84" y="34" class="ko" fill="#1A237E" font-size="14">MLO-01 드리프트·자동 재학습 (인프라)</text>
    <text x="84" y="54" class="ko-r" fill="#5D4037" font-size="11">5 모델 수명 관리 · IATF 16949 변경관리 정합</text>
    <text x="84" y="74" class="ko-r" fill="#8D6E63" font-size="10">Track 2 풀 7 종 중 5 종 도입 · 첫 적용</text>
    <text x="84" y="90" class="ko-r" fill="#8D6E63" font-size="10">PPAP·SQA 모델 카드·리니지 자동 보존</text>
  </g>

  <!-- 5.2 카드 + 모듈 cross-ref 라벨 -->
  <g transform="translate(32, 632)">
    <rect width="536" height="36" rx="8" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
    <text x="16" y="16" class="ko" fill="#BF360C" font-size="10">5.2 카드 결합</text>
    <text x="16" y="30" class="ko-r" fill="#5D4037" font-size="9">5.2-b 시계열 · 5.2-c 비전 · 5.2-f LLM·RAG (EXAONE 분기)</text>
    <text x="280" y="16" class="ko" fill="#BF360C" font-size="10">모듈 cross-ref</text>
    <text x="280" y="30" class="ko-r" fill="#5D4037" font-size="9">OEM·자동차 공급망 + 연합학습 (후속) + 중대재해 (간접)</text>
  </g>

  <!-- 하단 통계 (y=680~800, 120px) -->
  <g transform="translate(32, 692)">
    <rect width="536" height="92" rx="10" fill="url(#pkg4-accent)" filter="url(#pkg4-shadow)"/>
    <g class="ko" fill="white">
      <text x="20" y="28" font-size="24" font-weight="800">12</text>
      <text x="20" y="50" font-size="11">개월 표준</text>
      <text x="20" y="68" class="ko-r" font-size="9" opacity="0.92">대중소상생 LG AI</text>

      <text x="120" y="28" font-size="24" font-weight="800">5</text>
      <text x="120" y="50" font-size="11">시나리오</text>
      <text x="120" y="68" class="ko-r" font-size="9" opacity="0.92">RUB 3 + LLM 1 + MLO 1</text>

      <text x="220" y="28" font-size="24" font-weight="800">EXAONE</text>
      <text x="220" y="50" font-size="11">LG sLM</text>
      <text x="220" y="68" class="ko-r" font-size="9" opacity="0.92">한국어 도메인·온프레미스</text>

      <text x="380" y="28" font-size="24" font-weight="800">IATF</text>
      <text x="380" y="50" font-size="11">16949 · PPAP</text>
      <text x="380" y="68" class="ko-r" font-size="9" opacity="0.92">자동차 OEM 1 차 협력사</text>
    </g>
  </g>
</svg>
