<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="패키지 4 — 고무 양산 (대중소상생 LG AI 12 개월, 5 시나리오)"
     class="zoomable">
  <title>패키지 4 — 고무 양산 (대중소상생 LG EXAONE 12 개월)</title>
  <desc>RUB-01·02·05 + LLM-03 + MLO-01 의 5 시나리오를 LG EXAONE sLM 결합 구조 위에서 통합 운영하는 자동차 부품 고무·폴리머 양산 12 개월 통합 파일럿 인포그래픽.</desc>

  <defs>
    <linearGradient id="pkg4-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FFA726"/>
    </linearGradient>
    <filter id="pkg4-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="pkg4-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <!-- 상단 헤더 -->
  <rect width="800" height="80" fill="url(#pkg4-bg)"/>
  <text x="32" y="34" class="en" fill="rgba(255,255,255,0.95)" font-size="11">PACKAGE 04 · RUBBER &amp; POLYMER · LG EXAONE · 12 MONTHS</text>
  <text x="32" y="62" class="ko" fill="white" font-size="24">고무 양산 · 압출 + EXAONE 결합</text>
  <g transform="translate(700, 22)" filter="url(#pkg4-glow)">
    <circle cx="36" cy="20" r="20" fill="#1A237E"/>
    <text x="36" y="26" text-anchor="middle" class="ko" fill="#FFB300" font-size="20">4</text>
  </g>

  <!-- 중간 — 4 단 양산 흐름 + 시나리오 매핑 -->
  <g transform="translate(32, 100)">
    <text x="0" y="0" class="ko" fill="#BF360C" font-size="13">5 시나리오 — 배합 → 압출 → 가류 → 외관 + LLM·MLOps</text>
  </g>

  <g transform="translate(32, 116)">
    <!-- 백본 화살표 -->
    <line x1="80" y1="40" x2="700" y2="40" stroke="#FF8A65" stroke-width="2"/>
    <polygon points="700,40 690,34 690,46" fill="#FF8A65"/>

    <!-- Stage 1 - 배합 -->
    <g filter="url(#pkg4-shadow)">
      <circle cx="80" cy="40" r="34" fill="white"/>
      <circle cx="80" cy="40" r="34" fill="#FFE0B2" opacity="0.5"/>
      <text x="80" y="36" text-anchor="middle" class="ko" fill="#E65100" font-size="11">RUB-01</text>
      <text x="80" y="50" text-anchor="middle" class="ko-r" fill="#5D4037" font-size="9">배합 분산도</text>
    </g>
    <text x="80" y="92" text-anchor="middle" class="ko" fill="#BF360C" font-size="11">밴버리·믹서</text>

    <!-- Stage 2 - 압출 (주력) -->
    <g filter="url(#pkg4-shadow)" transform="translate(176, 0)">
      <circle cx="80" cy="40" r="38" fill="#E65100"/>
      <text x="80" y="36" text-anchor="middle" class="ko" fill="white" font-size="12">RUB-02</text>
      <text x="80" y="52" text-anchor="middle" class="ko-r" fill="white" font-size="9">치수·표면 (주력)</text>
    </g>
    <text x="256" y="92" text-anchor="middle" class="ko" fill="#BF360C" font-size="11">압출 (extrusion)</text>

    <!-- Stage 3 - 가류 -->
    <g filter="url(#pkg4-shadow)" transform="translate(352, 0)">
      <circle cx="80" cy="40" r="34" fill="white"/>
      <circle cx="80" cy="40" r="34" fill="#FFCCBC" opacity="0.5"/>
      <text x="80" y="36" text-anchor="middle" class="ko" fill="#BF360C" font-size="11">160~200 ℃</text>
      <text x="80" y="50" text-anchor="middle" class="ko-r" fill="#5D4037" font-size="9">가류 (curing)</text>
    </g>
    <text x="432" y="92" text-anchor="middle" class="ko" fill="#BF360C" font-size="11">가류</text>

    <!-- Stage 4 - 외관 -->
    <g filter="url(#pkg4-shadow)" transform="translate(528, 0)">
      <circle cx="80" cy="40" r="34" fill="white"/>
      <circle cx="80" cy="40" r="34" fill="#FFE0B2" opacity="0.5"/>
      <text x="80" y="36" text-anchor="middle" class="ko" fill="#E65100" font-size="11">RUB-05</text>
      <text x="80" y="50" text-anchor="middle" class="ko-r" fill="#5D4037" font-size="9">외관 비전</text>
    </g>
    <text x="608" y="92" text-anchor="middle" class="ko" fill="#BF360C" font-size="11">외관 검사</text>

    <!-- 인프라 레이어 -->
    <g transform="translate(0, 110)" class="ko" font-size="10" fill="white">
      <g filter="url(#pkg4-shadow)">
        <rect width="346" height="46" rx="8" fill="#6A1B9A"/>
        <text x="16" y="20" font-size="12">Track 3 — LLM-03 (EXAONE)</text>
        <text x="16" y="36" class="ko-r" font-size="9" opacity="0.92">8D 보고서 자동 작성 · 한국어 sLM 1 차 적용</text>
      </g>
      <g filter="url(#pkg4-shadow)" transform="translate(366, 0)">
        <rect width="346" height="46" rx="8" fill="#283593"/>
        <text x="16" y="20" font-size="12">Track 2 — MLO-01 (첫 적용)</text>
        <text x="16" y="36" class="ko-r" font-size="9" opacity="0.92">드리프트 탐지 · 자동 재학습 · 12 개월 모델 수명</text>
      </g>
    </g>
  </g>

  <!-- 하단 — 통계 -->
  <g transform="translate(32, 296)">
    <rect width="736" height="80" rx="10" fill="#FFF8E1" stroke="#FFCC80" stroke-width="1"/>
    <g class="ko" font-size="11" fill="#5D4037">
      <text x="20" y="26" font-size="22" font-weight="800" fill="#E65100">12</text>
      <text x="20" y="50" font-size="10">개월 · 표준</text>
      <text x="20" y="66" class="ko-r" font-size="9" fill="#8D6E63">대중소상생 LG AI</text>

      <text x="160" y="26" font-size="22" font-weight="800" fill="#E65100">5</text>
      <text x="160" y="50" font-size="10">시나리오 · 5.2 카드 5 종</text>
      <text x="160" y="66" class="ko-r" font-size="9" fill="#8D6E63">RUB 3 + LLM 1 + MLO 1</text>

      <text x="320" y="26" font-size="22" font-weight="800" fill="#E65100">7</text>
      <text x="320" y="50" font-size="10">핵심 KPI</text>
      <text x="320" y="66" class="ko-r" font-size="9" fill="#8D6E63">치수·결함·배합·8D·수명</text>

      <text x="460" y="26" font-size="22" font-weight="800" fill="#1A237E">EXAONE</text>
      <text x="460" y="50" font-size="10">LG sLM · 한국어 도메인</text>
      <text x="460" y="66" class="ko-r" font-size="9" fill="#8D6E63">민감도 라우팅 · 온프레미스</text>

      <text x="620" y="26" font-size="22" font-weight="800" fill="#E65100">IATF</text>
      <text x="620" y="50" font-size="10">16949 · PPAP · SQA</text>
      <text x="620" y="66" class="ko-r" font-size="9" fill="#8D6E63">자동차 OEM 1 차 협력사</text>
    </g>
  </g>
</svg>
