<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="패키지 1 — 대기업 철강 전사 AI 다년 R&amp;D (33 개월, 9 시나리오)"
     class="zoomable">
  <title>패키지 1 — 대기업 철강 전사 AI (다년 R&amp;D 33 개월)</title>
  <desc>STL-01·03·09·10 + UTL-01 + MLO-01·02 + LLM-02 + SAF-02 의 9 시나리오를 통합 설비제어·관제 AI 플랫폼으로 결합하는 대기업 철강 전사 다년 R&amp;D 통합 파일럿 인포그래픽.</desc>

  <defs>
    <linearGradient id="pkg1-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <filter id="pkg1-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="pkg1-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <!-- 상단 헤더 -->
  <rect width="800" height="80" fill="url(#pkg1-bg)"/>
  <text x="32" y="34" class="en" fill="rgba(255,255,255,0.7)" font-size="11">PACKAGE 01 · ENTERPRISE STEEL · MULTI-YEAR R&amp;D</text>
  <text x="32" y="62" class="ko" fill="white" font-size="24">대기업 철강 전사 AI · 통합 설비제어 관제 플랫폼</text>
  <g transform="translate(700, 22)" filter="url(#pkg1-glow)">
    <circle cx="36" cy="20" r="20" fill="#FFB300"/>
    <text x="36" y="26" text-anchor="middle" class="ko" fill="#1A237E" font-size="20">1</text>
  </g>

  <!-- 중간 — 시나리오 카드 그리드 (3×3) -->
  <g transform="translate(32, 100)">
    <text x="0" y="0" class="ko" fill="#1A237E" font-size="13">9 시나리오 통합 — STL · UTL · MLO · LLM · SAF</text>
  </g>
  <g transform="translate(32, 114)" class="ko" font-size="11" fill="white">
    <!-- Row 1 — Track 1 (steel) -->
    <g filter="url(#pkg1-shadow)">
      <rect x="0" y="0" width="160" height="48" rx="8" fill="#1565C0"/>
      <text x="12" y="20" font-size="12">STL-01</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">연속주조 표면결함 비전</text>
    </g>
    <g filter="url(#pkg1-shadow)" transform="translate(176, 0)">
      <rect width="160" height="48" rx="8" fill="#1976D2"/>
      <text x="12" y="20" font-size="12">STL-03</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">압연 두께 조기경보</text>
    </g>
    <g filter="url(#pkg1-shadow)" transform="translate(352, 0)">
      <rect width="160" height="48" rx="8" fill="#1E88E5"/>
      <text x="12" y="20" font-size="12">STL-09</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">압연기 예지보전</text>
    </g>
    <g filter="url(#pkg1-shadow)" transform="translate(528, 0)">
      <rect width="208" height="48" rx="8" fill="#2196F3"/>
      <text x="12" y="20" font-size="12">STL-10 + UTL-01</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">전기로 전력·소둔 에너지 최적화</text>
    </g>
    <!-- Row 2 — Track 2 + 3 + Safety -->
    <g filter="url(#pkg1-shadow)" transform="translate(0, 60)">
      <rect width="160" height="48" rx="8" fill="#6A1B9A"/>
      <text x="12" y="20" font-size="12">MLO-01</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">드리프트·재학습</text>
    </g>
    <g filter="url(#pkg1-shadow)" transform="translate(176, 60)">
      <rect width="160" height="48" rx="8" fill="#7B1FA2"/>
      <text x="12" y="20" font-size="12">MLO-02</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">3 단 거버넌스 운영</text>
    </g>
    <g filter="url(#pkg1-shadow)" transform="translate(352, 60)">
      <rect width="160" height="48" rx="8" fill="#00695C"/>
      <text x="12" y="20" font-size="12">LLM-02</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">도메인 sLM 작업지시</text>
    </g>
    <g filter="url(#pkg1-shadow)" transform="translate(528, 60)">
      <rect width="208" height="48" rx="8" fill="#E65100"/>
      <text x="12" y="20" font-size="12">SAF-02 — CBAM·EU</text>
      <text x="12" y="38" class="ko-r" font-size="10" opacity="0.92">탄소배출 자동 인증·신고</text>
    </g>
  </g>

  <!-- 하단 — 핵심 통계 -->
  <g transform="translate(32, 296)">
    <rect width="736" height="80" rx="10" fill="#F5F7FA" stroke="#CFD8DC" stroke-width="1"/>
    <g class="ko" font-size="11" fill="#37474F">
      <text x="20" y="26" font-size="22" font-weight="800" fill="#1565C0">33</text>
      <text x="20" y="50" font-size="10">개월 · 다년 R&amp;D</text>
      <text x="20" y="66" class="ko-r" font-size="9" fill="#78909C">1단계 9M + 2단계 24M</text>

      <text x="160" y="26" font-size="22" font-weight="800" fill="#1565C0">9</text>
      <text x="160" y="50" font-size="10">시나리오 · 5.2 카드 5 종</text>
      <text x="160" y="66" class="ko-r" font-size="9" fill="#78909C">a·b·c·d·e·f 결합</text>

      <text x="320" y="26" font-size="22" font-weight="800" fill="#1565C0">7</text>
      <text x="320" y="50" font-size="10">핵심 KPI</text>
      <text x="320" y="66" class="ko-r" font-size="9" fill="#78909C">두께 σ·돌발정지·CBAM 공수</text>

      <text x="460" y="26" font-size="22" font-weight="800" fill="#F57F17">CBAM</text>
      <text x="460" y="50" font-size="10">EU 수출 직접 트리거</text>
      <text x="460" y="66" class="ko-r" font-size="9" fill="#78909C">SAF-02 + 모듈 7 블록</text>

      <text x="620" y="26" font-size="22" font-weight="800" fill="#1565C0">전사</text>
      <text x="620" y="50" font-size="10">DX 촉진 R&amp;D</text>
      <text x="620" y="66" class="ko-r" font-size="9" fill="#78909C">v2.8 · 67 쪽 양식</text>
    </g>
  </g>
</svg>
