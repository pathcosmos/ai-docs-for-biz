<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="모듈 — CBAM 대응 크로스커팅 블록 (BLK-CBAM-A~G 7 블록)"
     class="zoomable">
  <title>CBAM 대응 크로스커팅 모듈 — 7 블록 · 7 삽입 지점</title>
  <desc>EU 탄소국경조정제도(CBAM) 대응 모듈의 3 단계 — CO2 측정 · MRV 절차 · 인증 자동화 — 와 BLK-CBAM-A~G 7 개 재사용 블록을 시각화한 도식.</desc>

  <defs>
    <linearGradient id="cbam-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="cbam-step" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="cbam-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.06em; }
    </style>
  </defs>

  <!-- 헤더 -->
  <rect width="800" height="70" fill="url(#cbam-header)"/>
  <g transform="translate(30, 20)">
    <!-- EU 깃발 원형 별 -->
    <circle cx="20" cy="20" r="18" fill="#003399"/>
    <g fill="#FFCC00" font-size="10" text-anchor="middle">
      <text x="20" y="14">★</text>
      <text x="29" y="20">★</text>
      <text x="20" y="28">★</text>
      <text x="11" y="20">★</text>
    </g>
  </g>
  <text x="80" y="32" class="ko" font-size="20" fill="white">모듈 · CBAM(탄소국경조정제도) 대응</text>
  <text x="80" y="54" class="en" font-size="11" fill="rgba(255,255,255,0.85)">CARBON BORDER ADJUSTMENT MECHANISM · 7 CROSS-CUTTING BLOCKS</text>
  <text x="770" y="42" class="ko" font-size="13" fill="#FFEB3B" text-anchor="end">제품 단위 내재배출량 신고 의무</text>

  <!-- 3 단계 코어 도식 -->
  <g transform="translate(40, 100)" filter="url(#cbam-shadow)">
    <rect width="220" height="170" rx="12" fill="white" stroke="#A5D6A7" stroke-width="2"/>
    <rect width="220" height="42" rx="12" fill="url(#cbam-step)"/>
    <rect y="30" width="220" height="12" fill="url(#cbam-step)"/>
    <text x="20" y="28" class="ko" font-size="15" fill="white">① CO₂ 측정</text>
    <text x="20" y="68" class="ko" font-size="11" fill="#1B5E20">에너지·원료 데이터 적재</text>
    <g transform="translate(20, 80)" font-size="10" fill="#33691E" class="ko">
      <text y="0">• FEMS · 전력 · LNG · 압축공기</text>
      <text y="16">• 밀시트 · 원료 투입량</text>
      <text y="32">• 직접 배출 + 간접 배출</text>
      <text y="48">• 계열 합산 → 제품 단위 귀속</text>
      <text y="68" font-weight="700" fill="#1B5E20">▸ BLK-CBAM-C</text>
    </g>
  </g>

  <g transform="translate(290, 100)" filter="url(#cbam-shadow)">
    <rect width="220" height="170" rx="12" fill="white" stroke="#A5D6A7" stroke-width="2"/>
    <rect width="220" height="42" rx="12" fill="url(#cbam-step)"/>
    <rect y="30" width="220" height="12" fill="url(#cbam-step)"/>
    <text x="20" y="28" class="ko" font-size="15" fill="white">② MRV 절차</text>
    <text x="20" y="68" class="ko" font-size="11" fill="#1B5E20">측정·보고·검증 자동 산정</text>
    <g transform="translate(20, 80)" font-size="10" fill="#33691E" class="ko">
      <text y="0">• 분기별 신고 산정 엔진</text>
      <text y="16">• 5.2-b 시계열 + 5.2-e 자동화</text>
      <text y="32">• 기본값(Default) 회피</text>
      <text y="48">• Scope 3 LCA 연계</text>
      <text y="68" font-weight="700" fill="#1B5E20">▸ BLK-CBAM-D</text>
    </g>
  </g>

  <g transform="translate(540, 100)" filter="url(#cbam-shadow)">
    <rect width="220" height="170" rx="12" fill="white" stroke="#A5D6A7" stroke-width="2"/>
    <rect width="220" height="42" rx="12" fill="url(#cbam-step)"/>
    <rect y="30" width="220" height="12" fill="url(#cbam-step)"/>
    <text x="20" y="28" class="ko" font-size="15" fill="white">③ 인증 자동화</text>
    <text x="20" y="68" class="ko" font-size="11" fill="#1B5E20">RAG 기반 규제 문서 검색</text>
    <g transform="translate(20, 80)" font-size="10" fill="#33691E" class="ko">
      <text y="0">• EU 시행규칙 · K-ETS 4 기</text>
      <text y="16">• 5.2-f LLM·RAG (BLK-CBAM-F)</text>
      <text y="32">• Citation · 외부 검증 양식</text>
      <text y="48">• 분기 신고서 자동 생성</text>
      <text y="68" font-weight="700" fill="#1B5E20">▸ BLK-CBAM-F·G</text>
    </g>
  </g>

  <!-- 화살표 -->
  <g fill="#2E7D32">
    <polygon points="265,180 285,170 285,190"/>
    <polygon points="515,180 535,170 535,190"/>
  </g>

  <!-- 하단 7 블록 인덱스 -->
  <g transform="translate(40, 295)">
    <text x="0" y="0" class="ko" font-size="12" fill="#1B5E20">7 블록 · 7 삽입 지점 — Track 1 § 1.2 / 1.4 / 4.3 / 5.x / 6.2 / 7.2 + 부록</text>
  </g>
  <g transform="translate(40, 312)" font-size="10" class="ko">
    <g fill="#2E7D32">
      <rect x="0" y="0" width="100" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32"/>
      <text x="50" y="15" text-anchor="middle" font-weight="700">A · 배경·시의성</text>
    </g>
    <g fill="#2E7D32">
      <rect x="106" y="0" width="100" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32"/>
      <text x="156" y="15" text-anchor="middle" font-weight="700">B · 노출도</text>
    </g>
    <g fill="#2E7D32">
      <rect x="212" y="0" width="100" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32"/>
      <text x="262" y="15" text-anchor="middle" font-weight="700">C · 데이터</text>
    </g>
    <g fill="#2E7D32">
      <rect x="318" y="0" width="100" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
      <text x="368" y="15" text-anchor="middle" font-weight="700">D · 산정 엔진</text>
    </g>
    <g fill="#2E7D32">
      <rect x="424" y="0" width="100" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32"/>
      <text x="474" y="15" text-anchor="middle" font-weight="700">E · 정성효과</text>
    </g>
    <g fill="#2E7D32">
      <rect x="530" y="0" width="100" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32"/>
      <text x="580" y="15" text-anchor="middle" font-weight="700">F · 규제 RAG</text>
    </g>
    <g fill="#2E7D32">
      <rect x="636" y="0" width="100" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32"/>
      <text x="686" y="15" text-anchor="middle" font-weight="700">G · 용어집</text>
    </g>
  </g>

  <!-- 하단 통계 -->
  <g transform="translate(40, 360)" font-size="11" class="ko" fill="#1B5E20">
    <text x="0" y="0" font-weight="700">SCN-SAF-02 결합</text>
    <text x="0" y="16" font-size="9" fill="#558B2F">CBAM 신고 자동화 시나리오 1:1 정합</text>
    <text x="200" y="0" font-weight="700">수출 비중 [수출비중]%</text>
    <text x="200" y="16" font-size="9" fill="#558B2F">EU향 매출 = 시급성 명분</text>
    <text x="420" y="0" font-weight="700">[법령-2026] 갱신</text>
    <text x="420" y="16" font-size="9" fill="#558B2F">기본값 회피 + 분기 신고</text>
    <text x="620" y="0" font-weight="700" fill="#F57F17">EU 시행 + K-ETS 4 기</text>
    <text x="620" y="16" font-size="9" fill="#558B2F">중첩 규제 동시 대응</text>
  </g>
</svg>
