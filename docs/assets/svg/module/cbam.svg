<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="모듈 — CBAM 대응 7 블록 세로 카드">
  <title>CBAM 대응 모듈 — EU 수출·탄소국경조정 7 블록</title>
  <desc>EU 탄소국경조정제도(CBAM) 대응 모듈의 7 블록(A 배경·B 노출도·C 데이터·D 산정 엔진·E 정성·F RAG·G 용어)을 위에서 아래로 시각화. UTL-03·SAF-02 시너지 시나리오 인덱스 포함.</desc>

  <defs>
    <linearGradient id="cb-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="cb-card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="cb-star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="cb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: Pretendard, system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: Pretendard, system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: Pretendard, system-ui, -apple-system, sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <rect width="600" height="100" fill="url(#cb-header)"/>
  <text x="300" y="38" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">CBAM · CARBON BORDER ADJUSTMENT MECHANISM</text>
  <text x="300" y="68" text-anchor="middle" class="ko" font-size="22" fill="white">CBAM 대응 — EU 수출·탄소국경</text>
  <text x="300" y="88" text-anchor="middle" class="ko-r" font-size="11" fill="rgba(255,255,255,0.9)">7 블록 · 제품 단위 내재배출량 신고 의무</text>

  <!-- A 배경 -->
  <g transform="translate(40, 118)" filter="url(#cb-shadow)">
    <rect width="520" height="74" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="26" rx="8" fill="url(#cb-card)"/>
    <rect y="16" width="520" height="10" fill="url(#cb-card)"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">BLK-CBAM-A · 배경·시의성</text>
    <text x="14" y="48" class="ko" font-size="13" fill="#047857">EU 시행 + K-ETS 4 기 중첩 규제</text>
    <text x="14" y="66" class="ko-r" font-size="10" fill="#475569">2026 본격 적용 · 분기별 내재배출량 신고 의무 · 기본값 회피</text>
  </g>

  <!-- B 노출도 -->
  <g transform="translate(40, 200)" filter="url(#cb-shadow)">
    <rect width="520" height="74" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="26" rx="8" fill="url(#cb-card)"/>
    <rect y="16" width="520" height="10" fill="url(#cb-card)"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">BLK-CBAM-B · 수출 노출도</text>
    <text x="14" y="48" class="ko" font-size="13" fill="#047857">EU 향 매출 [수출비중]% — 시급성 명분</text>
    <text x="14" y="66" class="ko-r" font-size="10" fill="#475569">철강·금속·유리·시멘트·알루미늄 · 부산경남 수출 클러스터</text>
  </g>

  <!-- C 데이터 -->
  <g transform="translate(40, 282)" filter="url(#cb-shadow)">
    <rect width="520" height="74" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="26" rx="8" fill="url(#cb-card)"/>
    <rect y="16" width="520" height="10" fill="url(#cb-card)"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">BLK-CBAM-C · 에너지·원료 데이터</text>
    <text x="14" y="48" class="ko" font-size="13" fill="#047857">FEMS · 전력 · LNG · 압축공기 · 밀시트 적재</text>
    <text x="14" y="66" class="ko-r" font-size="10" fill="#475569">직접 + 간접 배출 · 계열 합산 → 제품 단위 귀속</text>
  </g>

  <!-- D 산정 엔진 (★ 핵심) -->
  <g transform="translate(40, 364)" filter="url(#cb-shadow)">
    <rect width="520" height="92" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <rect width="520" height="26" rx="8" fill="url(#cb-star)"/>
    <rect y="16" width="520" height="10" fill="url(#cb-star)"/>
    <text x="14" y="18" class="ko" font-size="12" fill="#0F172A">BLK-CBAM-D · 산정 엔진 ★</text>
    <text x="490" y="18" text-anchor="end" class="en" font-size="9" fill="#0F172A">CORE</text>
    <text x="14" y="50" class="ko" font-size="14" fill="#047857">분기별 신고 산정 엔진</text>
    <text x="14" y="68" class="ko-r" font-size="10" fill="#475569">5.2-b 시계열 + 5.2-e 자동화 결합 · Scope 3 LCA 연계</text>
    <text x="14" y="84" class="ko-r" font-size="9" fill="#64748B">기본값(Default) 회피 · 실측값 우선 · 분기 신고서 자동 생성</text>
  </g>

  <!-- E 정성효과 -->
  <g transform="translate(40, 464)" filter="url(#cb-shadow)">
    <rect width="520" height="74" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="26" rx="8" fill="url(#cb-card)"/>
    <rect y="16" width="520" height="10" fill="url(#cb-card)"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">BLK-CBAM-E · 정성효과</text>
    <text x="14" y="48" class="ko" font-size="13" fill="#047857">EU 수출 유지 · 컴플라이언스 신뢰</text>
    <text x="14" y="66" class="ko-r" font-size="10" fill="#475569">기본값 대비 정확 산정 → 부담금 [%] 절감 · ESG 등급 개선</text>
  </g>

  <!-- F 규제 RAG -->
  <g transform="translate(40, 546)" filter="url(#cb-shadow)">
    <rect width="520" height="74" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="26" rx="8" fill="url(#cb-card)"/>
    <rect y="16" width="520" height="10" fill="url(#cb-card)"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">BLK-CBAM-F · 규제 RAG</text>
    <text x="14" y="48" class="ko" font-size="13" fill="#047857">EU 시행규칙 · K-ETS 4 기 자동 검색</text>
    <text x="14" y="66" class="ko-r" font-size="10" fill="#475569">5.2-f LLM·RAG · Citation · 외부 검증 양식 · [법령-2026] 갱신</text>
  </g>

  <!-- G 용어집 -->
  <g transform="translate(40, 628)" filter="url(#cb-shadow)">
    <rect width="520" height="74" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="26" rx="8" fill="url(#cb-card)"/>
    <rect y="16" width="520" height="10" fill="url(#cb-card)"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">BLK-CBAM-G · 용어집·법령 표</text>
    <text x="14" y="48" class="ko" font-size="13" fill="#047857">CBAM·MRV·LCA·Scope 1/2/3 한국어 표준</text>
    <text x="14" y="66" class="ko-r" font-size="10" fill="#475569">규제 용어 + 제품 카테고리 + 신고 양식 항목 + 검증 절차</text>
  </g>

  <!-- 하단 시너지 -->
  <g transform="translate(30, 720)" filter="url(#cb-shadow)">
    <rect width="540" height="68" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#047857">시너지 시나리오 — UTL-03 (FEMS 에너지) · SAF-02 (CBAM 신고 자동화)</text>
    <text x="14" y="38" class="ko-r" font-size="9" fill="#475569">패키지 6 (유틸·ESG 12 개월) 핵심 모듈 · 갭 19 해소 · 외부 검증 양식 정합</text>
    <text x="14" y="54" class="ko-r" font-size="9" fill="#64748B">→ 사업계획서 §1.2·1.4·4.3·5.x·6.2·7.2 + 부록 7 삽입 지점</text>
  </g>
</svg>
