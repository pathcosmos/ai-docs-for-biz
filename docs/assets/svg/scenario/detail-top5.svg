<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="철강 Top 5 시나리오 상세 — 5 카드 세로형"
     class="zoomable">
  <title>시나리오 상세 — 철강 Top 5 (STL-01·02·05·06·09)</title>
  <desc>철강 도메인 우선 도입 Top 5 시나리오 — 연속주조 (STL-01) · 압연 형상 (STL-02) · 냉연 두께 (STL-05) · 표면 비전 (STL-06) · 예지보전 (STL-09) — 의 모델·KPI·도입난이도·기간을 5 카드 세로 stack 으로 시각화.</desc>

  <defs>
    <linearGradient id="t5-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="t5-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="t5-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
    <filter id="t5-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#t5-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">철강 Top 5 시나리오</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">SCN-STL · PRIORITY 5</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#E0E7FF">연주 · 압연 · 냉연 · 표면 · 예지보전 — 도입 우선순위 5 종</text>

  <!-- 5 시나리오 카드 stack (110~600) -->
  <g filter="url(#t5-shadow)">
    <g transform="translate(40, 120)">
      <rect width="520" height="92" rx="10" fill="url(#t5-card)" stroke="#6366F1" stroke-width="2"/>
      <rect width="80" height="92" rx="10" fill="#6366F1"/><rect x="70" width="10" height="92" fill="#6366F1"/>
      <text x="40" y="38" text-anchor="middle" class="en" font-size="11" fill="white">STL-01</text>
      <text x="40" y="62" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">★1</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">연속주조 표면결함 예측</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">CCM 센서 · 시계열 · LSTM/Transformer 앙상블</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#6366F1">KPI: 결함률 -25% · 검사시간 -40% · ROI 1.8 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="320" height="6" rx="3" fill="url(#t5-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★★ · 기간 9-12 개월 · TRL 5→7</text>
    </g>

    <g transform="translate(40, 222)">
      <rect width="520" height="92" rx="10" fill="url(#t5-card)" stroke="#6366F1" stroke-width="2"/>
      <rect width="80" height="92" rx="10" fill="#6366F1"/><rect x="70" width="10" height="92" fill="#6366F1"/>
      <text x="40" y="38" text-anchor="middle" class="en" font-size="11" fill="white">STL-02</text>
      <text x="40" y="62" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">★2</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">압연 형상·평탄도 제어</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">압연 하중·롤갭 · 회귀 + 강화학습 보정</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#6366F1">KPI: 형상오차 -30% · 재압연률 -35% · ROI 2.0 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="285" height="6" rx="3" fill="url(#t5-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★★ · 기간 12 개월 · TRL 5→7</text>
    </g>

    <g transform="translate(40, 324)">
      <rect width="520" height="92" rx="10" fill="url(#t5-card)" stroke="#6366F1" stroke-width="2"/>
      <rect width="80" height="92" rx="10" fill="#6366F1"/><rect x="70" width="10" height="92" fill="#6366F1"/>
      <text x="40" y="38" text-anchor="middle" class="en" font-size="11" fill="white">STL-05</text>
      <text x="40" y="62" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">★3</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">냉연 두께 편차 보정</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">두께계 · 장력·속도 · XGBoost + PID 협조</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#6366F1">KPI: 두께편차 -40% · 수율 +3.5% · ROI 1.5 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="240" height="6" rx="3" fill="url(#t5-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★ · 기간 6-9 개월 · TRL 6→8</text>
    </g>

    <g transform="translate(40, 426)">
      <rect width="520" height="92" rx="10" fill="url(#t5-card)" stroke="#6366F1" stroke-width="2"/>
      <rect width="80" height="92" rx="10" fill="#6366F1"/><rect x="70" width="10" height="92" fill="#6366F1"/>
      <text x="40" y="38" text-anchor="middle" class="en" font-size="11" fill="white">STL-06</text>
      <text x="40" y="62" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">★4</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">표면 결함 비전 검사</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">라인스캔 · CNN (YOLO·EfficientNet) · 분류·세그</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#6366F1">KPI: 검출률 99.2% · 오검 -55% · 인력 -2 명/교대</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="200" height="6" rx="3" fill="url(#t5-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★ · 기간 6 개월 · TRL 7→9</text>
    </g>

    <g transform="translate(40, 528)">
      <rect width="520" height="92" rx="10" fill="url(#t5-card)" stroke="#6366F1" stroke-width="2"/>
      <rect width="80" height="92" rx="10" fill="#6366F1"/><rect x="70" width="10" height="92" fill="#6366F1"/>
      <text x="40" y="38" text-anchor="middle" class="en" font-size="11" fill="white">STL-09</text>
      <text x="40" y="62" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">★5</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">설비 예지보전 (PdM)</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">진동·온도·전류 · 이상탐지 + RUL 회귀</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#6366F1">KPI: 비계획 정지 -45% · MTBF +30% · ROI 1.6 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="260" height="6" rx="3" fill="url(#t5-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★ · 기간 6-9 개월 · TRL 6→8</text>
    </g>
  </g>

  <!-- 종합 요약 바 -->
  <g transform="translate(40, 640)">
    <rect width="520" height="50" rx="6" fill="#FBBF24" filter="url(#t5-shadow)"/>
    <text x="20" y="22" class="ko" font-size="13" fill="#0F172A">5 시나리오 통합 도입 — 평균 ROI 1.7 년 · 24-30 개월 단계 도입</text>
    <text x="20" y="40" class="ko-r" font-size="10" fill="#0F172A">패키지 1 (대기업철강 9) · 패키지 2 (중견냉연 6) 핵심 구성</text>
  </g>

  <!-- 하단 인덱스 -->
  <g transform="translate(40, 700)">
    <rect width="520" height="80" rx="8" fill="white" stroke="#6366F1" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="20" y="22" class="ko" font-size="12" fill="#3730A3">조합 매핑 — 6 패키지 / 트랙 1·2 통합 활용</text>
    <text x="20" y="40" class="ko-r" font-size="10" fill="#475569">▸ STL-06 + STL-09 = MES 통합 PdM (빠른 ROI 도입)</text>
    <text x="20" y="56" class="ko-r" font-size="10" fill="#475569">▸ STL-01·02·05 = 압연 라인 전체 품질 통합 (3 종 결합)</text>
    <text x="20" y="72" class="ko-r" font-size="10" fill="#6366F1">▸ Top4 중첩: LLM-01 + UTL-01 추가 시 패키지 1 완성</text>
  </g>
</svg>
