<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="시나리오 상세 — 재사용성 Top 5 (LLM-01 · STL-08 · STL-04 · STL-09 · UTL-01)"
     class="zoomable">
  <title>시나리오 상세 — 재사용성 Top 5 · 압연기 아이콘 + 5 시나리오 카드</title>
  <desc>부산·경남 제조 클러스터에서 재사용 효율이 가장 높은 5 시나리오 — SOP RAG, 밀시트 OCR, 패스 스케줄, 압연기 예지보전, 에너지 최적화 — 의 카드 도식.</desc>

  <defs>
    <linearGradient id="t5-header" x1="0" y1="0" x2="1" y2="0">
