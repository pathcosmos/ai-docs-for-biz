    <rect width="720" height="50" rx="8" fill="rgba(13,71,161,0.06)" stroke="#1565C0" stroke-dasharray="3 2"/>
    <text x="20" y="20" class="ko" font-size="11" fill="#0D47A1" font-weight="700">5 단 구조</text>
    <text x="100" y="20" class="ko" font-size="10" fill="#1565C0">① 적용맥락 → ② AS-IS 공백 → ③ AI 해결 운영 → ④ 기대효과 표 → ⑤ Mermaid 도식 1~2</text>
    <text x="20" y="40" class="ko" font-size="10" fill="#1565C0">▸ 부산·경남 클러스터 공통 적용 · 사업계획서 §8.1 / §5.2 직접 인용 가능 · 플레이스홀더만 교체로 1~2 페이지 즉시 채움</text>
  </g>

  <!-- 하단 인덱스 -->
  <g transform="translate(40, 380)" font-size="10" class="ko" fill="#0D47A1">
    <text x="0" y="0" font-weight="700">5 시나리오 = 5.2-a / 5.2-d / 5.2-e / 5.2-f 4 엔진 망라 · 공통 MLOps + 공통 RAG 인프라 공유 · 비선형 ROI</text>
  </g>
