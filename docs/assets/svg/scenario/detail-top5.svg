    <circle cx="34" cy="10" r="8" fill="white" stroke="#1565C0" stroke-width="2"/>
    <circle cx="10" cy="26" r="8" fill="white" stroke="#1565C0" stroke-width="2"/>
    <circle cx="34" cy="26" r="8" fill="white" stroke="#1565C0" stroke-width="2"/>
  </g>
  <text x="85" y="32" class="ko" font-size="20" fill="white">시나리오 상세 · 재사용성 Top 5</text>
