<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="시나리오 카탈로그 — 7 도메인 · 40 시나리오"
     class="zoomable">
  <title>제조 AI 시나리오 카탈로그 — 7 도메인 트리 (STL·MET·RUB·UTL·SAF·LLM·MLO)</title>
  <desc>40 종 시나리오 카탈로그를 7 도메인 (철강·금속·고무·유틸·안전·LLM·MLOps) 으로 분류한 트리 도식 + 도메인별 시나리오 수.</desc>

  <defs>
    <linearGradient id="cat-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="50%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
    <filter id="cat-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.06em; }
    </style>
  </defs>

  <rect width="800" height="70" fill="url(#cat-header)"/>
  <text x="30" y="32" class="ko" font-size="20" fill="white">시나리오 카탈로그 · 7 도메인 · 40 카드</text>
  <text x="30" y="54" class="en" font-size="11" fill="rgba(255,255,255,0.85)">SCENARIO CATALOG · STL · MET · RUB · UTL · MLO · LLM · SAF</text>
  <text x="770" y="42" class="ko" font-size="13" fill="#FFEB3B" text-anchor="end">독립 재사용 모듈 · 조합 가능</text>

