    <text x="115" y="0" font-weight="700">7 도메인 트리</text>
    <text x="245" y="0" font-weight="700">5 결합 패키지</text>
    <text x="375" y="0" font-weight="700">독립 재사용 모듈</text>
    <text x="0" y="20" font-size="9" fill="#3949AB">철강 12 + 금속 7 + 고무 5 + 유틸 6 + 안전 3 + LLM 4 + MLOps 3</text>
    <text x="500" y="20" font-size="9" fill="#F57F17" font-weight="700">▸ 업종·규모·데이터 성숙도별 조합</text>
