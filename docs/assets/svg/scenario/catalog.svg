    <text x="50" y="42" text-anchor="middle" class="ko" font-size="11" fill="#1565C0">철강·제강</text>
    <text x="50" y="62" text-anchor="middle" class="ko" font-size="20" fill="#0D47A1" font-weight="900">12</text>
    <text x="50" y="74" text-anchor="middle" class="ko" font-size="8" fill="#1976D2">연주·압연·열처리</text>
