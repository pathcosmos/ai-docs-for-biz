    <text x="20" y="22" class="ko" font-size="11" fill="#1A237E" font-weight="700">부록</text>
    <text x="60" y="22" class="ko" font-size="10" fill="#283593">A. 선택 가이드</text>
    <text x="180" y="22" class="ko" font-size="10" fill="#283593">B. 결합 패키지 5 종</text>
    <text x="320" y="22" class="ko" font-size="10" fill="#283593">C. 확장 축</text>
    <text x="430" y="22" class="ko" font-size="10" fill="#283593">D. 지원사업 매칭</text>
    <text x="20" y="44" class="ko" font-size="10" fill="#3949AB" font-weight="700">Top5:</text>
    <text x="65" y="44" class="ko" font-size="10" fill="#283593">LLM-01 · STL-08 · STL-04 · STL-09 · UTL-01</text>
    <text x="380" y="44" class="ko" font-size="10" fill="#3949AB" font-weight="700">결합 패키지:</text>
    <text x="465" y="44" class="ko" font-size="10" fill="#283593">P2(냉연)·P3(특수강관)·P4(고무)·P5(SaaS)·P6(유틸ESG)</text>
