    <path d="M 400 139 L 70 175"/>
    <path d="M 400 139 L 185 175"/>
    <path d="M 400 139 L 300 175"/>
    <path d="M 400 139 L 415 175"/>
    <path d="M 400 139 L 530 175"/>
    <path d="M 400 139 L 645 175"/>
    <path d="M 400 139 L 750 175"/>
  </g>

  <!-- 부록 카드 영역 -->
  <g transform="translate(40, 280)">
