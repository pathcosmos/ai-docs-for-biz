<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="TRL 진척 관리 가이드 — TRL 4·5~6·7~8 3 단계 인포그래픽">
  <title>TRL 진척 관리 가이드 — 다년 R&amp;D 단계별 기술 성숙도</title>
  <desc>다년 R&amp;D 양식이 강제하는 TRL 단계별 진척 관리 (TRL 4 → 5~6 → 7~8 직렬) 와 단계별 추진 목표 (1단계 컨설팅 보고서·2단계 1년차 시작품·2단계 2년차 통합 플랫폼) 시각화. 가이드 군 10 번째 자산.</desc>

  <defs>
    <linearGradient id="trl-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="trl-1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/><stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="trl-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/><stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
    <linearGradient id="trl-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB300"/><stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="trl-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#F5F7FA"/>

  <!-- 헤더 -->
  <rect width="800" height="50" fill="url(#trl-header)"/>
  <text x="30" y="32" class="ko" font-size="20" fill="white">TRL 진척 관리 · 다년 R&amp;D 3 단계</text>
  <text x="770" y="32" text-anchor="end" class="en" font-size="11" fill="rgba(255,255,255,0.8)">TRL PROGRESS</text>

  <!-- 3 단계 직렬 (TRL 4 → 5~6 → 7~8) -->
  <g transform="translate(40, 90)" filter="url(#trl-shadow)">
    <text x="0" y="-3" class="ko" font-size="13" fill="#1A237E">TRL 단계별 진척 (검증 강도 3 배)</text>

    <!-- 1단계 -->
    <g transform="translate(0, 8)">
      <rect x="0" y="0" width="225" height="115" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <rect x="0" y="0" width="225" height="32" rx="8" fill="url(#trl-1)"/><rect x="0" y="24" width="225" height="8" fill="url(#trl-1)"/>
      <text x="14" y="22" class="ko" font-size="14" fill="white">1단계 · TRL 4</text>
      <text x="14" y="50" class="ko-r" font-size="10" fill="#1565C0">실험실 환경 시작품</text><text x="14" y="65" class="ko" font-size="11" fill="#1A237E">컨설팅 보고서</text><text x="14" y="78" class="ko-r" font-size="9" fill="#37474F">역량 분석 + 추진 전략</text>
      <text x="14" y="94" class="ko" font-size="10" fill="#1565C0">기간: 9 개월</text><text x="14" y="107" class="ko-r" font-size="9" fill="#78909C">TRL 4 자기진단 + 외부 평가</text>
    </g>
    <!-- 화살표 1→2 -->
    <g transform="translate(225, 50)">
      <path d="M 5 15 L 35 15 L 30 8 M 35 15 L 30 22" stroke="#37474F" stroke-width="3" fill="none"/>
      <text x="20" y="40" text-anchor="middle" class="ko" font-size="10" fill="#37474F">단계 평가</text><text x="20" y="52" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">게이트</text>
    </g>
    <!-- 2단계 1년차 -->
    <g transform="translate(265, 8)">
      <rect x="0" y="0" width="225" height="115" rx="8" fill="white" stroke="#7E57C2" stroke-width="2"/>
      <rect x="0" y="0" width="225" height="32" rx="8" fill="url(#trl-2)"/><rect x="0" y="24" width="225" height="8" fill="url(#trl-2)"/>
      <text x="14" y="22" class="ko" font-size="14" fill="white">2단계 1년차 · TRL 5~6</text>
      <text x="14" y="50" class="ko-r" font-size="10" fill="#7E57C2">모의·실험실 환경 시범</text><text x="14" y="65" class="ko" font-size="11" fill="#1A237E">시작품 + 1차 시범 결과</text><text x="14" y="78" class="ko-r" font-size="9" fill="#37474F">알고리즘·인프라 위탁 결과</text>
      <text x="14" y="94" class="ko" font-size="10" fill="#7E57C2">기간: 12 개월</text><text x="14" y="107" class="ko-r" font-size="9" fill="#78909C">단계 평가 + 협약 변경 시점</text>
    </g>
    <!-- 화살표 2→3 -->
    <g transform="translate(490, 50)">
      <path d="M 5 15 L 35 15 L 30 8 M 35 15 L 30 22" stroke="#37474F" stroke-width="3" fill="none"/>
      <text x="20" y="40" text-anchor="middle" class="ko" font-size="10" fill="#37474F">단계 평가</text><text x="20" y="52" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">게이트</text>
    </g>
    <!-- 2단계 2년차 -->
    <g transform="translate(530, 8)">
      <rect x="0" y="0" width="225" height="115" rx="8" fill="white" stroke="#F57F17" stroke-width="2"/>
      <rect x="0" y="0" width="225" height="32" rx="8" fill="url(#trl-3)"/><rect x="0" y="24" width="225" height="8" fill="url(#trl-3)"/>
      <text x="14" y="22" class="ko" font-size="14" fill="white">2단계 2년차 · TRL 7~8</text>
      <text x="14" y="50" class="ko-r" font-size="10" fill="#F57F17">실 환경 실증·시제품 인증</text><text x="14" y="65" class="ko" font-size="11" fill="#1A237E">통합 플랫폼 + 사업화 BM</text><text x="14" y="78" class="ko-r" font-size="9" fill="#37474F">시스템 위탁 + 사업화</text>
      <text x="14" y="94" class="ko" font-size="10" fill="#F57F17">기간: 14 개월</text><text x="14" y="107" class="ko-r" font-size="9" fill="#78909C">사업 종료 게이트 (TRL 8)</text>
    </g>
  </g>

  <!-- 단계별 추진 목표 표 (하단) -->
  <g transform="translate(40, 235)">
    <text x="0" y="0" class="ko" font-size="12" fill="#1A237E">단계별 추진 목표 표 (양식 강제)</text>

    <g transform="translate(0, 8)">
      <rect x="0" y="0" width="720" height="20" fill="#1A237E"/>
      <text x="60" y="14" text-anchor="middle" class="ko" font-size="9" fill="white">단계</text>
      <text x="170" y="14" text-anchor="middle" class="ko" font-size="9" fill="white">기간</text>
      <text x="290" y="14" text-anchor="middle" class="ko" font-size="9" fill="white">TRL</text>
      <text x="430" y="14" text-anchor="middle" class="ko" font-size="9" fill="white">핵심 산출물</text>
      <text x="600" y="14" text-anchor="middle" class="ko" font-size="9" fill="white">검증</text>

      <g font-size="9" class="ko-r" fill="#37474F">
        <rect x="0" y="20" width="720" height="22" fill="white"/>
        <text x="60" y="35" text-anchor="middle" fill="#1565C0">1단계</text>
        <text x="170" y="35" text-anchor="middle">9 개월</text>
        <text x="290" y="35" text-anchor="middle">TRL 4</text>
        <text x="430" y="35" text-anchor="middle">컨설팅 보고서·역량 분석</text>
        <text x="600" y="35" text-anchor="middle">자기진단 + 외부</text>

        <rect x="0" y="42" width="720" height="22" fill="#F5F7FA"/>
        <text x="60" y="57" text-anchor="middle" fill="#7E57C2">2단계 1년차</text>
        <text x="170" y="57" text-anchor="middle">12 개월</text>
        <text x="290" y="57" text-anchor="middle">TRL 5~6</text>
        <text x="430" y="57" text-anchor="middle">시작품 1식 + 1차 시범 결과</text>
        <text x="600" y="57" text-anchor="middle">위탁 결과 + 외부</text>

        <rect x="0" y="64" width="720" height="22" fill="white"/>
        <text x="60" y="79" text-anchor="middle" fill="#F57F17">2단계 2년차</text>
        <text x="170" y="79" text-anchor="middle">14 개월</text>
        <text x="290" y="79" text-anchor="middle">TRL 7~8</text>
        <text x="430" y="79" text-anchor="middle">통합 플랫폼 + 사업화 BM·인증</text>
        <text x="600" y="79" text-anchor="middle">실 환경 + 인증</text>
      </g>
    </g>
  </g>

  <!-- 하단 통일 -->
  <g transform="translate(40, 340)">
    <rect x="0" y="0" width="720" height="45" rx="6" fill="#FFF3E0" stroke="#F57F17" stroke-width="1"/>
    <text x="14" y="16" class="ko" font-size="11" fill="#E65100">가이드 군 10 번째 · 양식검증 §7 갭 #15·#8 + 패키지 1 §5.1 1 차 적용</text>
    <text x="14" y="32" class="ko-r" font-size="10" fill="#37474F">▸ 8 장 구조 · 4 분기 (시점·방법·미달 대응·검증) · 강도 3 단계 (TRL 4 · 5~6 · 7~8)</text>
  </g>
</svg>
