<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="재무·예산 산정 가이드 — 5 비목 분포 세로형 인포그래픽"
     class="zoomable">
  <title>재무·예산 산정 가이드 (세로형) — 정부지원 표준 5 비목</title>
  <desc>정부지원 R&amp;D·스마트공장·DX 사업의 표준 5 비목 (인건비·연구장비재료비·연구활동비·연구과제추진비·연구수당) 도넛 차트 + 강도 3 단계 정부지원·자부담 비율 분기 + 가이드 군 통일 (8 장 + 4 분기) 세로형 인포그래픽.</desc>

  <defs>
    <linearGradient id="fb-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="fb-final" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="fb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#fb-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">재무·예산 산정 가이드</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">FINANCE &amp; BUDGET — 5 LINE ITEMS</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#FDE68A">정부지원 R&amp;D·스마트공장·DX 표준 비목 분포</text>

  <!-- 도넛 차트 (중앙 상부) -->
  <g transform="translate(300, 290)" filter="url(#fb-shadow)">
    <!-- 인건비 45 % -->
    <path d="M 0 -110 A 110 110 0 0 1 104.6 33.9 L 57 18.5 A 60 60 0 0 0 0 -60 Z" fill="#6366F1"/>
    <!-- 연구장비·재료비 25 % -->
    <path d="M 104.6 33.9 A 110 110 0 0 1 0 110 L 0 60 A 60 60 0 0 0 57 18.5 Z" fill="#818CF8"/>
    <!-- 연구활동비 10 % -->
    <path d="M 0 110 A 110 110 0 0 1 -64.6 89 L -35.3 48.5 A 60 60 0 0 0 0 60 Z" fill="#A5B4FC"/>
    <!-- 연구과제 추진비 (위탁) 15 % -->
    <path d="M -64.6 89 A 110 110 0 0 1 -110 0 L -60 0 A 60 60 0 0 0 -35.3 48.5 Z" fill="#F59E0B"/>
    <!-- 연구수당 5 % -->
    <path d="M -110 0 A 110 110 0 0 1 -104.6 -33.9 L -57 -18.5 A 60 60 0 0 0 -60 0 Z" fill="#FBBF24"/>
    <!-- 간접비 (잔여) -->
    <path d="M -104.6 -33.9 A 110 110 0 0 1 0 -110 L 0 -60 A 60 60 0 0 0 -57 -18.5 Z" fill="#10B981"/>
    <!-- 중앙 -->
    <circle cx="0" cy="0" r="50" fill="white"/>
    <text x="0" y="-4" text-anchor="middle" class="ko" font-size="14" fill="#1E293B">총 사업비</text>
    <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="10" fill="#64748B">5 비목 + 간접비</text>
  </g>

  <!-- 범례 (450~580) -->
  <g transform="translate(40, 440)" filter="url(#fb-shadow)">
    <rect width="520" height="160" rx="10" fill="white" stroke="#E2E8F0"/>
    <rect width="520" height="26" rx="10" fill="#6366F1"/>
    <rect y="20" width="520" height="6" fill="#6366F1"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">정부지원 표준 비목 분류</text>
    <text x="506" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">6 CATEGORIES</text>

    <g transform="translate(14, 38)">
      <rect width="14" height="14" fill="#6366F1"/>
      <text x="22" y="11" class="ko" font-size="10" fill="#1E293B">인건비</text>
      <text x="80" y="11" class="ko-r" font-size="9" fill="#475569">PM·DS·DE·MLE·QA + 도메인 전문가</text>
      <text x="490" y="11" text-anchor="end" class="ko" font-size="10" fill="#6366F1">45 %</text>
    </g>
    <g transform="translate(14, 58)">
      <rect width="14" height="14" fill="#818CF8"/>
      <text x="22" y="11" class="ko" font-size="10" fill="#1E293B">연구장비·재료비</text>
      <text x="130" y="11" class="ko-r" font-size="9" fill="#475569">GPU·MLOps·IoT 센서·비전 카메라</text>
      <text x="490" y="11" text-anchor="end" class="ko" font-size="10" fill="#6366F1">25 %</text>
    </g>
    <g transform="translate(14, 78)">
      <rect width="14" height="14" fill="#A5B4FC"/>
      <text x="22" y="11" class="ko" font-size="10" fill="#1E293B">연구활동비</text>
      <text x="100" y="11" class="ko-r" font-size="9" fill="#475569">출장·자문·검증 워크숍</text>
      <text x="490" y="11" text-anchor="end" class="ko" font-size="10" fill="#6366F1">10 %</text>
    </g>
    <g transform="translate(14, 98)">
      <rect width="14" height="14" fill="#F59E0B"/>
      <text x="22" y="11" class="ko" font-size="10" fill="#1E293B">연구과제 추진비 (위탁)</text>
      <text x="170" y="11" class="ko-r" font-size="9" fill="#475569">UI·라벨링·컨설팅 외주</text>
      <text x="490" y="11" text-anchor="end" class="ko" font-size="10" fill="#6366F1">15 %</text>
    </g>
    <g transform="translate(14, 118)">
      <rect width="14" height="14" fill="#FBBF24"/>
      <text x="22" y="11" class="ko" font-size="10" fill="#1E293B">연구수당</text>
      <text x="85" y="11" class="ko-r" font-size="9" fill="#475569">참여 연구원 인센티브</text>
      <text x="490" y="11" text-anchor="end" class="ko" font-size="10" fill="#6366F1">5 %</text>
    </g>
    <g transform="translate(14, 138)">
      <rect width="14" height="14" fill="#10B981"/>
      <text x="22" y="11" class="ko" font-size="10" fill="#1E293B">간접비</text>
      <text x="80" y="11" class="ko-r" font-size="9" fill="#475569">직접비의 [%] (확인 필요)</text>
      <text x="490" y="11" text-anchor="end" class="ko" font-size="10" fill="#6366F1">+α</text>
    </g>
  </g>

  <!-- 강도 3 단계 분기 (610~670) -->
  <g transform="translate(40, 610)" filter="url(#fb-shadow)">
    <rect width="520" height="60" rx="10" fill="url(#fb-final)"/>
    <text x="20" y="24" class="ko" font-size="13" fill="white">정부지원·자부담 비율 — 강도 3 단계</text>
    <g font-size="9" class="ko-r" fill="rgba(255,255,255,0.92)">
      <text x="20" y="42">▸ 대기업 [%]↓·자부담↑ / 중견 [%]= / 중소·벤처 [%]↑·자부담↓</text>
      <text x="20" y="55">▸ 사업 공고 별 비율 표 확인 (스마트공장·CBAM·디지털경남 상이)</text>
    </g>
  </g>

  <!-- cross-reference 박스 (685~785) -->
  <g transform="translate(40, 685)">
    <rect width="520" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#D97706">cross-reference · 5 비목 + 간접비 + 강도 3 단계 분기</text>
    <g font-size="9" class="ko-r" fill="#475569">
      <text x="14" y="38">▸ 인건비 PM·DS·DE·MLE·QA 단가 표 + 도메인 전문가 자문 단가</text>
      <text x="14" y="54">▸ 장비비 — GPU·MLOps 라이선스·IoT 센서·비전 카메라·서버</text>
      <text x="14" y="70">▸ §10 cross-reference — 컨설팅 §4·6 (위탁 강도) + KPI §10 (효과)</text>
      <text x="14" y="88" fill="#6366F1" font-weight="700">▸ 8 장 구조 + 4 분기 의사결정 + 강도 3 단계 (방법론 4.26 자산 군 통일)</text>
    </g>
  </g>
</svg>
