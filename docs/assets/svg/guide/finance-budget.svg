<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="재무·예산 산정 가이드 — 5 비목 도넛 인포그래픽">
  <title>재무·예산 산정 가이드 — 정부지원 표준 5 비목 분포</title>
  <desc>정부지원 R&amp;D·스마트공장·DX 사업의 표준 5 비목 (인건비·연구장비재료비·연구활동비·연구과제추진비·연구수당) 도넛 차트와 간접비·정부지원 자부담 비율 분기, 8 장 + 4 분기 + 강도 3 단계 가이드 군 통일 표시.</desc>

  <defs>
    <linearGradient id="fb-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <filter id="fb-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#F5F7FA"/>

  <!-- 헤더 -->
  <rect width="800" height="50" fill="url(#fb-header)"/>
  <text x="30" y="32" class="ko" font-size="20" fill="white">재무·예산 산정 가이드 · 5 비목</text>
  <text x="770" y="32" text-anchor="end" class="en" font-size="11" fill="rgba(255,255,255,0.8)">FINANCE BUDGET</text>

  <!-- 도넛 차트 (좌측) -->
  <g transform="translate(180, 200)" filter="url(#fb-shadow)">
    <!-- 인건비 45 % (162도) -->
    <path d="M 0 -90 A 90 90 0 0 1 85.6 27.8 L 47.6 15.4 A 50 50 0 0 0 0 -50 Z" fill="#1565C0"/>
    <!-- 연구장비·재료비 25 % (90도) -->
    <path d="M 85.6 27.8 A 90 90 0 0 1 0 90 L 0 50 A 50 50 0 0 0 47.6 15.4 Z" fill="#42A5F5"/>
    <!-- 연구활동비 10 % (36도) -->
    <path d="M 0 90 A 90 90 0 0 1 -52.9 72.8 L -29.4 40.4 A 50 50 0 0 0 0 50 Z" fill="#7E57C2"/>
    <!-- 연구과제 추진비 (위탁) 15 % (54도) -->
    <path d="M -52.9 72.8 A 90 90 0 0 1 -90 0 L -50 0 A 50 50 0 0 0 -29.4 40.4 Z" fill="#F57F17"/>
    <!-- 연구수당 5 % (18도) -->
    <path d="M -90 0 A 90 90 0 0 1 -85.6 -27.8 L -47.6 -15.4 A 50 50 0 0 0 -50 0 Z" fill="#FFB300"/>
    <!-- 간접비 영역 표시용 호 (위쪽 잔여) -->
    <path d="M -85.6 -27.8 A 90 90 0 0 1 0 -90 L 0 -50 A 50 50 0 0 0 -47.6 -15.4 Z" fill="#26A69A"/>
    <!-- 중앙 -->
    <circle cx="0" cy="0" r="42" fill="white"/>
    <text x="0" y="-5" text-anchor="middle" class="ko" font-size="13" fill="#1A237E">총 사업비</text>
    <text x="0" y="12" text-anchor="middle" class="ko-r" font-size="10" fill="#78909C">5 비목 + 간접비</text>
  </g>

  <!-- 범례 (우측) -->
  <g transform="translate(330, 80)">
    <text x="0" y="0" class="ko" font-size="13" fill="#1A237E">정부지원 표준 비목 분류</text>

    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="14" height="14" fill="#1565C0"/>
      <text x="22" y="11" class="ko" font-size="11" fill="#1A237E">인건비</text>
      <text x="80" y="11" class="ko-r" font-size="10" fill="#37474F">PM·DS·DE·MLE·QA + 도메인 전문가</text>
      <text x="380" y="11" class="ko" font-size="10" fill="#1565C0">[%] (높음)</text>
    </g>
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="14" height="14" fill="#42A5F5"/>
      <text x="22" y="11" class="ko" font-size="11" fill="#1A237E">연구장비·재료비</text>
      <text x="125" y="11" class="ko-r" font-size="10" fill="#37474F">GPU·MLOps·IoT 센서·비전 카메라</text>
      <text x="380" y="11" class="ko" font-size="10" fill="#1565C0">[%] (중)</text>
    </g>
    <g transform="translate(0, 62)">
      <rect x="0" y="0" width="14" height="14" fill="#7E57C2"/>
      <text x="22" y="11" class="ko" font-size="11" fill="#1A237E">연구활동비</text>
      <text x="100" y="11" class="ko-r" font-size="10" fill="#37474F">출장·자문·검증 워크숍</text>
      <text x="380" y="11" class="ko" font-size="10" fill="#1565C0">[%] (낮음)</text>
    </g>
    <g transform="translate(0, 84)">
      <rect x="0" y="0" width="14" height="14" fill="#F57F17"/>
      <text x="22" y="11" class="ko" font-size="11" fill="#1A237E">연구과제 추진비 (위탁)</text>
      <text x="170" y="11" class="ko-r" font-size="10" fill="#37474F">UI·라벨링·컨설팅 외주</text>
      <text x="380" y="11" class="ko" font-size="10" fill="#1565C0">[%] (가변)</text>
    </g>
    <g transform="translate(0, 106)">
      <rect x="0" y="0" width="14" height="14" fill="#FFB300"/>
      <text x="22" y="11" class="ko" font-size="11" fill="#1A237E">연구수당</text>
      <text x="85" y="11" class="ko-r" font-size="10" fill="#37474F">참여 연구원 인센티브</text>
      <text x="380" y="11" class="ko" font-size="10" fill="#1565C0">[%] 이하</text>
    </g>
    <g transform="translate(0, 128)">
      <rect x="0" y="0" width="14" height="14" fill="#26A69A"/>
      <text x="22" y="11" class="ko" font-size="11" fill="#1A237E">간접비</text>
      <text x="78" y="11" class="ko-r" font-size="10" fill="#37474F">직접비의 [%] (확인 필요)</text>
      <text x="380" y="11" class="ko" font-size="10" fill="#1565C0">+α</text>
    </g>
  </g>

  <!-- 정부지원·자부담 분기 -->
  <g transform="translate(40, 305)">
    <rect x="0" y="0" width="430" height="65" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <text x="14" y="18" class="ko" font-size="11" fill="#1565C0">정부지원·자부담 비율 (강도 3 단계)</text>
    <g transform="translate(14, 28)" font-size="10" class="ko-r" fill="#37474F">
      <text y="10">▸ 대기업 — 정부지원 [%] 낮음 · 자부담 [%] 높음</text>
      <text y="24">▸ 중견 — 정부지원 [%] 중간 · 자부담 [%] 중간</text>
      <text y="38">▸ 중소·벤처 — 정부지원 [%] 높음 · 자부담 [%] 낮음</text>
    </g>
  </g>

  <!-- 통일 패턴 -->
  <g transform="translate(480, 305)">
    <rect x="0" y="0" width="280" height="65" rx="6" fill="#FFF3E0" stroke="#F57F17" stroke-width="1"/>
    <text x="14" y="18" class="ko" font-size="11" fill="#E65100">가이드 군 통일 (방법론 4.26)</text>
    <g transform="translate(14, 28)" font-size="10" class="ko-r" fill="#37474F">
      <text y="10">▸ 8 장 구조 · §0·§5.5·§8 별첨 인용</text>
      <text y="24">▸ 4 분기 의사결정</text>
      <text y="38">▸ 강도 3 단계 (대·중·소)</text>
    </g>
  </g>
</svg>
