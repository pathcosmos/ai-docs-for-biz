<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="KPI 측정 가이드 — 5 군 분류 + KPI 표 7 컬럼 인포그래픽">
  <title>KPI 측정·산출·검증 가이드 — 5 군 분류</title>
  <desc>제조 AI 사업의 KPI 5 군 (품질·운영·AI 모델·운영 거버넌스·사업 재무) MECE 분류와 표준 측정 도구 매트릭스 7 컬럼, 8 장 + 4 분기 + 강도 3 단계 가이드 군 통일 표시.</desc>

  <defs>
    <linearGradient id="kpi-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <filter id="kpi-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#F5F7FA"/>

  <!-- 헤더 -->
  <rect width="800" height="50" fill="url(#kpi-header)"/>
  <text x="30" y="32" class="ko" font-size="20" fill="white">KPI 측정·산출·검증 표준 · 5 군</text>
  <text x="770" y="32" text-anchor="end" class="en" font-size="11" fill="rgba(255,255,255,0.8)">KPI MEASUREMENT</text>

  <!-- 5 군 카드 -->
  <g transform="translate(40, 75)" filter="url(#kpi-shadow)">
    <text x="0" y="-3" class="ko" font-size="12" fill="#1A237E">KPI 5 군 (MECE) — Q · O · M · G · B</text>

    <g transform="translate(0, 5)">
      <rect x="0" y="0" width="142" height="65" rx="6" fill="#E3F2FD"/>
      <rect x="0" y="0" width="142" height="22" rx="6" fill="#1565C0"/>
      <text x="8" y="16" class="ko" font-size="11" fill="white">Q. 품질 KPI</text>
      <text x="8" y="38" class="ko-r" font-size="9" fill="#1A237E">PPM · FPY · σ · Recall</text>
      <text x="8" y="52" class="ko-r" font-size="9" fill="#37474F">MES + QMS + SPC</text>
      <text x="8" y="62" class="ko-r" font-size="8" fill="#78909C">산출물 차원</text>

      <rect x="148" y="0" width="142" height="65" rx="6" fill="#E3F2FD"/>
      <rect x="148" y="0" width="142" height="22" rx="6" fill="#1565C0"/>
      <text x="156" y="16" class="ko" font-size="11" fill="white">O. 운영 KPI</text>
      <text x="156" y="38" class="ko-r" font-size="9" fill="#1A237E">OEE · CT · 가동률 · kWh</text>
      <text x="156" y="52" class="ko-r" font-size="9" fill="#37474F">PLC · MES · FEMS</text>
      <text x="156" y="62" class="ko-r" font-size="8" fill="#78909C">설비·라인 차원</text>

      <rect x="296" y="0" width="142" height="65" rx="6" fill="#E3F2FD"/>
      <rect x="296" y="0" width="142" height="22" rx="6" fill="#7E57C2"/>
      <text x="304" y="16" class="ko" font-size="11" fill="white">M. AI 모델 KPI</text>
      <text x="304" y="38" class="ko-r" font-size="9" fill="#1A237E">F1·AUROC·환각률·RAGAS</text>
      <text x="304" y="52" class="ko-r" font-size="9" fill="#37474F">MLflow · Evidently</text>
      <text x="304" y="62" class="ko-r" font-size="8" fill="#78909C">AI 차원</text>

      <rect x="444" y="0" width="142" height="65" rx="6" fill="#E3F2FD"/>
      <rect x="444" y="0" width="142" height="22" rx="6" fill="#7E57C2"/>
      <text x="452" y="16" class="ko" font-size="11" fill="white">G. 거버넌스 KPI</text>
      <text x="452" y="38" class="ko-r" font-size="9" fill="#1A237E">PSI · MTTR · HITL 승인율</text>
      <text x="452" y="52" class="ko-r" font-size="9" fill="#37474F">MLOps + 감사 + CMMS</text>
      <text x="452" y="62" class="ko-r" font-size="8" fill="#78909C">운영 차원</text>

      <rect x="592" y="0" width="160" height="65" rx="6" fill="#E3F2FD"/>
      <rect x="592" y="0" width="160" height="22" rx="6" fill="#F57F17"/>
      <text x="600" y="16" class="ko" font-size="11" fill="white">B. 사업·재무 KPI</text>
      <text x="600" y="38" class="ko-r" font-size="9" fill="#1A237E">매출·ROI·SQA·재거래율</text>
      <text x="600" y="52" class="ko-r" font-size="9" fill="#37474F">ERP · SCM · CRM</text>
      <text x="600" y="62" class="ko-r" font-size="8" fill="#78909C">재무 차원</text>
    </g>
  </g>

  <!-- KPI 측정 도구 매트릭스 (7 컬럼) -->
  <g transform="translate(40, 170)">
    <text x="0" y="0" class="ko" font-size="12" fill="#1A237E">KPI 측정 도구 매트릭스 — 7 컬럼</text>

    <g transform="translate(0, 12)">
      <!-- 헤더 행 -->
      <rect x="0" y="0" width="720" height="22" fill="#1A237E"/>
      <text x="50" y="15" text-anchor="middle" class="ko" font-size="9" fill="white">KPI 군</text>
      <text x="180" y="15" text-anchor="middle" class="ko" font-size="9" fill="white">대표 KPI</text>
      <text x="310" y="15" text-anchor="middle" class="ko" font-size="9" fill="white">표준 도구</text>
      <text x="430" y="15" text-anchor="middle" class="ko" font-size="9" fill="white">산출 빈도</text>
      <text x="540" y="15" text-anchor="middle" class="ko" font-size="9" fill="white">정합 자산</text>
      <text x="635" y="15" text-anchor="middle" class="ko" font-size="9" fill="white">책임자</text>
      <text x="700" y="15" text-anchor="middle" class="ko" font-size="9" fill="white">임계</text>

      <!-- 데이터 행 (5 군 압축) -->
      <g font-size="9" class="ko-r" fill="#37474F">
        <rect x="0" y="22" width="720" height="20" fill="white"/>
        <text x="50" y="36" text-anchor="middle" fill="#1565C0">품질</text><text x="180" y="36" text-anchor="middle">불량률 PPM</text><text x="310" y="36" text-anchor="middle">MES + QMS + SPC</text><text x="430" y="36" text-anchor="middle">일·월</text><text x="540" y="36" text-anchor="middle">track1 §6.3</text><text x="635" y="36" text-anchor="middle">품질 부서장</text><text x="700" y="36" text-anchor="middle">[임계]</text>
        <rect x="0" y="42" width="720" height="20" fill="#F5F7FA"/>
        <text x="50" y="56" text-anchor="middle" fill="#1565C0">운영</text><text x="180" y="56" text-anchor="middle">OEE</text><text x="310" y="56" text-anchor="middle">MES + PLC + Historian</text><text x="430" y="56" text-anchor="middle">일·주</text><text x="540" y="56" text-anchor="middle">track1 §3.5</text><text x="635" y="56" text-anchor="middle">생산 관리자</text><text x="700" y="56" text-anchor="middle">[임계]</text>
        <rect x="0" y="62" width="720" height="20" fill="white"/>
        <text x="50" y="76" text-anchor="middle" fill="#7E57C2">모델</text><text x="180" y="76" text-anchor="middle">F1 · AUROC</text><text x="310" y="76" text-anchor="middle">MLflow + Evidently</text><text x="430" y="76" text-anchor="middle">실시간·주</text><text x="540" y="76" text-anchor="middle">Track2 §5.5</text><text x="635" y="76" text-anchor="middle">MLE</text><text x="700" y="76" text-anchor="middle">[임계]</text>
        <rect x="0" y="82" width="720" height="20" fill="#F5F7FA"/>
        <text x="50" y="96" text-anchor="middle" fill="#7E57C2">거버넌스</text><text x="180" y="96" text-anchor="middle">PSI · MTTR</text><text x="310" y="96" text-anchor="middle">MLOps + 감사 시스템</text><text x="430" y="96" text-anchor="middle">실시간·이벤트</text><text x="540" y="96" text-anchor="middle">Track2 §6.5</text><text x="635" y="96" text-anchor="middle">MLOps Lead</text><text x="700" y="96" text-anchor="middle">0.25</text>
        <rect x="0" y="102" width="720" height="20" fill="white"/>
        <text x="50" y="116" text-anchor="middle" fill="#F57F17">사업·재무</text><text x="180" y="116" text-anchor="middle">ROI · Payback</text><text x="310" y="116" text-anchor="middle">ERP + 시너지 ROI 모델</text><text x="430" y="116" text-anchor="middle">월·분기·연</text><text x="540" y="116" text-anchor="middle">시너지 §3</text><text x="635" y="116" text-anchor="middle">PM·재무</text><text x="700" y="116" text-anchor="middle">[임계]</text>
      </g>
    </g>
  </g>

  <!-- 하단 통일 -->
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="720" height="55" rx="6" fill="#FFF3E0" stroke="#F57F17" stroke-width="1"/>
    <text x="14" y="18" class="ko" font-size="11" fill="#E65100">가이드 군 5 번째 자산 · 4.26 포맷 통일 · cross-reference 4 선행 가이드</text>
    <g transform="translate(14, 28)" font-size="10" class="ko-r" fill="#37474F">
      <text y="10">▸ 8 장 구조 (분류·도구·빈도·검증·양식·결합·확인필요·한계)</text>
      <text y="24">▸ 4 분기 (시점·도구·검증·결합) · 강도 3 단계 (산출 빈도)</text>
    </g>
  </g>
</svg>
