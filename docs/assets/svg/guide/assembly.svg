<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="사업계획서 조립 가이드 — 7 단계 조립 절차 인포그래픽">
  <title>사업계획서 조립 가이드 — 7 단계 표준 절차</title>
  <desc>워크스페이스 자산을 조합하여 단일 사업계획서 1 부를 완성하기까지의 표준 7 단계 흐름 (패키지 결정·5.2 카드 매핑·본문 인용·모듈 삽입·신규 작성·인용 표기·자체평가) 와 8 장 구조 + 4 분기 + 강도 3 단계 가이드 군 통일 표시.</desc>

  <defs>
    <linearGradient id="as-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="as-circle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <filter id="as-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#F5F7FA"/>

  <!-- 헤더 -->
  <rect width="800" height="50" fill="url(#as-header)"/>
  <text x="30" y="32" class="ko" font-size="20" fill="white">사업계획서 조립 가이드 · 7 단계 절차</text>
  <text x="770" y="32" text-anchor="end" class="en" font-size="11" fill="rgba(255,255,255,0.8)">ASSEMBLY GUIDE</text>

  <!-- 7 단계 — 위 4 + 아래 3 배치 -->
  <g transform="translate(40, 80)" filter="url(#as-shadow)">
    <!-- 1행 4 단계 -->
    <g>
      <rect x="0" y="0" width="170" height="65" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="20" cy="20" r="13" fill="url(#as-circle)"/>
      <text x="20" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">1</text>
      <text x="42" y="25" class="ko" font-size="12" fill="#1A237E">패키지 결정</text>
      <text x="10" y="48" class="ko-r" font-size="10" fill="#37474F">시나리오_카탈로그 §부록B</text>
      <text x="10" y="60" class="ko-r" font-size="10" fill="#78909C">패키지 1~6 단일/복합</text>

      <rect x="180" y="0" width="170" height="65" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="200" cy="20" r="13" fill="url(#as-circle)"/>
      <text x="200" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">2</text>
      <text x="222" y="25" class="ko" font-size="12" fill="#1A237E">5.2 카드 매핑</text>
      <text x="190" y="48" class="ko-r" font-size="10" fill="#37474F">5.2-a~f 인용 매핑표</text>
      <text x="190" y="60" class="ko-r" font-size="10" fill="#78909C">갭 1 정합성 기반</text>

      <rect x="360" y="0" width="170" height="65" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="380" cy="20" r="13" fill="url(#as-circle)"/>
      <text x="380" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">3</text>
      <text x="402" y="25" class="ko" font-size="12" fill="#1A237E">본문 인용</text>
      <text x="370" y="48" class="ko-r" font-size="10" fill="#37474F">track1 §1~6 카드 + Top5</text>
      <text x="370" y="60" class="ko-r" font-size="10" fill="#78909C">SCN ID 부정합 점검</text>

      <rect x="540" y="0" width="170" height="65" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="560" cy="20" r="13" fill="url(#as-circle)"/>
      <text x="560" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">4</text>
      <text x="582" y="25" class="ko" font-size="12" fill="#1A237E">모듈 삽입</text>
      <text x="550" y="48" class="ko-r" font-size="10" fill="#37474F">CBAM·안전·연합학습</text>
      <text x="550" y="60" class="ko-r" font-size="10" fill="#78909C">표준 삽입 지점</text>
    </g>

    <!-- 연결선 (1행 → 2행) -->
    <path d="M 645 65 Q 645 88 280 88 L 95 88 L 95 110" stroke="#1565C0" stroke-width="2" fill="none" stroke-dasharray="4,3"/>

    <!-- 2행 3 단계 -->
    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="220" height="65" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="20" cy="20" r="13" fill="url(#as-circle)"/>
      <text x="20" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">5</text>
      <text x="42" y="25" class="ko" font-size="12" fill="#1A237E">신규 작성</text>
      <text x="10" y="48" class="ko-r" font-size="10" fill="#37474F">신규 작성 비율 25~35 %</text>
      <text x="10" y="60" class="ko-r" font-size="10" fill="#78909C">고객사 도메인·시스템 반영</text>

      <rect x="240" y="0" width="220" height="65" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="260" cy="20" r="13" fill="url(#as-circle)"/>
      <text x="260" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">6</text>
      <text x="282" y="25" class="ko" font-size="12" fill="#1A237E">인용 출처 표기</text>
      <text x="250" y="48" class="ko-r" font-size="10" fill="#37474F">[출처: 파일명 §섹션] 형식</text>
      <text x="250" y="60" class="ko-r" font-size="10" fill="#78909C">발췌·요약 명시</text>

      <rect x="490" y="0" width="220" height="65" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="510" cy="20" r="13" fill="url(#as-circle)"/>
      <text x="510" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">7</text>
      <text x="532" y="25" class="ko" font-size="12" fill="#1A237E">자체평가</text>
      <text x="500" y="48" class="ko-r" font-size="10" fill="#37474F">6 항목 (활용·갭·자연성</text>
      <text x="500" y="60" class="ko-r" font-size="10" fill="#78909C">신규·비율·일관성)</text>
    </g>
  </g>

  <!-- 패키지별 5.2 카드 매핑 미니 -->
  <g transform="translate(40, 270)">
    <text x="0" y="0" class="ko" font-size="11" fill="#1A237E">패키지별 5.2 카드 매핑 (정합성 기반)</text>
    <g transform="translate(0, 8)" font-size="9" class="ko-r">
      <rect x="0" y="0" width="115" height="22" rx="3" fill="#E3F2FD"/>
      <text x="6" y="14" fill="#1565C0">P1 → b·c·d·e·f</text>
      <rect x="120" y="0" width="115" height="22" rx="3" fill="#E3F2FD"/>
      <text x="126" y="14" fill="#1565C0">P2 → a·b·d·e·f</text>
      <rect x="240" y="0" width="115" height="22" rx="3" fill="#E3F2FD"/>
      <text x="246" y="14" fill="#1565C0">P3 → a·c·f</text>
      <rect x="360" y="0" width="115" height="22" rx="3" fill="#E3F2FD"/>
      <text x="366" y="14" fill="#1565C0">P4 → b·c·f</text>
      <rect x="480" y="0" width="115" height="22" rx="3" fill="#E3F2FD"/>
      <text x="486" y="14" fill="#1565C0">P5 → b·c·e·f</text>
      <rect x="600" y="0" width="110" height="22" rx="3" fill="#E3F2FD"/>
      <text x="606" y="14" fill="#1565C0">P6 → b·c·d·e</text>
    </g>
  </g>

  <!-- 하단 통일 패턴 -->
  <g transform="translate(40, 315)">
    <rect x="0" y="0" width="720" height="60" rx="6" fill="#FFF3E0" stroke="#F57F17" stroke-width="1"/>
    <text x="14" y="18" class="ko" font-size="11" fill="#E65100">조립 가이드 · cross-reference 41 자산 · 갭 1·3 표준화</text>
    <g transform="translate(14, 28)" font-size="10" class="ko-r" fill="#37474F">
      <text y="10">▸ 8 장 구조 (절차·매핑·SCN·인용·모듈·신규·일관성·평가)</text>
      <text y="24">▸ 4 분기 (패키지·인프라·UI·로드맵) · 강도 3 단계 적용</text>
    </g>
  </g>
</svg>
