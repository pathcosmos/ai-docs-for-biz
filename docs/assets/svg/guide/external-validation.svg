<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="외부검증 운영 가이드 — 6 영역 RACI 세로형 인포그래픽"
     class="zoomable">
  <title>외부검증 운영 가이드 (세로형) — 6 영역 RACI 매트릭스</title>
  <desc>제조 AI 사업이 동시 정합해야 하는 외부 검증 주체 6 영역 (TMS·CEMS·CBAM·KOSHA·CSAP·OEM) 육각형 배치 + RACI 매트릭스 + 가이드 군 통일 (8 장 + 4 분기) 세로형 인포그래픽.</desc>

  <defs>
    <linearGradient id="ev-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="ev-final" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="ev-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#ev-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">외부검증 운영 가이드</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">EXTERNAL VALIDATION — 6 DOMAINS</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#FDE68A">6 영역 동시 정합 + RACI 매트릭스</text>

  <!-- 6 영역 육각형 배치 (130~430) -->
  <g transform="translate(300, 290)" filter="url(#ev-shadow)">
    <!-- 중앙 -->
    <circle cx="0" cy="0" r="55" fill="white" stroke="#6366F1" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle" class="ko" font-size="12" fill="#1E293B">제조 AI</text>
    <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="10" fill="#6366F1">사업</text>

    <!-- TMS (상) -->
    <g transform="translate(0, -130)">
      <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
      <text x="0" y="-2" text-anchor="middle" class="ko" font-size="11" fill="#4338CA">TMS</text>
      <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="9" fill="#475569">대기·수질</text>
    </g>
    <!-- CEMS (우상) -->
    <g transform="translate(115, -65)">
      <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
      <text x="0" y="-2" text-anchor="middle" class="ko" font-size="11" fill="#4338CA">CEMS</text>
      <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="9" fill="#475569">굴뚝</text>
    </g>
    <!-- CBAM (우하) -->
    <g transform="translate(115, 65)">
      <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="0" y="-2" text-anchor="middle" class="ko" font-size="11" fill="#D97706">CBAM</text>
      <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="9" fill="#475569">EU 탄소</text>
    </g>
    <!-- KOSHA (하) -->
    <g transform="translate(0, 130)">
      <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
      <text x="0" y="-2" text-anchor="middle" class="ko" font-size="11" fill="#B91C1C">KOSHA</text>
      <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="9" fill="#475569">중대재해</text>
    </g>
    <!-- CSAP (좌하) -->
    <g transform="translate(-115, 65)">
      <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
      <text x="0" y="-2" text-anchor="middle" class="ko" font-size="11" fill="#047857">CSAP</text>
      <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="9" fill="#475569">클라우드</text>
    </g>
    <!-- OEM (좌상) -->
    <g transform="translate(-115, -65)">
      <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
      <text x="0" y="-2" text-anchor="middle" class="ko" font-size="11" fill="#4338CA">OEM</text>
      <text x="0" y="14" text-anchor="middle" class="ko-r" font-size="9" fill="#475569">고객사</text>
    </g>

    <!-- 연결선 -->
    <line x1="0" y1="-55" x2="0" y2="-95" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
    <line x1="49" y1="-27" x2="89" y2="-50" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
    <line x1="49" y1="27" x2="89" y2="50" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
    <line x1="0" y1="55" x2="0" y2="95" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
    <line x1="-49" y1="27" x2="-89" y2="50" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
    <line x1="-49" y1="-27" x2="-89" y2="-50" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  </g>

  <!-- RACI 매트릭스 (450~600) -->
  <g transform="translate(40, 450)" filter="url(#ev-shadow)">
    <rect width="520" height="150" rx="10" fill="white" stroke="#E2E8F0"/>
    <rect width="520" height="26" rx="10" fill="#6366F1"/>
    <rect y="20" width="520" height="6" fill="#6366F1"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">RACI 매트릭스 — 외부검증 영역별 책임 분담</text>
    <text x="506" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">6 × 4</text>

    <g transform="translate(0, 36)" font-size="10" class="ko" fill="#1E293B">
      <rect x="10" y="0" width="500" height="22" fill="#EEF2FF"/>
      <text x="20" y="14">영역</text>
      <text x="170" y="14" text-anchor="middle">R 수행</text>
      <text x="270" y="14" text-anchor="middle">A 책임</text>
      <text x="370" y="14" text-anchor="middle">C 자문</text>
      <text x="465" y="14" text-anchor="middle">I 통보</text>
    </g>
    <g transform="translate(0, 62)" font-size="9" class="ko-r" fill="#475569">
      <text x="20" y="14">TMS·CEMS</text>
      <text x="170" y="14" text-anchor="middle">EHS팀</text>
      <text x="270" y="14" text-anchor="middle">CTO</text>
      <text x="370" y="14" text-anchor="middle">환경부</text>
      <text x="465" y="14" text-anchor="middle">공장장</text>
    </g>
    <g transform="translate(0, 82)" font-size="9" class="ko-r" fill="#475569">
      <text x="20" y="14">CBAM</text>
      <text x="170" y="14" text-anchor="middle">탄소팀</text>
      <text x="270" y="14" text-anchor="middle">CFO</text>
      <text x="370" y="14" text-anchor="middle">상공회</text>
      <text x="465" y="14" text-anchor="middle">EU 고객</text>
    </g>
    <g transform="translate(0, 102)" font-size="9" class="ko-r" fill="#475569">
      <text x="20" y="14">KOSHA</text>
      <text x="170" y="14" text-anchor="middle">안전팀</text>
      <text x="270" y="14" text-anchor="middle">CSO</text>
      <text x="370" y="14" text-anchor="middle">고용부</text>
      <text x="465" y="14" text-anchor="middle">노조</text>
    </g>
    <g transform="translate(0, 122)" font-size="9" class="ko-r" fill="#475569">
      <text x="20" y="14">CSAP·OEM</text>
      <text x="170" y="14" text-anchor="middle">DevOps</text>
      <text x="270" y="14" text-anchor="middle">CIO</text>
      <text x="370" y="14" text-anchor="middle">인증기관</text>
      <text x="465" y="14" text-anchor="middle">고객사</text>
    </g>
  </g>

  <!-- 강조 박스 (610~670) -->
  <g transform="translate(40, 610)" filter="url(#ev-shadow)">
    <rect width="520" height="60" rx="10" fill="url(#ev-final)"/>
    <text x="20" y="24" class="ko" font-size="13" fill="white">동시 정합 — 6 영역 RACI 매트릭스 필수</text>
    <text x="20" y="44" class="ko-r" font-size="10" fill="rgba(255,255,255,0.92)">사업계획서 §7 외부검증 + 시연 단계 통과 → 자체평가 6 항목 정합</text>
  </g>

  <!-- cross-reference 박스 (685~785) -->
  <g transform="translate(40, 685)">
    <rect width="520" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#D97706">cross-reference · 6 영역 검증 + RACI + 모듈 연계</text>
    <g font-size="9" class="ko-r" fill="#475569">
      <text x="14" y="38">▸ TMS·CEMS·CBAM → 환경 (모듈 CBAM·연합학습 §3)</text>
      <text x="14" y="54">▸ KOSHA → 안전 (모듈 중대재해 §2) · CSAP·OEM → 보안·납품</text>
      <text x="14" y="70">▸ §10 cross-reference — 책임 분담 매트릭스 + KPI G4 거버넌스</text>
      <text x="14" y="88" fill="#6366F1" font-weight="700">▸ 8 장 구조 + 4 분기 의사결정 + 강도 3 단계 (방법론 4.26 자산 군 통일)</text>
    </g>
  </g>
</svg>
