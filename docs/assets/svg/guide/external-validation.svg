<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="외부검증 운영 가이드 — TMS·CEMS·CBAM·KOSHA·CSAP·OEM 6 영역 육각형 인포그래픽">
  <title>외부 검증 운영 가이드 — 6 영역 통합 매트릭스</title>
  <desc>제조 AI 사업이 동시 정합해야 하는 외부 검증 주체 6 영역 (TMS·CEMS·CBAM·KOSHA·CSAP·OEM) 을 육각형 배치로 시각화하고 4 분기 의사결정 (송신·강도·인증·관할) 통합. 가이드 군 6 번째 자산.</desc>

  <defs>
    <linearGradient id="ev-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="ev-hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <filter id="ev-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#F5F7FA"/>

  <!-- 헤더 -->
  <rect width="800" height="50" fill="url(#ev-header)"/>
  <text x="30" y="32" class="ko" font-size="20" fill="white">외부 검증 운영 가이드 · 6 영역 통합</text>
  <text x="770" y="32" text-anchor="end" class="en" font-size="11" fill="rgba(255,255,255,0.8)">EXTERNAL VALIDATION</text>

  <!-- 6 영역 육각형 배치 -->
  <g transform="translate(220, 200)" filter="url(#ev-shadow)">
    <!-- 중앙 통합 백본 -->
    <circle cx="0" cy="0" r="48" fill="#1A237E"/>
    <text x="0" y="-5" text-anchor="middle" class="ko" font-size="11" fill="white">통합 운영</text>
    <text x="0" y="9" text-anchor="middle" class="ko" font-size="11" fill="white">아키텍처</text>
    <text x="0" y="22" text-anchor="middle" class="ko-r" font-size="9" fill="rgba(255,255,255,0.8)">단일 백본</text>

    <!-- 6 육각형 배치 (반경 ~135) -->
    <!-- TMS 상단 -->
    <g transform="translate(0, -130)">
      <polygon points="-50,-30 50,-30 75,0 50,30 -50,30 -75,0" fill="white" stroke="#1565C0" stroke-width="2"/>
      <text x="0" y="-8" text-anchor="middle" class="ko" font-size="13" fill="#1565C0">TMS</text>
      <text x="0" y="6" text-anchor="middle" class="ko-r" font-size="9" fill="#37474F">수질 환경부</text>
      <text x="0" y="18" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">실시간 송신</text>
    </g>
    <!-- CEMS 우상단 -->
    <g transform="translate(120, -65)">
      <polygon points="-50,-30 50,-30 75,0 50,30 -50,30 -75,0" fill="white" stroke="#1565C0" stroke-width="2"/>
      <text x="0" y="-8" text-anchor="middle" class="ko" font-size="13" fill="#1565C0">CEMS</text>
      <text x="0" y="6" text-anchor="middle" class="ko-r" font-size="9" fill="#37474F">대기 환경부</text>
      <text x="0" y="18" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">실시간 송신</text>
    </g>
    <!-- CBAM 우하단 -->
    <g transform="translate(120, 65)">
      <polygon points="-50,-30 50,-30 75,0 50,30 -50,30 -75,0" fill="white" stroke="#F57F17" stroke-width="2"/>
      <text x="0" y="-8" text-anchor="middle" class="ko" font-size="13" fill="#F57F17">CBAM</text>
      <text x="0" y="6" text-anchor="middle" class="ko-r" font-size="9" fill="#37474F">탄소 EU</text>
      <text x="0" y="18" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">분기 신고</text>
    </g>
    <!-- KOSHA 하단 -->
    <g transform="translate(0, 130)">
      <polygon points="-50,-30 50,-30 75,0 50,30 -50,30 -75,0" fill="white" stroke="#C62828" stroke-width="2"/>
      <text x="0" y="-8" text-anchor="middle" class="ko" font-size="13" fill="#C62828">KOSHA</text>
      <text x="0" y="6" text-anchor="middle" class="ko-r" font-size="9" fill="#37474F">안전 노동부</text>
      <text x="0" y="18" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">연 1 회 + 즉시</text>
    </g>
    <!-- CSAP 좌하단 -->
    <g transform="translate(-120, 65)">
      <polygon points="-50,-30 50,-30 75,0 50,30 -50,30 -75,0" fill="white" stroke="#7E57C2" stroke-width="2"/>
      <text x="0" y="-8" text-anchor="middle" class="ko" font-size="13" fill="#7E57C2">CSAP</text>
      <text x="0" y="6" text-anchor="middle" class="ko-r" font-size="9" fill="#37474F">보안 KISA</text>
      <text x="0" y="18" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">연 갱신</text>
    </g>
    <!-- OEM 좌상단 -->
    <g transform="translate(-120, -65)">
      <polygon points="-50,-30 50,-30 75,0 50,30 -50,30 -75,0" fill="white" stroke="#26A69A" stroke-width="2"/>
      <text x="0" y="-8" text-anchor="middle" class="ko" font-size="13" fill="#26A69A">OEM</text>
      <text x="0" y="6" text-anchor="middle" class="ko-r" font-size="9" fill="#37474F">IATF·VDA</text>
      <text x="0" y="18" text-anchor="middle" class="ko-r" font-size="9" fill="#78909C">연 + 특별</text>
    </g>
  </g>

  <!-- 우측 4 분기 의사결정 -->
  <g transform="translate(490, 75)">
    <text x="0" y="0" class="ko" font-size="13" fill="#1A237E">4 분기 의사결정</text>

    <g transform="translate(0, 8)">
      <rect x="0" y="0" width="270" height="55" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
      <text x="10" y="16" class="ko" font-size="11" fill="#1565C0">§2.1 송신 의무 분기</text>
      <text x="10" y="32" class="ko-r" font-size="10" fill="#37474F">실시간 (TMS·CEMS) vs 정기 (CBAM 분기)</text>
      <text x="10" y="46" class="ko-r" font-size="10" fill="#78909C">SLA 99.9 % · AI 사전 감지</text>
    </g>
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="270" height="55" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
      <text x="10" y="16" class="ko" font-size="11" fill="#C62828">§2.2 위반 강도 분기</text>
      <text x="10" y="32" class="ko-r" font-size="10" fill="#37474F">즉시 행정처분 vs 인증 강하·자격 손실</text>
      <text x="10" y="46" class="ko-r" font-size="10" fill="#78909C">사전 감지 + HITL 에스컬레이션</text>
    </g>
    <g transform="translate(0, 132)">
      <rect x="0" y="0" width="270" height="55" rx="6" fill="white" stroke="#7E57C2" stroke-width="1.5"/>
      <text x="10" y="16" class="ko" font-size="11" fill="#7E57C2">§2.3 인증 등급 분기</text>
      <text x="10" y="32" class="ko-r" font-size="10" fill="#37474F">CSAP 등급 · ISMS-P · IATF 16949</text>
      <text x="10" y="46" class="ko-r" font-size="10" fill="#78909C">감사 로그 + 사후 갭 분석</text>
    </g>
    <g transform="translate(0, 194)">
      <rect x="0" y="0" width="270" height="55" rx="6" fill="white" stroke="#F57F17" stroke-width="1.5"/>
      <text x="10" y="16" class="ko" font-size="11" fill="#F57F17">§2.4 관할 부처 분기</text>
      <text x="10" y="32" class="ko-r" font-size="10" fill="#37474F">환경부·노동부·KISA·EU·OEM 본사</text>
      <text x="10" y="46" class="ko-r" font-size="10" fill="#78909C">분리 운영 위험 → 단일 백본 흡수</text>
    </g>
  </g>

  <!-- 하단 통일 -->
  <g transform="translate(40, 343)">
    <rect x="0" y="0" width="720" height="40" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <text x="14" y="16" class="ko" font-size="11" fill="#1565C0">가이드 군 6 번째 · cross-reference (CBAM·SAF·CSEC·OEM 모듈) · 패키지 6 §5.4·5.5·7.1·7.3 1 차 적용</text>
    <text x="14" y="32" class="ko-r" font-size="10" fill="#37474F">▸ 8 장 구조 · 4 분기 (송신·강도·인증·관할) · 강도 3 단계 (실시간·정기·이벤트)</text>
  </g>
</svg>
