<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img"
     aria-label="Quick-Start 가이드 — 5 단계 워크플로 인포그래픽">
  <title>Quick-Start 운영 모드 — 1 페이지 5 단계 워크플로</title>
  <desc>새 [고객사] 사업계획서 1 부 작성 표준 5 단계 (요청·매칭·양식검증·변형·자체평가) 와 가이드 cross-reference 자산 수, 8 장 구조 + 4 분기 의사결정 + 강도 3 단계 운영 가이드 군 통일 표시.</desc>

  <defs>
    <linearGradient id="qs-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="qs-step" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <filter id="qs-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-weight: 500; }
      .en { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#F5F7FA"/>

  <!-- 헤더 -->
  <rect width="800" height="50" fill="url(#qs-header)"/>
  <text x="30" y="32" class="ko" font-size="20" fill="white">Quick-Start · 운영 모드 1 페이지 요약</text>
  <text x="770" y="32" text-anchor="end" class="en" font-size="11" fill="rgba(255,255,255,0.8)">QUICK-START GUIDE</text>

  <!-- 5 단계 워크플로 -->
  <g transform="translate(40, 90)">
    <text x="0" y="0" class="ko" font-size="13" fill="#1A237E">5 단계 표준 워크플로</text>
    <g transform="translate(0, 25)" filter="url(#qs-shadow)">
      <!-- Step 1 -->
      <rect x="0" y="0" width="130" height="80" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="20" cy="20" r="13" fill="url(#qs-step)"/>
      <text x="20" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">1</text>
      <text x="42" y="25" class="ko" font-size="12" fill="#1A237E">요청 수신</text>
      <text x="10" y="50" class="ko-r" font-size="10" fill="#37474F">5 항목 입력</text>
      <text x="10" y="65" class="ko-r" font-size="10" fill="#78909C">고객사·지원사업·</text>
      <text x="10" y="76" class="ko-r" font-size="10" fill="#78909C">기간·양식·시나리오</text>
      <!-- Arrow -->
      <path d="M 130 40 L 142 40 L 138 36 M 142 40 L 138 44" stroke="#1565C0" stroke-width="2" fill="none"/>
      <!-- Step 2 -->
      <rect x="145" y="0" width="130" height="80" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="165" cy="20" r="13" fill="url(#qs-step)"/>
      <text x="165" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">2</text>
      <text x="187" y="25" class="ko" font-size="12" fill="#1A237E">패키지 매칭</text>
      <text x="155" y="50" class="ko-r" font-size="10" fill="#37474F">6 패키지 1:1</text>
      <text x="155" y="65" class="ko-r" font-size="10" fill="#78909C">또는 복합 매핑</text>
      <text x="155" y="76" class="ko-r" font-size="10" fill="#78909C">시나리오 카탈로그</text>
      <path d="M 275 40 L 287 40 L 283 36 M 287 40 L 283 44" stroke="#1565C0" stroke-width="2" fill="none"/>
      <!-- Step 3 -->
      <rect x="290" y="0" width="130" height="80" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="310" cy="20" r="13" fill="url(#qs-step)"/>
      <text x="310" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">3</text>
      <text x="332" y="25" class="ko" font-size="12" fill="#1A237E">양식 검증</text>
      <text x="300" y="50" class="ko-r" font-size="10" fill="#37474F">8 섹션 구조</text>
      <text x="300" y="65" class="ko-r" font-size="10" fill="#78909C">PDF 통독</text>
      <text x="300" y="76" class="ko-r" font-size="10" fill="#78909C">§·표 100% 추출</text>
      <path d="M 420 40 L 432 40 L 428 36 M 432 40 L 428 44" stroke="#1565C0" stroke-width="2" fill="none"/>
      <!-- Step 4 -->
      <rect x="435" y="0" width="130" height="80" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="455" cy="20" r="13" fill="url(#qs-step)"/>
      <text x="455" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">4</text>
      <text x="477" y="25" class="ko" font-size="12" fill="#1A237E">파일럿 변형</text>
      <text x="445" y="50" class="ko-r" font-size="10" fill="#37474F">5 변경 지점</text>
      <text x="445" y="65" class="ko-r" font-size="10" fill="#78909C">고객사 가설·</text>
      <text x="445" y="76" class="ko-r" font-size="10" fill="#78909C">수치·KPI 교체</text>
      <path d="M 565 40 L 577 40 L 573 36 M 577 40 L 573 44" stroke="#1565C0" stroke-width="2" fill="none"/>
      <!-- Step 5 -->
      <rect x="580" y="0" width="130" height="80" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
      <circle cx="600" cy="20" r="13" fill="url(#qs-step)"/>
      <text x="600" y="25" text-anchor="middle" class="ko" font-size="13" fill="white">5</text>
      <text x="622" y="25" class="ko" font-size="12" fill="#1A237E">자체평가</text>
      <text x="590" y="50" class="ko-r" font-size="10" fill="#37474F">6 항목 양식</text>
      <text x="590" y="65" class="ko-r" font-size="10" fill="#78909C">자산 활용·갭·</text>
      <text x="590" y="76" class="ko-r" font-size="10" fill="#78909C">신규 비율 점검</text>
    </g>
  </g>

  <!-- 6 패키지 미니 표시 -->
  <g transform="translate(40, 220)">
    <text x="0" y="0" class="ko" font-size="12" fill="#1A237E">6 패키지 라인업 (재사용 자산)</text>
    <g transform="translate(0, 12)">
      <rect x="0" y="0" width="115" height="40" rx="4" fill="#E3F2FD"/>
      <text x="6" y="14" class="ko" font-size="9" fill="#1565C0">P1 대기업철강</text>
      <text x="6" y="28" class="ko-r" font-size="8" fill="#37474F">9 시나리오·773 줄</text>
      <rect x="120" y="0" width="115" height="40" rx="4" fill="#E3F2FD"/>
      <text x="126" y="14" class="ko" font-size="9" fill="#1565C0">P2 중견냉연</text>
      <text x="126" y="28" class="ko-r" font-size="8" fill="#37474F">6 시나리오·128KB</text>
      <rect x="240" y="0" width="115" height="40" rx="4" fill="#E3F2FD"/>
      <text x="246" y="14" class="ko" font-size="9" fill="#1565C0">P3 특수강관</text>
      <text x="246" y="28" class="ko-r" font-size="8" fill="#37474F">4 시나리오·476 줄</text>
      <rect x="360" y="0" width="115" height="40" rx="4" fill="#E3F2FD"/>
      <text x="366" y="14" class="ko" font-size="9" fill="#1565C0">P4 고무양산</text>
      <text x="366" y="28" class="ko-r" font-size="8" fill="#37474F">5 시나리오·178KB</text>
      <rect x="480" y="0" width="115" height="40" rx="4" fill="#E3F2FD"/>
      <text x="486" y="14" class="ko" font-size="9" fill="#1565C0">P5 정밀가공</text>
      <text x="486" y="28" class="ko-r" font-size="8" fill="#37474F">6 시나리오·129KB</text>
      <rect x="600" y="0" width="110" height="40" rx="4" fill="#E3F2FD"/>
      <text x="606" y="14" class="ko" font-size="9" fill="#1565C0">P6 유틸ESG</text>
      <text x="606" y="28" class="ko-r" font-size="8" fill="#37474F">5 시나리오·857 줄</text>
    </g>
  </g>

  <!-- 하단: cross-ref 자산 + 통일 패턴 -->
  <g transform="translate(40, 305)">
    <rect x="0" y="0" width="720" height="70" rx="6" fill="#FFF3E0" stroke="#F57F17" stroke-width="1"/>
    <text x="14" y="18" class="ko" font-size="11" fill="#E65100">cross-reference · 본 가이드 → 41 자산 · 17,645 줄</text>
    <g transform="translate(14, 28)" font-size="10" class="ko-r" fill="#37474F">
      <text y="12">▸ 8 장 구조 (분류·도구·빈도·검증·양식·결합·확인필요·한계)</text>
      <text y="26">▸ 4 분기 의사결정 (영역·강도·인력·결합)</text>
      <text y="40">▸ 강도 3 단계 (낮음 · 중간 · 99 % 패턴) — 가이드 군 통일 (방법론 4.26)</text>
    </g>
    <g transform="translate(540, 12)">
      <rect x="0" y="0" width="170" height="50" rx="6" fill="url(#qs-step)"/>
      <text x="85" y="22" text-anchor="middle" class="ko" font-size="12" fill="#1A237E">5 분 재진입 가능</text>
      <text x="85" y="38" text-anchor="middle" class="ko-r" font-size="10" fill="#1A237E">다른 세션 · 다른 작업자</text>
    </g>
  </g>
</svg>
