    <text x="115" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#3B0764">특수강관 + 암묵지</text>
    <text x="115" y="48" text-anchor="middle" font-size="9" font-weight="500" fill="#6B21A8">중견 RAG 중심</text>
    <text x="115" y="64" text-anchor="middle" font-size="9" font-weight="600" fill="#A78BFA">→ 패키지 3</text>
  </g>
  <g transform="translate(60, 420)">
    <rect width="230" height="76" rx="10" fill="url(#g_demo_by_pkg_card)" stroke="#A78BFA" stroke-width="0.8" filter="url(#shadow)"/>
    <text x="115" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#3B0764">고무·폴리머 양산</text>
    <text x="115" y="48" text-anchor="middle" font-size="9" font-weight="500" fill="#6B21A8">OEM 공급</text>
    <text x="115" y="64" text-anchor="middle" font-size="9" font-weight="600" fill="#A78BFA">→ 패키지 4</text>
  </g>
  <g transform="translate(310, 420)">
    <rect width="230" height="76" rx="10" fill="url(#g_demo_by_pkg_card)" stroke="#A78BFA" stroke-width="0.8" filter="url(#shadow)"/>
    <text x="115" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#3B0764">유틸·환경·ESG</text>
    <text x="115" y="48" text-anchor="middle" font-size="9" font-weight="500" fill="#6B21A8">CBAM·중대재해</text>
    <text x="115" y="64" text-anchor="middle" font-size="9" font-weight="600" fill="#A78BFA">→ 패키지 6</text>
  </g>
  <text x="300" y="525" text-anchor="middle" font-size="14" fill="#A78BFA">▼</text>
  <g transform="translate(30, 540)">
    <rect width="125" height="56" rx="8" fill="white" stroke="#A78BFA" stroke-width="0.8" filter="url(#shadow)"/>
    <text x="62.5" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#3B0764">전사적 DX R&D</text>
    <text x="62.5" y="38" text-anchor="middle" font-size="9" font-weight="500" fill="#6B21A8">다년·대기업</text>
    <text x="62.5" y="50" text-anchor="middle" font-size="9" font-weight="600" fill="#A78BFA">패키지 1</text>
  </g>
  <g transform="translate(170, 540)">
    <rect width="125" height="56" rx="8" fill="white" stroke="#A78BFA" stroke-width="0.8" filter="url(#shadow)"/>
    <text x="62.5" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#3B0764">스마트공장 고도화</text>
    <text x="62.5" y="38" text-anchor="middle" font-size="9" font-weight="500" fill="#6B21A8">중견·12 개월</text>
    <text x="62.5" y="50" text-anchor="middle" font-size="9" font-weight="600" fill="#A78BFA">패키지 2·5</text>
  </g>
  <g transform="translate(310, 540)">
    <rect width="125" height="56" rx="8" fill="white" stroke="#A78BFA" stroke-width="0.8" filter="url(#shadow)"/>
    <text x="62.5" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#3B0764">디지털 경남</text>
    <text x="62.5" y="38" text-anchor="middle" font-size="9" font-weight="500" fill="#6B21A8">중견·9 개월</text>
    <text x="62.5" y="50" text-anchor="middle" font-size="9" font-weight="600" fill="#A78BFA">패키지 3·6</text>
  </g>
  <g transform="translate(450, 540)">
    <rect width="125" height="56" rx="8" fill="white" stroke="#A78BFA" stroke-width="0.8" filter="url(#shadow)"/>
    <text x="62.5" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#3B0764">정밀가공 SaaS</text>
    <text x="62.5" y="38" text-anchor="middle" font-size="9" font-weight="500" fill="#6B21A8">중소·9 개월</text>
    <text x="62.5" y="50" text-anchor="middle" font-size="9" font-weight="600" fill="#A78BFA">패키지 5</text>
  </g>
  <rect x="40" y="690" width="520" height="80" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="60" y="715" font-size="11" font-weight="700" fill="#4338CA">📌 by-package.md — 6 패키지 비교 매트릭스 본문</text>
  <text x="60" y="735" font-size="10" font-weight="500" fill="#475569">사업 매칭 후 해당 패키지의 §3·§4·§5 본문 paste</text>
  <text x="60" y="752" font-size="10" font-weight="500" fill="#475569">패키지 1 (대기업 R&D) ~ 패키지 6 (유틸·ESG·CBAM)</text>
