    <text x="180" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="white">Q2. 다년 R&D? 주력 도메인?</text>
    <text x="180" y="50" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(255,255,255,0.9)">예 33개월+ / 아니오 단년</text>
  </g>
  <text x="300" y="295" text-anchor="middle" font-size="14" fill="#A78BFA">▼</text>
