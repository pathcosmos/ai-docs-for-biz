site_name: AI 사업계획서 자산 허브
site_description: 한국어 제조 AI 사업계획서 작성을 위한 누적 자산 (44 마크다운, 9 분류, 36 방법론)
site_url: https://pathcosmos.github.io/ai-docs-for-biz/
site_author: ai-docs-for-biz workspace
repo_url: https://github.com/pathcosmos/ai-docs-for-biz
repo_name: pathcosmos/ai-docs-for-biz
edit_uri: ""

docs_dir: docs

theme:
  name: material
  language: ko
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 다크 모드 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 라이트 모드 전환
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path        # 브레드크럼 — 페이지 상단에 "홈 > 운영 가이드 > Quick-Start" 표시
    - navigation.footer      # 페이지 하단 prev/next 링크
    - navigation.prune       # 빌드 크기 절감 (활성 nav 만 렌더링)
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pathcosmos/ai-docs-for-biz
  generator: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "¤"
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  # [E11-2] mermaid custom_fence 제거 — 99 블록 모두 정적 SVG 변환 완료
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - ko
        - en
      separator: '[\s\-·\.\,\(\)]'
  - tags

hooks:
  - hooks/inject_frontmatter.py
  - hooks/slug_rewrite.py
  - hooks/wrap_top5_copy.py           # [E10-4] Track 1·2·3 Top5 페이지의 BLK 블록 자동 copy admonition wrap
  - hooks/wrap_paste_ready.py         # [E13-2] 시나리오 상세 + 패키지 §3·§4 paste-ready admonition wrap
  - hooks/wrap_meta_blockquote.py     # [E10-1] H1 직후 메타 인용 → <details> collapsible 자동
  - hooks/filter_worklog.py           # [E10-3] 작업로그 페이지에 개발자용 안내 banner 주입
  - hooks/highlight_placeholders.py   # [고객사]·[수치]·[공정] 등 플레이스홀더 시각 강조
  - hooks/dim_workspace_meta.py       # [E10-1] Phase·엔트리·방법론·에이전트 ID 시각 약화
  - hooks/linkify_sources.py          # > [출처: 파일명 §섹션] 자동 링크화 (274 인용)
  - hooks/inject_toc.py               # 300 줄 이상 페이지 상단에 'TOC 빠른 진입' 박스 자동
  - hooks/inject_hero_svg.py          # slug 매칭 SVG 자동 hero 주입 (페이지 상단 figure)
  - hooks/inject_page_footer.py       # [E10-3] 상단 읽기 시간 배지 + 하단 페이지 메타 details
  - hooks/build_crossref.py           # 274 인용 → docs/data/crossref.json (D3 그래프 입력)

extra_css:
  - stylesheets/extra.css

extra_javascript:
  # [E11-2] mermaid.js CDN 제거 (~720KB gzip) — 99 mermaid 블록 모두 정적 SVG 변환 완료
  - https://d3js.org/d3.v7.min.js
  - javascripts/copy-block.js   # 헤더·표·blockquote 단위 Copy 버튼 (paste-ready)
  - javascripts/lightbox.js     # 이미지·SVG 클릭 → 확대 + 다운로드 (고해상도)
  - javascripts/graph.js        # D3 force-directed cross-reference 그래프 (graph.md)

# =============================================================================
# Navigation — 사이드바 친화 라벨링 (Phase E9 Stage 2 보강, 사용자 피드백 #2 대응)
# 자동 생성 대신 명시적 nav: 정의 — 짧은 한국어 라벨로 일상 인지 친화도 극대화.
# 페이지 제목 (긴 원본 H1) 은 inject_frontmatter.py 가 별도 처리.
# =============================================================================
nav:
  - 홈: index.md

  # 1. 시작 (사용자 첫 진입 — 의도 명확 라벨)
  - 🚀 시작:
      - 처음 사용자 — 5 분 안내: start-here.md
      - 📋 사업계획서 본문 15 블록 (paste-ready): blocks.md
      - 6 패키지 매칭 — 우리 회사는 어디?: by-package.md
      - 사업계획서 작성 Quick-Start: guide/quickstart.md

  # 2. 콘텐츠 (의미 중심 라벨 — Track 1·2·3 → 도메인 직접 명시)
  - 📦 콘텐츠:
      - 🤖 제조 AI (생산·품질·예지보전):
          - 제조 AI 도입 기초·아키텍처: track/track1-index.md
          - 사업계획서 §3·4 본문 5 블록: track/track1-top5.md
          - AI 엔진 6 종 카드 (시계열·비전·이상탐지·강화·RAG): track/track1-engine-cards.md
      - ⚙️ MLOps (모니터링·재학습·거버넌스):
          - MLOps 도입 기초·구성요소 7 종: track/track2-index.md
          - 사업계획서 §6·7·8 본문 5 블록: track/track2-top5.md
      - 💬 LLM·RAG (작업표준·정비이력 검색):
          - LLM·RAG 도입 기초·5 계층: track/track3-index.md
          - 사업계획서 §4·5 본문 5 블록: track/track3-top5.md
      - 📦 6 패키지 통합 파일럿:
          - 패키지 1 — 대기업 철강 다년 R&D: pkg/pkg1-steel-enterprise.md
          - 패키지 2 — 중견 냉연 12 개월: pkg/pkg2-cold-rolled.md
          - 패키지 3 — 특수강관 RAG 9 개월: pkg/pkg3-special-pipe.md
          - 패키지 4 — 고무 양산 OEM 12 개월: pkg/pkg4-rubber.md
          - 패키지 5 — 정밀가공 SaaS 9 개월: pkg/pkg5-precision.md
          - 패키지 6 — 유틸·ESG·CBAM 12 개월: pkg/pkg6-util-esg.md
      - 🎯 시나리오 상세 (40 종 카탈로그):
          - 시나리오 카탈로그 — 40 종 7 도메인: scenario/catalog.md
          - 철강 Top 5 (연속주조·압연·표면결함): scenario/detail-top5.md
          - 철강 Phase 2 (압연·소둔 4 종): scenario/detail-phase2.md
          - 고무·폴리머 5 종 (배합·언더큐어): scenario/detail-rub.md
          - 유틸·안전 5 종 (CBAM·중대재해): scenario/detail-utl-saf.md
          - 특수강관 RAG (작업표준·정비이력): scenario/detail-special-pipe.md
      - 🧩 Cross-cutting 모듈:
          - CBAM 대응 (EU 탄소국경조정): module/cbam.md
          - 중대재해 안전 (CCTV·웨어러블): module/safety.md
          - 연합학습 (산업단지 공동 AI): module/federated-learning.md
          - OEM 공급망 정합 (자동차·조선·2 차전지): module/oem-supply.md
          - SaaS·클라우드 보안 (5 등급 민감도): module/saas-security.md

  # 3. 운영·참고 (작성 실무 가이드)
  - 📋 운영·참고:
      - 📋 운영 가이드 (작성 실무):
          - 사업계획서 본문 조립: guide/assembly.md
          - 재무·예산 산정 (5 비목): guide/finance-budget.md
          - 사업기간 압축 (단계+연차): guide/duration-compress.md
          - KPI 측정 (5 군 정량): guide/kpi-measurement.md
          - 외부검증 운영 (RACI): guide/external-validation.md
          - RAG 인프라 운영 (5 계층): guide/rag-infra.md
          - 도메인 지식추출 (인터뷰 5 단계): guide/domain-knowledge.md
          - 한국 sLM 활용 (7 모델 매트릭스): guide/korean-slm.md
          - 컨설팅 위탁 (강도 3 단계): guide/consulting-outsource.md
          - TRL 진척 관리 (3 단계): guide/trl-progress.md
          - 위험 매트릭스: guide/risk-matrix.md
      - 📚 참고 자료:
          - 시너지 ROI 모델: other/synergy-roi.md
          - 책임 분담 매트릭스 (RACI): other/raci-matrix.md
          - 지원사업 공고 스냅샷: other/support-programs.md
          - 양식 검증 — DX 촉진 R&D: other/form-validation-dx.md
          - 방법론 총론 (47 방법론): other/methodology.md
      - 🔗 인터랙티브 도구:
          - Cross-ref 그래프 (44 자산): graph.md
          - 태그 필터: filter.md

  # 4. 메타 (개발자·다른 AI 세션용)
  - 📌 메타 (개발자용):
      - 작업 로그 (#1~#46): meta/worklog.md
      - CLAUDE.md (프로젝트 지침): meta/claude-md.md
      - 검토 리포트: meta/review-report.md
