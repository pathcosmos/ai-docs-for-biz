site_name: AI 사업계획서 자산 허브
site_description: 한국어 제조 AI 사업계획서 작성을 위한 누적 자산 (44 마크다운, 9 분류, 36 방법론)
site_url: https://pathcosmos.github.io/ai-docs-for-biz/
site_author: ai-docs-for-biz workspace
repo_url: https://github.com/pathcosmos/ai-docs-for-biz
repo_name: pathcosmos/ai-docs-for-biz
edit_uri: ""

docs_dir: docs

theme:
  name: material
  language: ko
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 다크 모드 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 라이트 모드 전환
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path        # 브레드크럼 — 페이지 상단에 "홈 > 운영 가이드 > Quick-Start" 표시
    - navigation.footer      # 페이지 하단 prev/next 링크
    - navigation.prune       # 빌드 크기 절감 (활성 nav 만 렌더링)
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pathcosmos/ai-docs-for-biz
  generator: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "¤"
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - ko
        - en
      separator: '[\s\-·\.\,\(\)]'
  - tags

hooks:
  - hooks/inject_frontmatter.py
  - hooks/slug_rewrite.py
  - hooks/wrap_meta_blockquote.py     # [E10-1] H1 직후 메타 인용 → <details> collapsible 자동
  - hooks/highlight_placeholders.py   # [고객사]·[수치]·[공정] 등 플레이스홀더 시각 강조
  - hooks/dim_workspace_meta.py       # [E10-1] Phase·엔트리·방법론·에이전트 ID 시각 약화
  - hooks/linkify_sources.py          # > [출처: 파일명 §섹션] 자동 링크화 (274 인용)
  - hooks/inject_toc.py               # 300 줄 이상 페이지 상단에 'TOC 빠른 진입' 박스 자동
  - hooks/inject_hero_svg.py          # slug 매칭 SVG 자동 hero 주입 (페이지 상단 figure)
  - hooks/build_crossref.py           # 274 인용 → docs/data/crossref.json (D3 그래프 입력)

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - https://d3js.org/d3.v7.min.js
  - javascripts/mermaid-init.js
  - javascripts/copy-block.js   # 헤더·표·blockquote 단위 Copy 버튼 (paste-ready)
  - javascripts/lightbox.js     # 이미지·SVG 클릭 → 확대 + 다운로드 (고해상도)
  - javascripts/graph.js        # D3 force-directed cross-reference 그래프 (graph.md)

# =============================================================================
# Navigation — 사이드바 친화 라벨링 (Phase E9 Stage 2 보강, 사용자 피드백 #2 대응)
# 자동 생성 대신 명시적 nav: 정의 — 짧은 한국어 라벨로 일상 인지 친화도 극대화.
# 페이지 제목 (긴 원본 H1) 은 inject_frontmatter.py 가 별도 처리.
# =============================================================================
nav:
  - 홈: index.md

  # 1 그룹 — 사용자 진입 (use-case 기반, 영향도 40%)
  - 🚀 시작하기:
      - 5 분 안내: start-here.md
      - 패키지 비교: by-package.md
      - Quick-Start 가이드: guide/quickstart.md

  # 2 그룹 — 기술 학습
  - 🔧 기술 트랙:
      - 'Track 1 — 제조 AI 목차': track/track1-index.md
      - 'Track 1 — 핵심 5 블록': track/track1-top5.md
      - 'Track 1 — AI 엔진 카드 (5.2)': track/track1-engine-cards.md
      - 'Track 2 — MLOps 목차': track/track2-index.md
      - 'Track 2 — 핵심 5 블록': track/track2-top5.md
      - 'Track 3 — LLM·RAG 목차': track/track3-index.md
      - 'Track 3 — 핵심 5 블록': track/track3-top5.md

  # 3 그룹 — 통합 파일럿 (6 패키지)
  - 📦 통합 파일럿:
      - '패키지 1 — 대기업 철강': pkg/pkg1-steel-enterprise.md
      - '패키지 2 — 중견 냉연': pkg/pkg2-cold-rolled.md
      - '패키지 3 — 특수강관 (RAG)': pkg/pkg3-special-pipe.md
      - '패키지 4 — 고무 양산': pkg/pkg4-rubber.md
      - '패키지 5 — 정밀가공 (SaaS)': pkg/pkg5-precision.md
      - '패키지 6 — 유틸·ESG': pkg/pkg6-util-esg.md

  # 4 그룹 — 운영 가이드 11 종
  - 📋 운영 가이드:
      - 사업계획서 조립: guide/assembly.md
      - 재무·예산 산정: guide/finance-budget.md
      - 사업기간 압축: guide/duration-compress.md
      - KPI 측정: guide/kpi-measurement.md
      - 외부검증 운영: guide/external-validation.md
      - RAG 인프라: guide/rag-infra.md
      - 도메인 지식추출: guide/domain-knowledge.md
      - 한국 sLM 활용: guide/korean-slm.md
      - 컨설팅 위탁: guide/consulting-outsource.md
      - TRL 진척 관리: guide/trl-progress.md
      - 위험 매트릭스: guide/risk-matrix.md

  # 5 그룹 — 시나리오·모듈 (콘텐츠 자료)
  - 🎯 시나리오·모듈:
      - '시나리오 카탈로그 (40 종)': scenario/catalog.md
      - '상세 — Top5 (철강 5)': scenario/detail-top5.md
      - '상세 — Phase2 (압연·소둔)': scenario/detail-phase2.md
      - '상세 — RUB (고무)': scenario/detail-rub.md
      - '상세 — UTL·SAF (유틸·안전)': scenario/detail-utl-saf.md
      - '상세 — 특수강관 (RAG)': scenario/detail-special-pipe.md
      - 'CBAM 대응': module/cbam.md
      - '중대재해 안전': module/safety.md
      - '연합학습': module/federated-learning.md
      - 'OEM 공급망': module/oem-supply.md
      - 'SaaS·클라우드 보안': module/saas-security.md

  # 6 그룹 — 참고 자료
  - 📚 참고 자료:
      - 시너지 ROI 모델: other/synergy-roi.md
      - 책임 분담 매트릭스: other/raci-matrix.md
      - 지원사업 공고: other/support-programs.md
      - '양식 검증 — DX 촉진': other/form-validation-dx.md
      - 방법론 총론: other/methodology.md

  # 7 그룹 — 인터랙티브 도구
  - 🔗 인터랙티브:
      - Cross-ref 그래프: graph.md
      - 태그 필터: filter.md

  # 8 그룹 — 메타 (개발자·다른 AI 세션용)
  - 📌 메타 (개발자용):
      - 작업 로그: meta/worklog.md
      - CLAUDE.md: meta/claude-md.md
      - 검토 리포트: meta/review-report.md
