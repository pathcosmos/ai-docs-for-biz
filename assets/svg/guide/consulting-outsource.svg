<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="컨설팅 위탁 운영 가이드 — 강도 3 단계 수평 막대 세로형 인포그래픽"
     class="zoomable">
  <title>컨설팅 위탁 운영 가이드 (세로형) — 강도 3 단계 비교</title>
  <desc>다년 R&amp;D 1단계 (9 개월·역량 분석 + 컨설팅) 외부 컨설팅 위탁 강도 3 단계 (자체 우선·혼합·전면 위탁) 수평 막대 시각화 + 단년 vs 다년 1단계 vs 다년 2단계 비교 + 가이드 군 통일 세로형 인포그래픽.</desc>

  <defs>
    <linearGradient id="co-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="co-bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="co-bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="co-bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <filter id="co-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#co-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">컨설팅 위탁 운영 가이드</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">CONSULTING OUTSOURCE — 3 LEVELS</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#FDE68A">강도 3 단계 — 자체·혼합·전면 위탁</text>

  <!-- 강도 3 단계 수평 막대 (130~410) -->
  <g transform="translate(40, 130)" filter="url(#co-shadow)">
    <rect width="520" height="280" rx="10" fill="white" stroke="#E2E8F0"/>
    <rect width="520" height="26" rx="10" fill="#6366F1"/>
    <rect y="20" width="520" height="6" fill="#6366F1"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">위탁 강도 3 단계 — 외부 컨설팅 비율</text>
    <text x="506" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">3 LEVELS</text>

    <!-- L1 자체 우선 -->
    <g transform="translate(20, 50)">
      <text x="0" y="14" class="ko" font-size="11" fill="#047857">L1 · 자체 우선 (15 ~ 25 %)</text>
      <text x="490" y="14" text-anchor="end" class="ko-r" font-size="9" fill="#64748B">사내 R&amp;D 강함</text>
      <rect x="0" y="22" width="480" height="20" rx="4" fill="#F1F5F9"/>
      <rect x="0" y="22" width="100" height="20" rx="4" fill="url(#co-bar1)"/>
      <text x="105" y="36" class="ko-r" font-size="10" fill="#475569">→ 일부 자문만 외부 (도메인·CBAM·sLM 선정)</text>
      <text x="0" y="58" class="ko-r" font-size="9" fill="#64748B">사례 — 대기업 제조사 자체 AI팀 운영 + 외부 자문 [기간]</text>
      <text x="0" y="72" class="ko-r" font-size="9" fill="#64748B">예산 — 인건비 ↑ · 외주비 ↓</text>
    </g>

    <!-- L2 혼합 -->
    <g transform="translate(20, 130)">
      <text x="0" y="14" class="ko" font-size="11" fill="#D97706">L2 · 혼합 (40 ~ 60 %)</text>
      <text x="490" y="14" text-anchor="end" class="ko-r" font-size="9" fill="#64748B">자체+외부 균형</text>
      <rect x="0" y="22" width="480" height="20" rx="4" fill="#F1F5F9"/>
      <rect x="0" y="22" width="240" height="20" rx="4" fill="url(#co-bar2)"/>
      <text x="245" y="36" class="ko-r" font-size="10" fill="#475569">→ 핵심 영역 자체 + 인프라·검증 외부</text>
      <text x="0" y="58" class="ko-r" font-size="9" fill="#64748B">사례 — 중견 제조사 PM·DS 자체 + 데이터·MLOps 외주</text>
      <text x="0" y="72" class="ko-r" font-size="9" fill="#64748B">예산 — 표준 비목 분포</text>
    </g>

    <!-- L3 전면 위탁 -->
    <g transform="translate(20, 210)">
      <text x="0" y="14" class="ko" font-size="11" fill="#B91C1C">L3 · 전면 위탁 (80 ~ 99 %)</text>
      <text x="490" y="14" text-anchor="end" class="ko-r" font-size="9" fill="#64748B">단년·압축 사업</text>
      <rect x="0" y="22" width="480" height="20" rx="4" fill="#F1F5F9"/>
      <rect x="0" y="22" width="450" height="20" rx="4" fill="url(#co-bar3)"/>
      <text x="0" y="58" class="ko-r" font-size="9" fill="#64748B">사례 — 중소·벤처 제조사 단년 R&amp;D 9 개월 컨설팅 99 % 패턴</text>
      <text x="0" y="72" class="ko-r" font-size="9" fill="#64748B">예산 — 외주비 ↑↑ · 위험 ↑ (벤더 락인·지식 이전 부족)</text>
    </g>
  </g>

  <!-- 사업 종류별 적용 (430~600) -->
  <g transform="translate(40, 430)" filter="url(#co-shadow)">
    <rect width="520" height="170" rx="10" fill="white" stroke="#E2E8F0"/>
    <rect width="520" height="26" rx="10" fill="#6366F1"/>
    <rect y="20" width="520" height="6" fill="#6366F1"/>
    <text x="14" y="18" class="ko" font-size="12" fill="white">사업 종류별 위탁 강도 표준</text>
    <text x="506" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">3 TYPES</text>

    <g transform="translate(20, 40)">
      <rect width="155" height="120" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
      <text x="10" y="20" class="ko" font-size="11" fill="#047857">단년 R&amp;D</text>
      <text x="10" y="38" class="ko-r" font-size="9" fill="#475569">9~12 개월</text>
      <text x="10" y="54" class="ko-r" font-size="9" fill="#475569">L3 전면 위탁</text>
      <text x="10" y="70" class="ko-r" font-size="9" fill="#64748B">PoC + 보고서</text>
      <text x="10" y="86" class="ko-r" font-size="9" fill="#64748B">컨설팅사 주도</text>
      <text x="10" y="105" class="ko" font-size="10" fill="#10B981">99 % 패턴</text>
    </g>
    <g transform="translate(185, 40)">
      <rect width="155" height="120" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
      <text x="10" y="20" class="ko" font-size="11" fill="#D97706">다년 R&amp;D 1단계</text>
      <text x="10" y="38" class="ko-r" font-size="9" fill="#475569">9 개월 (역량+컨설)</text>
      <text x="10" y="54" class="ko-r" font-size="9" fill="#475569">L2 혼합</text>
      <text x="10" y="70" class="ko-r" font-size="9" fill="#64748B">분석 외주 + 자체 검토</text>
      <text x="10" y="86" class="ko-r" font-size="9" fill="#64748B">2단계 준비</text>
      <text x="10" y="105" class="ko" font-size="10" fill="#F59E0B">권장 표준</text>
    </g>
    <g transform="translate(350, 40)">
      <rect width="150" height="120" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
      <text x="10" y="20" class="ko" font-size="11" fill="#4338CA">다년 R&amp;D 2단계</text>
      <text x="10" y="38" class="ko-r" font-size="9" fill="#475569">24~36 개월</text>
      <text x="10" y="54" class="ko-r" font-size="9" fill="#475569">L1 자체 우선</text>
      <text x="10" y="70" class="ko-r" font-size="9" fill="#64748B">시작품·통합 플랫폼</text>
      <text x="10" y="86" class="ko-r" font-size="9" fill="#64748B">자체 R&amp;D 주도</text>
      <text x="10" y="105" class="ko" font-size="10" fill="#6366F1">자체 역량 中심</text>
    </g>
  </g>

  <!-- 강조 박스 (610~670) -->
  <g transform="translate(40, 610)" filter="url(#co-shadow)">
    <rect width="520" height="60" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
    <text x="20" y="24" class="ko" font-size="12" fill="#4338CA">결정 트리거 — 사업 기간 · 자체 역량 · 도메인 난이도</text>
    <text x="20" y="42" class="ko-r" font-size="9" fill="#475569">9 개월 단기 + 자체 역량 ↓ → L3 / 24+ 개월 + 역량 ↑ → L1 / 그 외 → L2</text>
    <text x="20" y="56" class="ko" font-size="9" fill="#6366F1">→ 위험 §3 — 벤더 락인 + 지식 이전 부족 위험 컨틴전시</text>
  </g>

  <!-- cross-reference 박스 (685~785) -->
  <g transform="translate(40, 685)">
    <rect width="520" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#D97706">cross-reference · 위탁 강도 + 사업 종류 + 재무·예산</text>
    <g font-size="9" class="ko-r" fill="#475569">
      <text x="14" y="38">▸ L1 자체 (15~25 %) / L2 혼합 (40~60 %) / L3 전면 (80~99 %)</text>
      <text x="14" y="54">▸ 단년 → L3 / 다년 1단계 → L2 / 다년 2단계 → L1 (사업 종류별 표준)</text>
      <text x="14" y="70">▸ §10 cross-reference — 재무·예산 §10 (외주비 비목) + TRL §5 (단계별)</text>
      <text x="14" y="88" fill="#6366F1" font-weight="700">▸ 8 장 구조 + 4 분기 의사결정 + 강도 3 단계 (방법론 4.26 자산 군 통일)</text>
    </g>
  </g>
</svg>
