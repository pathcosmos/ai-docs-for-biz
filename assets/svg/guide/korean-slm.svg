<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="한국 sLM 활용 가이드 — 7 모델 매트릭스 세로형 인포그래픽"
     class="zoomable">
  <title>한국 sLM 활용 가이드 (세로형) — 7 모델 매트릭스</title>
  <desc>한국 정부지원·대기업 협력 사업에서 활용 가능한 sLM 7 라인업 (HyperCLOVA·EXAONE·Mi:dm·Solar 생성 4 + KoSimCSE·BGE·KURE 임베딩 3) 카드 매트릭스 + 가이드 군 통일 (8 장 + 4 분기) 세로형 인포그래픽.</desc>

  <defs>
    <linearGradient id="ks-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="ks-final" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="ks-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#ks-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">한국 sLM 활용 가이드</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">KOREAN sLM — 7 MODEL MATRIX</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#FDE68A">생성 4 + 임베딩 3 — 정부지원·대기업 협력 라인업</text>

  <!-- 생성 모델 4 종 (130~390) -->
  <g transform="translate(40, 130)">
    <text x="0" y="-2" class="ko" font-size="13" fill="#4338CA">생성 모델 (Generation) — 4 종</text>

    <!-- HyperCLOVA -->
    <g transform="translate(0, 10)" filter="url(#ks-shadow)">
      <rect width="250" height="120" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="250" height="26" rx="10" fill="#6366F1"/>
      <rect y="20" width="250" height="6" fill="#6366F1"/>
      <text x="14" y="18" class="ko" font-size="12" fill="white">HyperCLOVA X</text>
      <text x="240" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">NAVER</text>
      <text x="14" y="48" class="ko-r" font-size="10" fill="#475569">상용 API · 한국어 최강</text>
      <text x="14" y="64" class="ko-r" font-size="9" fill="#64748B">시드 7B / 39B / Dash</text>
      <text x="14" y="80" class="ko-r" font-size="9" fill="#64748B">민감도 ↑ 사업 적합</text>
      <text x="14" y="96" class="ko-r" font-size="9" fill="#64748B">금융·공공·의료 인증</text>
      <text x="14" y="112" class="ko" font-size="9" fill="#6366F1">→ 보안 등급 高</text>
    </g>
    <!-- EXAONE -->
    <g transform="translate(270, 10)" filter="url(#ks-shadow)">
      <rect width="250" height="120" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="250" height="26" rx="10" fill="#6366F1"/>
      <rect y="20" width="250" height="6" fill="#6366F1"/>
      <text x="14" y="18" class="ko" font-size="12" fill="white">EXAONE 3.5</text>
      <text x="240" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">LG AI</text>
      <text x="14" y="48" class="ko-r" font-size="10" fill="#475569">오픈가중치 · 32K 컨텍스트</text>
      <text x="14" y="64" class="ko-r" font-size="9" fill="#64748B">2.4B / 7.8B / 32B</text>
      <text x="14" y="80" class="ko-r" font-size="9" fill="#64748B">제조·R&amp;D 적합</text>
      <text x="14" y="96" class="ko-r" font-size="9" fill="#64748B">사내 GPU 운영 가능</text>
      <text x="14" y="112" class="ko" font-size="9" fill="#6366F1">→ 자체 인프라 구축</text>
    </g>
    <!-- Mi:dm -->
    <g transform="translate(0, 140)" filter="url(#ks-shadow)">
      <rect width="250" height="120" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="250" height="26" rx="10" fill="#6366F1"/>
      <rect y="20" width="250" height="6" fill="#6366F1"/>
      <text x="14" y="18" class="ko" font-size="12" fill="white">Mi:dm 2.0</text>
      <text x="240" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">KT</text>
      <text x="14" y="48" class="ko-r" font-size="10" fill="#475569">B2B 한국어 특화</text>
      <text x="14" y="64" class="ko-r" font-size="9" fill="#64748B">7B / 11B Mini / Pro</text>
      <text x="14" y="80" class="ko-r" font-size="9" fill="#64748B">통신·공공 사업 인증</text>
      <text x="14" y="96" class="ko-r" font-size="9" fill="#64748B">한국어 멀티모달</text>
      <text x="14" y="112" class="ko" font-size="9" fill="#6366F1">→ 통신 클라우드 적합</text>
    </g>
    <!-- Solar -->
    <g transform="translate(270, 140)" filter="url(#ks-shadow)">
      <rect width="250" height="120" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="250" height="26" rx="10" fill="#6366F1"/>
      <rect y="20" width="250" height="6" fill="#6366F1"/>
      <text x="14" y="18" class="ko" font-size="12" fill="white">Solar Pro</text>
      <text x="240" y="18" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">UPSTAGE</text>
      <text x="14" y="48" class="ko-r" font-size="10" fill="#475569">소형 고성능 · 글로벌</text>
      <text x="14" y="64" class="ko-r" font-size="9" fill="#64748B">10.7B / 22B</text>
      <text x="14" y="80" class="ko-r" font-size="9" fill="#64748B">RAG 최적화 옵션</text>
      <text x="14" y="96" class="ko-r" font-size="9" fill="#64748B">on-prem 배포 가능</text>
      <text x="14" y="112" class="ko" font-size="9" fill="#6366F1">→ 비용·성능 균형</text>
    </g>
  </g>

  <!-- 임베딩 모델 3 종 (430~570) -->
  <g transform="translate(40, 430)">
    <text x="0" y="-2" class="ko" font-size="13" fill="#4338CA">임베딩 모델 (Embedding) — 3 종</text>

    <g transform="translate(0, 10)" filter="url(#ks-shadow)">
      <rect width="170" height="120" rx="10" fill="white" stroke="#818CF8" stroke-width="2"/>
      <rect width="170" height="22" rx="10" fill="#818CF8"/>
      <rect y="16" width="170" height="6" fill="#818CF8"/>
      <text x="14" y="16" class="ko" font-size="11" fill="white">KoSimCSE</text>
      <text x="160" y="16" text-anchor="end" class="en" font-size="8" fill="rgba(255,255,255,0.85)">SKT</text>
      <text x="14" y="40" class="ko-r" font-size="9" fill="#475569">한국어 검색 표준</text>
      <text x="14" y="56" class="ko-r" font-size="9" fill="#64748B">SKT Brain</text>
      <text x="14" y="72" class="ko-r" font-size="9" fill="#64748B">오픈소스 무료</text>
      <text x="14" y="88" class="ko-r" font-size="9" fill="#64748B">성숙도 ↑</text>
      <text x="14" y="108" class="ko" font-size="9" fill="#6366F1">→ 기본 옵션</text>
    </g>
    <g transform="translate(180, 10)" filter="url(#ks-shadow)">
      <rect width="170" height="120" rx="10" fill="white" stroke="#818CF8" stroke-width="2"/>
      <rect width="170" height="22" rx="10" fill="#818CF8"/>
      <rect y="16" width="170" height="6" fill="#818CF8"/>
      <text x="14" y="16" class="ko" font-size="11" fill="white">BGE-M3</text>
      <text x="160" y="16" text-anchor="end" class="en" font-size="8" fill="rgba(255,255,255,0.85)">BAAI</text>
      <text x="14" y="40" class="ko-r" font-size="9" fill="#475569">다국어 강자</text>
      <text x="14" y="56" class="ko-r" font-size="9" fill="#64748B">중·영·한 동시</text>
      <text x="14" y="72" class="ko-r" font-size="9" fill="#64748B">하이브리드 지원</text>
      <text x="14" y="88" class="ko-r" font-size="9" fill="#64748B">상용·연구 보급</text>
      <text x="14" y="108" class="ko" font-size="9" fill="#6366F1">→ 글로벌 사업</text>
    </g>
    <g transform="translate(360, 10)" filter="url(#ks-shadow)">
      <rect width="170" height="120" rx="10" fill="white" stroke="#818CF8" stroke-width="2"/>
      <rect width="170" height="22" rx="10" fill="#818CF8"/>
      <rect y="16" width="170" height="6" fill="#818CF8"/>
      <text x="14" y="16" class="ko" font-size="11" fill="white">KURE</text>
      <text x="160" y="16" text-anchor="end" class="en" font-size="8" fill="rgba(255,255,255,0.85)">NLP-LAB</text>
      <text x="14" y="40" class="ko-r" font-size="9" fill="#475569">한국어 신규 SOTA</text>
      <text x="14" y="56" class="ko-r" font-size="9" fill="#64748B">제조 도메인 적합</text>
      <text x="14" y="72" class="ko-r" font-size="9" fill="#64748B">F1 ↑ 보고됨</text>
      <text x="14" y="88" class="ko-r" font-size="9" fill="#64748B">연구·실험 단계</text>
      <text x="14" y="108" class="ko" font-size="9" fill="#6366F1">→ 도메인 특화</text>
    </g>
  </g>

  <!-- 강조 박스 (590~670) -->
  <g transform="translate(40, 590)" filter="url(#ks-shadow)">
    <rect width="520" height="80" rx="10" fill="url(#ks-final)"/>
    <text x="20" y="24" class="ko" font-size="13" fill="white">선정 4 분기 — 민감도 × 사업 × 인프라 × 비용</text>
    <g font-size="9" class="ko-r" fill="rgba(255,255,255,0.92)">
      <text x="20" y="42">▸ 민감도 ↑ + 사업 인증 → HyperCLOVA·Mi:dm</text>
      <text x="20" y="56">▸ 자체 GPU + 비용 ↓ → EXAONE·Solar (오픈가중치 운영)</text>
      <text x="20" y="70">▸ 임베딩 3 종 모두 RAG 인프라 §2 (L2 임베딩) 와 정합</text>
    </g>
  </g>

  <!-- cross-reference 박스 (685~785) -->
  <g transform="translate(40, 685)">
    <rect width="520" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#D97706">cross-reference · 7 모델 + RAG 인프라 + 도메인 지식추출</text>
    <g font-size="9" class="ko-r" fill="#475569">
      <text x="14" y="38">▸ 생성 4 — HyperCLOVA·EXAONE·Mi:dm·Solar (보안·인프라·비용 분기)</text>
      <text x="14" y="54">▸ 임베딩 3 — KoSimCSE·BGE-M3·KURE (한국어·다국어·도메인 분기)</text>
      <text x="14" y="70">▸ §10 cross-reference — RAG 인프라 §2 + Track 3 §5 + 도메인 지식 §6</text>
      <text x="14" y="88" fill="#6366F1" font-weight="700">▸ 8 장 구조 + 4 분기 의사결정 + 강도 3 단계 (방법론 4.26 자산 군 통일)</text>
    </g>
  </g>
</svg>
