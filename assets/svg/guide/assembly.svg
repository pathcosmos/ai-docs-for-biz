<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="사업계획서 조립 가이드 — 7 단계 표준 절차 세로형 인포그래픽"
     class="zoomable">
  <title>사업계획서 조립 가이드 (세로형) — 7 단계 표준 절차</title>
  <desc>워크스페이스 자산을 조합하여 단일 사업계획서 1 부를 완성하기까지의 표준 7 단계 흐름 (요청 식별 → 패키지 매칭 → 양식 검증 → 5.2 카드 매핑 → 본문 paste → 플레이스홀더 치환 → 시연·외부검증) 와 6 패키지 5.2 카드 매핑표 cross-reference 를 세로형으로 시각화한 운영 가이드 인포그래픽.</desc>

  <defs>
    <linearGradient id="as-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="as-step" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="as-final" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="as-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#as-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">사업계획서 조립 가이드</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">ASSEMBLY GUIDE — 7 STEPS</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#FDE68A">자산 조합 → [고객사] 사업계획서 1 부 완성 표준 절차</text>

  <!-- 세로 타임라인 라인 -->
  <line x1="80" y1="140" x2="80" y2="660" stroke="#6366F1" stroke-width="3" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Step 1 (120~190) -->
  <g transform="translate(40, 120)">
    <circle cx="40" cy="35" r="24" fill="url(#as-step)" filter="url(#as-shadow)"/>
    <text x="40" y="42" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">1</text>
    <g transform="translate(95, 0)" filter="url(#as-shadow)">
      <rect width="425" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="425" height="22" rx="10" fill="#6366F1"/>
      <rect y="16" width="425" height="6" fill="#6366F1"/>
      <text x="14" y="16" class="ko" font-size="12" fill="white">요청 식별</text>
      <text x="410" y="16" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">5 ITEMS</text>
      <text x="14" y="38" class="ko-r" font-size="10" fill="#475569">고객사·사업·기간·양식·시나리오 영역 입력</text>
      <text x="14" y="54" class="ko-r" font-size="9" fill="#6366F1">→ 운영_모드_Quickstart §1 + CLAUDE.md</text>
    </g>
  </g>

  <!-- Step 2 (200~270) -->
  <g transform="translate(40, 200)">
    <circle cx="40" cy="35" r="24" fill="url(#as-step)" filter="url(#as-shadow)"/>
    <text x="40" y="42" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">2</text>
    <g transform="translate(95, 0)" filter="url(#as-shadow)">
      <rect width="425" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="425" height="22" rx="10" fill="#6366F1"/>
      <rect y="16" width="425" height="6" fill="#6366F1"/>
      <text x="14" y="16" class="ko" font-size="12" fill="white">패키지 매칭</text>
      <text x="410" y="16" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">6 PKG</text>
      <text x="14" y="38" class="ko-r" font-size="10" fill="#475569">P1~P6 단일 또는 복합 매핑 (시나리오 카탈로그 §부록 B)</text>
      <text x="14" y="54" class="ko-r" font-size="9" fill="#6366F1">→ 사업 성격·고객사 규모·도메인 적합도 평가</text>
    </g>
  </g>

  <!-- Step 3 (280~350) -->
  <g transform="translate(40, 280)">
    <circle cx="40" cy="35" r="24" fill="url(#as-step)" filter="url(#as-shadow)"/>
    <text x="40" y="42" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">3</text>
    <g transform="translate(95, 0)" filter="url(#as-shadow)">
      <rect width="425" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="425" height="22" rx="10" fill="#6366F1"/>
      <rect y="16" width="425" height="6" fill="#6366F1"/>
      <text x="14" y="16" class="ko" font-size="12" fill="white">양식 검증</text>
      <text x="410" y="16" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">PDF</text>
      <text x="14" y="38" class="ko-r" font-size="10" fill="#475569">사업양식 PDF 목차·필수항목·페이지 한계 추출</text>
      <text x="14" y="54" class="ko-r" font-size="9" fill="#6366F1">→ 양식검증_DX촉진_R&amp;D §3 절차</text>
    </g>
  </g>

  <!-- Step 4 (360~430) -->
  <g transform="translate(40, 360)">
    <circle cx="40" cy="35" r="24" fill="url(#as-step)" filter="url(#as-shadow)"/>
    <text x="40" y="42" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">4</text>
    <g transform="translate(95, 0)" filter="url(#as-shadow)">
      <rect width="425" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="425" height="22" rx="10" fill="#6366F1"/>
      <rect y="16" width="425" height="6" fill="#6366F1"/>
      <text x="14" y="16" class="ko" font-size="12" fill="white">5.2 카드 매핑</text>
      <text x="410" y="16" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">6 CARDS</text>
      <text x="14" y="38" class="ko-r" font-size="10" fill="#475569">5.2-a~f AI 엔진 변형카드 정합성 매핑</text>
      <text x="14" y="54" class="ko-r" font-size="9" fill="#6366F1">→ track1 §5.2 + 갭 1 정합성 표</text>
    </g>
  </g>

  <!-- Step 5 (440~510) -->
  <g transform="translate(40, 440)">
    <circle cx="40" cy="35" r="24" fill="url(#as-step)" filter="url(#as-shadow)"/>
    <text x="40" y="42" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">5</text>
    <g transform="translate(95, 0)" filter="url(#as-shadow)">
      <rect width="425" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="425" height="22" rx="10" fill="#6366F1"/>
      <rect y="16" width="425" height="6" fill="#6366F1"/>
      <text x="14" y="16" class="ko" font-size="12" fill="white">본문 블록 paste</text>
      <text x="410" y="16" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">15+11+5</text>
      <text x="14" y="38" class="ko-r" font-size="10" fill="#475569">Track 1·2·3 Top5 + 가이드 11 + 모듈 5 paste</text>
      <text x="14" y="54" class="ko-r" font-size="9" fill="#6366F1">→ 인용 출처 표기 [출처: 파일 §섹션] 표준</text>
    </g>
  </g>

  <!-- Step 6 (520~590) -->
  <g transform="translate(40, 520)">
    <circle cx="40" cy="35" r="24" fill="url(#as-step)" filter="url(#as-shadow)"/>
    <text x="40" y="42" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">6</text>
    <g transform="translate(95, 0)" filter="url(#as-shadow)">
      <rect width="425" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="425" height="22" rx="10" fill="#6366F1"/>
      <rect y="16" width="425" height="6" fill="#6366F1"/>
      <text x="14" y="16" class="ko" font-size="12" fill="white">플레이스홀더 치환</text>
      <text x="410" y="16" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">5 SLOTS</text>
      <text x="14" y="38" class="ko-r" font-size="10" fill="#475569">[고객사]·[공정]·[수치]·[기간]·[%] 일괄 치환</text>
      <text x="14" y="54" class="ko-r" font-size="9" fill="#6366F1">→ 신규 작성 비율 25~40 % (방법론 4.34)</text>
    </g>
  </g>

  <!-- Step 7 (600~670) -->
  <g transform="translate(40, 600)">
    <circle cx="40" cy="35" r="24" fill="url(#as-step)" filter="url(#as-shadow)"/>
    <text x="40" y="42" text-anchor="middle" class="ko" font-size="18" fill="white" font-weight="900">7</text>
    <g transform="translate(95, 0)" filter="url(#as-shadow)">
      <rect width="425" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
      <rect width="425" height="22" rx="10" fill="#6366F1"/>
      <rect y="16" width="425" height="6" fill="#6366F1"/>
      <text x="14" y="16" class="ko" font-size="12" fill="white">시연·외부검증</text>
      <text x="410" y="16" text-anchor="end" class="en" font-size="9" fill="rgba(255,255,255,0.85)">6 ITEMS</text>
      <text x="14" y="38" class="ko-r" font-size="10" fill="#475569">자체평가 6 항목 + 외부검증 RACI 통과</text>
      <text x="14" y="54" class="ko-r" font-size="9" fill="#6366F1">→ 외부검증_가이드 §3 + 작업로그 #N 추가</text>
    </g>
  </g>

  <!-- 하단: cross-reference 박스 (685~785) -->
  <g transform="translate(40, 685)">
    <rect width="520" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#D97706">cross-reference · 6 패키지 5.2 카드 매핑 (정합성 기반)</text>
    <g font-size="9" class="ko-r" fill="#475569">
      <text x="14" y="38">▸ P1 대기업철강 → 5.2-b·c·d·e·f / P2 중견냉연 → a·b·d·e·f / P3 특수강관 → a·c·f</text>
      <text x="14" y="54">▸ P4 고무·폴리머 → b·c·f / P5 정밀가공 → b·c·e·f / P6 유틸·ESG → b·c·d·e</text>
      <text x="14" y="70">▸ 신규 작성 비율 25~40 % · 인용 출처 표기 274 회 표준 · 자체평가 6 항목</text>
      <text x="14" y="88" fill="#6366F1" font-weight="700">▸ 8 장 구조 + 4 분기 의사결정 + 강도 3 단계 (방법론 4.26 자산 군 통일)</text>
    </g>
  </g>
</svg>
