<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="Track 3 — 사업계획서 §4·5 본문 LLM·RAG 5 블록 세로 카드">
  <title>Track 3 — Top 5 Reusable Blocks (BLK-T3-3.1·3.2·4.2·5.2·5.5)</title>
  <desc>LLM·RAG Track 3 의 5 핵심 재사용 블록 — 문서 이질성, 암묵지 의존, RAG 5 계층, 청킹 전략, 골드셋·환각 방지를 위에서 아래로 시각화한 카드.</desc>

  <defs>
    <linearGradient id="t3t-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="t3t-card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="t3t-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: Pretendard, system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: Pretendard, system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: Pretendard, system-ui, -apple-system, sans-serif; font-weight: 500; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <rect width="600" height="100" fill="url(#t3t-header)"/>
  <text x="300" y="38" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">TRACK 3 · TOP 5 REUSABLE BLOCKS</text>
  <text x="300" y="68" text-anchor="middle" class="ko" font-size="22" fill="white">Track 3 — 사업계획서 §4·5 본문</text>
  <text x="300" y="88" text-anchor="middle" class="ko-r" font-size="11" fill="rgba(255,255,255,0.9)">문서 이질성 · 암묵지 의존 · RAG 5 계층 · 청킹 · 환각 방지</text>

  <!-- BLK-T3-3.1 -->
  <g transform="translate(40, 120)" filter="url(#t3t-shadow)">
    <rect width="520" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="32" rx="8" fill="url(#t3t-card)"/>
    <rect y="20" width="520" height="12" fill="url(#t3t-card)"/>
    <text x="14" y="22" class="ko" font-size="13" fill="white">BLK-T3-3.1</text>
    <text x="450" y="22" text-anchor="end" class="en" font-size="10" fill="rgba(255,255,255,0.9)">§3.1 · 600~1,200 자</text>
    <text x="14" y="56" class="ko" font-size="14" fill="#0E7490">문서 이질성 · 비정형 공정 지식 사장</text>
    <text x="14" y="76" class="ko-r" font-size="10" fill="#475569">SOP · 장애 사례 · 도면 · 메일 · 카톡 분산</text>
    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §3.1 직접 paste</text>
  </g>

