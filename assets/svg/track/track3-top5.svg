    <rect width="520" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="32" rx="8" fill="url(#t3t-card)"/>
    <rect y="20" width="520" height="12" fill="url(#t3t-card)"/>
    <text x="14" y="22" class="ko" font-size="13" fill="white">BLK-T3-4.2</text>
    <text x="450" y="22" text-anchor="end" class="en" font-size="10" fill="rgba(255,255,255,0.9)">§4.2 · 600~1,200 자</text>
    <text x="14" y="56" class="ko" font-size="14" fill="#0E7490">RAG 5 계층 아키텍처</text>
