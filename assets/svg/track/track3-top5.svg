    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §4.2 직접 paste</text>
  </g>

  <!-- BLK-T3-5.2 -->
  <g transform="translate(40, 492)" filter="url(#t3t-shadow)">
    <rect width="520" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="32" rx="8" fill="url(#t3t-card)"/>
    <rect y="20" width="520" height="12" fill="url(#t3t-card)"/>
    <text x="14" y="22" class="ko" font-size="13" fill="white">BLK-T3-5.2</text>
    <text x="450" y="22" text-anchor="end" class="en" font-size="10" fill="rgba(255,255,255,0.9)">§5.2 · 600~1,200 자</text>
    <text x="14" y="56" class="ko" font-size="14" fill="#0E7490">청킹 4 전략 비교</text>
    <text x="14" y="76" class="ko-r" font-size="10" fill="#475569">고정 · 재귀 · 의미 단위 · 표·도면 보존 청킹</text>
    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §5.2 직접 paste</text>
  </g>

  <!-- BLK-T3-5.5 -->
  <g transform="translate(40, 616)" filter="url(#t3t-shadow)">
    <rect width="520" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="520" height="32" rx="8" fill="url(#t3t-card)"/>
    <rect y="20" width="520" height="12" fill="url(#t3t-card)"/>
    <text x="14" y="22" class="ko" font-size="13" fill="white">BLK-T3-5.5</text>
    <text x="450" y="22" text-anchor="end" class="en" font-size="10" fill="rgba(255,255,255,0.9)">§5.5 · 600~1,200 자</text>
    <text x="14" y="56" class="ko" font-size="14" fill="#0E7490">환각 방지 · 골드셋·평가</text>
    <text x="14" y="76" class="ko-r" font-size="10" fill="#475569">정답 · 관련도 · 근거 검증 · Citation 강제</text>
    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §5.5 직접 paste</text>
