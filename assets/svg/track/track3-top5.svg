  <!-- 하단 cross-ref -->
  <g transform="translate(30, 740)" filter="url(#t3t-shadow)">
    <rect width="540" height="50" rx="8" fill="#ECFEFF" stroke="#06B6D4" stroke-width="1"/>
    <text x="14" y="20" class="ko" font-size="11" fill="#0E7490">paste 위치 · 사업계획서 §4·5 (LLM·RAG 본문)</text>
    <text x="14" y="38" class="ko-r" font-size="9" fill="#475569">5 블록 × 약 850 자 = 약 4,250 자 · Mermaid 5 · 한국 sLM 적용 · 5.2-e (LLM·RAG) 결합</text>
