    <text x="14" y="56" class="ko" font-size="14" fill="#0E7490">암묵지 의존 · RAG 도입 당위성</text>
    <text x="14" y="76" class="ko-r" font-size="10" fill="#475569">검색 · 근거 인용 · 환각 억제 · sLM 정합</text>
    <text x="14" y="92" class="ko-r" font-size="9" fill="#64748B">2~3 문단 + Mermaid 1 → 사업계획서 §3.2 직접 paste</text>
  </g>

