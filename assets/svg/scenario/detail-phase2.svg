<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="압연·소둔 Phase 2 시나리오 상세 — 4 카드 세로형"
     class="zoomable">
  <title>시나리오 상세 — 압연·소둔 Phase 2 (STL-04·08·11·12)</title>
  <desc>패키지 2 (압연·소둔 중견 냉연) Phase 2 잔여 4 시나리오 — STL-04 압연 두께 · STL-08 소둔 온도 보정 · STL-11 결함 분류 · STL-12 작업표준 RAG — 의 모델·KPI·도입난이도·기간을 4 카드 세로 stack 으로 시각화.</desc>

  <defs>
    <linearGradient id="p2-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="p2-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="p2-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
    <filter id="p2-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#F8FAFC"/>

  <!-- 헤더 -->
  <rect width="600" height="100" fill="url(#p2-header)"/>
  <text x="300" y="38" text-anchor="middle" class="ko" font-size="22" fill="white">압연·소둔 Phase 2</text>
  <text x="300" y="62" text-anchor="middle" class="en" font-size="11" fill="rgba(255,255,255,0.85)">PKG-2 · 4 SCENARIOS</text>
  <text x="300" y="84" text-anchor="middle" class="ko-r" font-size="11" fill="#E0E7FF">중견 냉연 · 압연·소둔 라인 잔여 도입 4 종 (12-18 개월)</text>

  <!-- 4 시나리오 카드 stack -->
  <g filter="url(#p2-shadow)">
    <g transform="translate(40, 120)">
      <rect width="520" height="110" rx="10" fill="url(#p2-card)" stroke="#4F46E5" stroke-width="2"/>
      <rect width="80" height="110" rx="10" fill="#4F46E5"/><rect x="70" width="10" height="110" fill="#4F46E5"/>
      <text x="40" y="42" text-anchor="middle" class="en" font-size="11" fill="white">STL-04</text>
      <text x="40" y="72" text-anchor="middle" class="ko" font-size="20" fill="white" font-weight="900">①</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">압연 두께 편차 보정</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">압연기 하중·속도·온도 · XGBoost + PID 통합</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#4F46E5">KPI: 두께 편차 -40% · 재처리율 -30% · ROI 1.4 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="280" height="6" rx="3" fill="url(#p2-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★ · 기간 6-9 개월 · TRL 6→8</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#7C3AED">데이터: PLC 1 sec 샘플링 6 개월치 · MES 라벨 연동</text>
    </g>

    <g transform="translate(40, 240)">
      <rect width="520" height="110" rx="10" fill="url(#p2-card)" stroke="#4F46E5" stroke-width="2"/>
      <rect width="80" height="110" rx="10" fill="#4F46E5"/><rect x="70" width="10" height="110" fill="#4F46E5"/>
      <text x="40" y="42" text-anchor="middle" class="en" font-size="11" fill="white">STL-08</text>
      <text x="40" y="72" text-anchor="middle" class="ko" font-size="20" fill="white" font-weight="900">②</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">소둔 온도 프로파일 보정</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">CAL 라인 온도·시간·속도 · LSTM + 회귀</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#4F46E5">KPI: 기계적 물성 산포 -35% · 에너지 -8% · ROI 1.8 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="320" height="6" rx="3" fill="url(#p2-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★★ · 기간 9-12 개월 · TRL 5→7</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#7C3AED">데이터: 소둔로 24 zone 온도 + 강종·두께 메타데이터</text>
    </g>

    <g transform="translate(40, 360)">
      <rect width="520" height="110" rx="10" fill="url(#p2-card)" stroke="#4F46E5" stroke-width="2"/>
      <rect width="80" height="110" rx="10" fill="#4F46E5"/><rect x="70" width="10" height="110" fill="#4F46E5"/>
      <text x="40" y="42" text-anchor="middle" class="en" font-size="11" fill="white">STL-11</text>
      <text x="40" y="72" text-anchor="middle" class="ko" font-size="20" fill="white" font-weight="900">③</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">결함 분류·근본원인 RAG</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">결함 이미지 + 작업로그 · CLIP + RAG 통합</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#4F46E5">KPI: 분류정확 96% · 원인 추정 시간 -70% · ROI 2.0 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="240" height="6" rx="3" fill="url(#p2-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★★ · 기간 9 개월 · TRL 6→8</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#7C3AED">데이터: 결함 이미지 5 만 + 작업표준 1 만 페이지</text>
    </g>

    <g transform="translate(40, 480)">
      <rect width="520" height="110" rx="10" fill="url(#p2-card)" stroke="#4F46E5" stroke-width="2"/>
      <rect width="80" height="110" rx="10" fill="#4F46E5"/><rect x="70" width="10" height="110" fill="#4F46E5"/>
      <text x="40" y="42" text-anchor="middle" class="en" font-size="11" fill="white">STL-12</text>
      <text x="40" y="72" text-anchor="middle" class="ko" font-size="20" fill="white" font-weight="900">④</text>
      <text x="100" y="22" class="ko" font-size="14" fill="#3730A3">작업표준·SOP 검색 RAG</text>
      <text x="100" y="40" class="ko-r" font-size="10" fill="#475569">SOP·작업지시서 · sLM (8B) + 한국어 임베딩</text>
      <text x="100" y="56" class="ko-r" font-size="9" fill="#4F46E5">KPI: 검색시간 -75% · 신입 OJT 기간 -30% · ROI 1.5 년</text>
      <rect x="100" y="65" width="380" height="6" rx="3" fill="#E0E7FF"/>
      <rect x="100" y="65" width="200" height="6" rx="3" fill="url(#p2-bar)"/>
      <text x="100" y="84" class="ko-r" font-size="9" fill="#475569">난이도 ★★ · 기간 4-6 개월 · TRL 7→9</text>
      <text x="100" y="100" class="ko-r" font-size="9" fill="#7C3AED">데이터: SOP·표준작업지시 PDF·HWP 8,000 건</text>
    </g>
  </g>

  <!-- 종합 -->
  <g transform="translate(40, 610)">
    <rect width="520" height="50" rx="6" fill="#FBBF24" filter="url(#p2-shadow)"/>
    <text x="20" y="22" class="ko" font-size="13" fill="#0F172A">Phase 2 통합 도입 — 평균 ROI 1.7 년 · 12-18 개월 순차</text>
    <text x="20" y="40" class="ko-r" font-size="10" fill="#0F172A">Phase 1 (Top5 도입 후) → Phase 2 (4 종) → Phase 3 (LLM·SAF 확장)</text>
  </g>

  <!-- 하단 인덱스 -->
  <g transform="translate(40, 670)">
    <rect width="520" height="110" rx="8" fill="white" stroke="#4F46E5" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="20" y="22" class="ko" font-size="12" fill="#3730A3">Phase 2 도입 순서 권고</text>
    <text x="20" y="42" class="ko-r" font-size="10" fill="#475569">▸ Step 1 (M+1~M+6): STL-12 작업표준 RAG — 빠른 가시성 확보</text>
    <text x="20" y="58" class="ko-r" font-size="10" fill="#475569">▸ Step 2 (M+7~M+12): STL-04 압연 두께 — Phase 1 STL-05 와 연계</text>
    <text x="20" y="74" class="ko-r" font-size="10" fill="#475569">▸ Step 3 (M+13~M+18): STL-08 소둔 보정 + STL-11 결함 RAG 병렬</text>
    <text x="20" y="90" class="ko-r" font-size="10" fill="#4F46E5">▸ 출처: 사업계획서_패키지2_압연소둔_파일럿.md §4·5</text>
    <text x="20" y="104" class="ko-r" font-size="9" fill="#7C3AED">트랙 1 (모델) + 트랙 2 (MLOps) + 트랙 3 (RAG) 3 트랙 통합</text>
  </g>
</svg>
