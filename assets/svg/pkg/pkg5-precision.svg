<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img"
     aria-label="패키지 5 — 정밀가공 SaaS 9 개월 (CNC 공구 마모·SPC 조기경보·작업표준 RAG·SaaS 보안 5 등급)"
     class="zoomable">
  <title>패키지 5 — 정밀가공 SaaS (Precision Machining Cloud, 9 개월)</title>
  <desc>정밀가공 중소사 클라우드 SaaS 단일 테넌시 9 개월 압축 통합 파일럿 — CNC 공구 마모·파손 예지, SPC 조기경보, 작업표준·CAD 도면 RAG, SaaS 보안 5 등급의 4 시나리오를 단일 통합 UI 위에서 운영. 5.2-b·d·f 카드와 SaaS 보안 모듈 cross-reference 포함.</desc>

  <defs>
    <linearGradient id="pkg5-header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="pkg5-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="pkg5-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="pkg5-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="pkg5-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ko { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .ko-r { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .en { font-family: 'Pretendard', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="800" fill="#F0F9FF"/>

  <!-- 상단 헤더 (100px) -->
  <rect width="600" height="100" fill="url(#pkg5-header)"/>
  <text x="32" y="32" class="en" fill="rgba(255,255,255,0.92)" font-size="11">PACKAGE 05 · PRECISION MACHINING CLOUD · 9 MONTHS</text>
  <text x="32" y="62" class="ko" fill="white" font-size="22">패키지 5 — 정밀가공 SaaS</text>
  <text x="32" y="84" class="ko-r" fill="rgba(255,255,255,0.92)" font-size="13">CNC 중소사 · 클라우드 종합솔루션 단일 테넌시</text>
  <g transform="translate(528, 28)" filter="url(#pkg5-glow)">
    <circle cx="22" cy="22" r="22" fill="#FFFFFF"/>
    <text x="22" y="29" text-anchor="middle" class="ko" fill="#0EA5E9" font-size="22">5</text>
  </g>

  <!-- 중간 영역 (y=100~680, 580px) -->

  <!-- 섹션 라벨 -->
  <text x="32" y="128" class="ko" fill="#0369A1" font-size="13">4 시나리오 + 통합 UI · 위→아래 가공 흐름</text>
  <text x="32" y="146" class="ko-r" fill="#64748B" font-size="10">CNC 가공 → SPC 검사 → 작업표준 RAG → SaaS 보안</text>

  <!-- 카드 1 — MET-01 CNC 공구 마모 (주력) -->
  <g transform="translate(32, 162)" filter="url(#pkg5-shadow)">
    <rect width="536" height="118" rx="10" fill="#BAE6FD" stroke="#38BDF8" stroke-width="2"/>
    <rect width="6" height="118" rx="3" fill="#0369A1"/>
    <circle cx="44" cy="58" r="26" fill="#0369A1"/>
    <text x="44" y="55" text-anchor="middle" class="ko" fill="white" font-size="10">MET</text>
    <text x="44" y="68" text-anchor="middle" class="ko" fill="white" font-size="10">-01</text>
    <text x="84" y="32" class="ko" fill="#0369A1" font-size="14">CNC 공구 마모·파손 예지 (주력)</text>
    <text x="84" y="52" class="ko-r" fill="#475569" font-size="11">컨트롤러 로그·진동·전류 → RUL 예측 (5.2-b · 5.2-d)</text>
    <text x="84" y="70" class="ko-r" fill="#475569" font-size="11">시계열 회귀 + 이상탐지 결합 패턴</text>
    <text x="84" y="92" class="ko-r" fill="#64748B" font-size="10">MET-01 (주력) · 잔여 수명 ±[수치]% 정확도</text>
    <text x="84" y="108" class="ko-r" fill="#0369A1" font-size="10" font-weight="700">▼ 본 사업의 핵심 가치</text>
  </g>

  <!-- 카드 2 — MET-03 3D 검사 SPC 조기경보 -->
  <g transform="translate(32, 292)" filter="url(#pkg5-shadow)">
    <rect width="536" height="100" rx="10" fill="url(#pkg5-card)" stroke="#7DD3FC" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#0EA5E9"/>
    <circle cx="44" cy="50" r="22" fill="#0EA5E9"/>
    <text x="44" y="46" text-anchor="middle" class="ko" fill="white" font-size="11">MET</text>
    <text x="44" y="60" text-anchor="middle" class="ko" fill="white" font-size="11">-03</text>
    <text x="84" y="34" class="ko" fill="#0369A1" font-size="14">3D 스캔 치수 검사 · SPC 조기경보</text>
    <text x="84" y="54" class="ko-r" fill="#475569" font-size="11">CMM·3D 스캐너 → 공정능력지수 (Cpk) 추세·드리프트</text>
    <text x="84" y="74" class="ko-r" fill="#64748B" font-size="10">MET-03 · 주력 · 부분 도입 (1 차 라인 한정)</text>
    <text x="84" y="90" class="ko-r" fill="#64748B" font-size="10">목표 — 검사 자동화 [%] · 라벨링 외주 후속 분리</text>
  </g>

  <!-- 카드 3 — LLM-04 CAD 도면 / 작업표준 RAG -->
  <g transform="translate(32, 404)" filter="url(#pkg5-shadow)">
    <rect width="536" height="100" rx="10" fill="url(#pkg5-card)" stroke="#7DD3FC" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#0D9488"/>
    <circle cx="44" cy="50" r="22" fill="#0D9488"/>
    <text x="44" y="46" text-anchor="middle" class="ko" fill="white" font-size="11">LLM</text>
    <text x="44" y="60" text-anchor="middle" class="ko" fill="white" font-size="11">-04</text>
    <text x="84" y="34" class="ko" fill="#0F766E" font-size="14">CAD 도면 · 작업표준 RAG</text>
    <text x="84" y="54" class="ko-r" fill="#475569" font-size="11">DWG·STEP 형상 임베딩 + CAM·SOP 청킹·검색 (5.2-f)</text>
    <text x="84" y="74" class="ko-r" fill="#64748B" font-size="10">LLM-04 · 확장 · 도면 우선 도입 → 후속 SOP RAG</text>
    <text x="84" y="90" class="ko-r" fill="#64748B" font-size="10">목표 — 도면 검색 [%] 단축 · Citation 의무</text>
  </g>

  <!-- 카드 4 — UTL-01 + 통합 UI · SaaS 보안 -->
  <g transform="translate(32, 516)" filter="url(#pkg5-shadow)">
    <rect width="536" height="100" rx="10" fill="url(#pkg5-card)" stroke="#7DD3FC" stroke-width="1"/>
    <rect width="6" height="100" rx="3" fill="#4F46E5"/>
    <circle cx="44" cy="50" r="22" fill="#4F46E5"/>
    <text x="44" y="46" text-anchor="middle" class="ko" fill="white" font-size="11">SaaS</text>
    <text x="44" y="60" text-anchor="middle" class="ko" fill="white" font-size="9">SEC·5</text>
    <text x="84" y="34" class="ko" fill="#4338CA" font-size="14">에너지 최적화 + 통합 UI · SaaS 보안 5 등급</text>
    <text x="84" y="54" class="ko-r" fill="#475569" font-size="11">UTL-01 피크 시프트 + MLO-03 단일 통합 UI 피드백</text>
    <text x="84" y="74" class="ko-r" fill="#64748B" font-size="10">CSAP 표준등급 · 단일 테넌시 · 권한·로그·암호화 5 영역</text>
    <text x="84" y="90" class="ko-r" fill="#64748B" font-size="10">MLOps Lv.0 → Lv.1+ 압축 (3 종 — 레지스트리·모니터링·피드백)</text>
  </g>

  <!-- 5.2 카드 + 모듈 cross-ref 라벨 -->
  <g transform="translate(32, 632)">
    <rect width="536" height="36" rx="8" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1"/>
    <text x="16" y="16" class="ko" fill="#0369A1" font-size="10">5.2 카드 결합</text>
    <text x="16" y="30" class="ko-r" fill="#475569" font-size="9">5.2-b 시계열 · 5.2-d 이상탐지·예지보전 · 5.2-f LLM·RAG</text>
    <text x="280" y="16" class="ko" fill="#0369A1" font-size="10">모듈 cross-ref</text>
    <text x="280" y="30" class="ko-r" fill="#475569" font-size="9">SaaS 클라우드 보안 (BLK-CSEC-A~E) · 중대재해 후속</text>
  </g>

  <!-- 하단 통계 (y=680~800, 120px) -->
  <g transform="translate(32, 692)">
    <rect width="536" height="92" rx="10" fill="url(#pkg5-accent)" filter="url(#pkg5-shadow)"/>
    <g class="ko" fill="white">
      <text x="20" y="28" font-size="24" font-weight="800">9</text>
      <text x="20" y="50" font-size="11">개월 압축</text>
      <text x="20" y="68" class="ko-r" font-size="9" opacity="0.92">클라우드 종합솔루션</text>

      <text x="110" y="28" font-size="24" font-weight="800">4+1</text>
      <text x="110" y="50" font-size="11">시나리오</text>
      <text x="110" y="68" class="ko-r" font-size="9" opacity="0.92">MET 2 + LLM 1 + UTL 1 + UI</text>

      <text x="240" y="28" font-size="24" font-weight="800">SaaS</text>
      <text x="240" y="50" font-size="11">단일 테넌시</text>
      <text x="240" y="68" class="ko-r" font-size="9" opacity="0.92">CSAP 표준 5 등급 정합</text>

      <text x="380" y="28" font-size="24" font-weight="800">Lv.1+</text>
      <text x="380" y="50" font-size="11">MLOps 압축</text>
      <text x="380" y="68" class="ko-r" font-size="9" opacity="0.92">레지스트리·모니터·피드백</text>
    </g>
  </g>
</svg>
